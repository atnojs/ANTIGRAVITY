  <style>
  /* ===== CORRECCIONES DE VISIBILIDAD ===== */
  .prompts-section {
      display: block;
  }

      display: none;  /* Oculto por defecto */
  }
  body.edit-mode .prompts-section #promptsListContainer {
      display: grid;  /* Visible solo en modo edición */
  }
  #promptDisplayModal {
      display: none; /* Oculto por defecto, se mostrará con JS */

  .form-modal-overlay {
      display: none; /* Asegura que se muestre correctamente solo cuando se necesita */

  /* ===== RESET O AJUSTES BÁSICOS ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ===== FUENTES ===== */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

  /* ===== VARIABLES CSS (Temas) ===== */
  :root {
    --bg-color: #f0f2f5; --card-bg-color: #ffffff; --text-color: #333333;
    --primary-color: #007bff; --accent-color: #00bcd4; --heading-color: #2c3e50;
    --border-color: #e0e0e0; --shadow-color: rgba(0,0,0,0.1);
    --placeholder-text-color: #7f8c8d;
    --button-edit-bg: rgba(0,0,0,0.05); --button-edit-hover-bg: rgba(0,0,0,0.1);
    --font-primary: 'Inter', sans-serif; --font-secondary: 'Roboto', sans-serif;
    --card-bg-color-rgb: 255,255,255;
    --prompt-block-bg: var(--card-bg-color);
  }
  body.dark-theme {
    --bg-color: #1a1a2e; --card-bg-color: #2c3e50; --text-color: #e0e0e0;
    --primary-color: #00aeff; --accent-color: #00e5ff; --heading-color: #ffffff;
    --border-color: #4f5b6a; --shadow-color: rgba(0,0,0,0.3);
    --placeholder-text-color: #95a5a6; --button-edit-bg: rgba(255,255,255,0.1);
    --button-edit-hover-bg: rgba(255,255,255,0.2);
    --card-bg-color-rgb: 44,62,80;
  }
  body { font-family:var(--font-secondary); min-height:100vh; background-color:var(--bg-color); background-size:cover; background-position:center; background-attachment:fixed; color:var(--text-color); transition:background-color .3s,color .3s; touch-action:manipulation; padding-top:80px; }
 
  .main-app-container { max-width:100%; margin:0 auto; padding:20px; }
 
  .filters-search-bar { position:fixed; top:0; left:0; width:100%; background-color:var(--card-bg-color); padding:15px 20px; box-shadow:0 2px 10px var(--shadow-color); z-index:1001; display:flex; flex-wrap:wrap; gap:15px; align-items:center; }
  .filters-search-bar input[type="search"] { padding:10px; border:1px solid var(--border-color); border-radius:6px; background-color:var(--bg-color); color:var(--text-color); font-family:var(--font-secondary); }
  .filters-search-bar input[type="search"] { flex-grow:1; min-width:200px; }
  .filters-search-bar .theme-switcher-btn { padding:10px 15px; background-color:var(--primary-color); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
  .filters-search-bar .theme-switcher-btn:hover { opacity:.9; }

  .section-title-wrapper {
      text-align: center;
      margin: 40px 0 25px 0; 
      width: 100%;
  }
  .section-title { 
      font-family: var(--font-primary); 
      color: var(--heading-color); 
      font-size: 28px; 
      border-bottom: none; 
      padding: 12px 30px; 
      display: inline-block; 
      background-color: rgba(var(--card-bg-color-rgb), 0.75); 
      border-radius: 10px;
      box-shadow: 0 3px 7px var(--shadow-color);
  }
  .add-item-btn {
      display: none; margin: 0 auto 25px auto; padding: 10px 20px;
      background-color: var(--primary-color); color: white; border: none;
      border-radius: 6px; cursor: pointer; font-weight: bold; text-align: center;
      transition: background-color 0.2s;
  }
  .add-item-btn:hover { opacity: 0.85; }
  .add-item-btn:disabled { background-color: #555; cursor: not-allowed; }
  body.edit-mode .add-item-btn { display: block; width: fit-content; }
  
  /* === ESTILOS SECCIÓN APPS IA === */
.apps-ia-section .category-container {
  flex:1 1 100%; min-width:300px; background:var(--column-bg); backdrop-filter:var(--column-backdrop); 
  border:1px solid var(--border-color); border-radius:15px; padding:20px; 
  box-shadow:0 4px 12px var(--shadow-color); height:fit-content; margin-bottom:20px; position:relative;
}
/* …incluye todo el bloque .apps-ia-section del CSS de la página de Prompts… */

    /* === ESTILOS SECCIÓN APPS IA === */
    .apps-ia-section .category-container {

    .apps-ia-section .app-card .app-actions button { flex-grow:1; padding:8px 12px; border:none; border-radius:6px; cursor:pointer; font-weight:600; transition:background-color .2s,opacity .2s; color:white; }

    .apps-ia-section .app-card .new-badge { position:absolute; top:-5px; right:-5px; background-color:#ff4757; color:white; padding:3px 8px; font-size:10px; font-weight:bold; border-radius:5px; transform:rotate(10deg); z-index:1; }
    .apps-ia-section .app-card .item-edit-buttons { display:none; position:absolute; top:5px; right:5px; background:rgba(var(--card-bg-color-rgb),.9); padding:5px; border-radius:5px; z-index:10; }
    .apps-ia-section .app-card .item-edit-buttons button { background:transparent; border:none; color:var(--text-color); cursor:pointer; font-size:14px; margin:0 2px; }
    .apps-ia-section .app-card .item-edit-buttons button:hover { color:var(--primary-color); }
    .apps-ia-section .app-card .item-order-buttons { display:none; justify-content:center; gap:10px; margin-top:10px; }
    body.edit-mode .apps-ia-section .app-card .item-edit-buttons,
    body.edit-mode .apps-ia-section .app-card .item-order-buttons { display:flex; }
    .apps-ia-section .app-card .item-order-buttons button { background:var(--button-edit-bg); color:var(--text-color); border:1px solid var(--border-color); padding:5px 10px; border-radius:4px; cursor:pointer; font-size:1em; }
    .apps-ia-section .app-card .item-order-buttons button:hover { background:var(--button-edit-hover-bg); }
    .apps-ia-section .app-card .item-order-buttons button:disabled { opacity:.5; cursor:not-allowed; }
    .apps-ia-section .initial-load-message, .apps-ia-section .no-items-message { width:100%; text-align:center; font-size:1.2em; color:var(--placeholder-text-color); margin-top:30px; padding:20px; }
    .apps-ia-section .category-header .category-controls button { background:transparent; border:none; color:var(--text-color); cursor:pointer; font-size:1em; margin-left: 5px; display:none;}
    body.edit-mode .apps-ia-section .category-header .category-controls button { display: inline-block !important; }
    #priceFilteredAppsContainer { display: none; /* Oculto hasta que se filtre por precio */ }






  /* === ESTILOS SECCIÓN CARPETAS (para Prompts) === */

      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
  }

      margin-top:30px;
      padding:20px;
  }
  .folder-prompts-menu {
      display: none; position: absolute; background-color: var(--card-bg-color);
      border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 4px 12px var(--shadow-color);
      padding: 10px; z-index: 1010; width: 300px; max-height: 350px; overflow-y: auto;

  /* === ESTILOS SECCIÓN PROMPTS === */

  /* === ESTILOS PARA MODALES Y FORMULARIOS === */

  .password-modal-overlay #submitAdminPasswordBtn { background-color:var(--primary-color); }
  .password-modal-overlay #cancelAdminPasswordBtn { background-color:#6c757d; }
  .password-modal-overlay .password-modal-buttons button:hover { opacity:.85; }
 
  .fullscreen-image-viewer {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;

  }
  .fullscreen-image-viewer img {

  /* Pie de Página */

  .site-footer .section-title {

  /* Responsive adjustments */
  @media (max-width:768px) { 
      body{padding-top:120px;}
      .filters-search-bar{flex-direction:column;align-items:stretch;}

  @media (max-width:480px) {

      #activePromptDisplayArea .prompt-example-images img { max-width: 120px; max-height: 120px; }
      .prompts-section .prompts-title-list.edit-mode-title-view { grid-template-columns: 1fr; }
  }
  .interactive-image-thumbnail:hover {

  }
  </style>

}
</script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
        let appData = {
            settings: { background: '', theme: 'dark' },
            prompts: [],
            promptFolders: []
        };

        let isEditable = false;
        let currentPassword = ""; 
        let activePopups = { folderMenu: null };
        let closeMenuTimer = null;
       
        // --- DOM Elements ---
        const globalSearchInput = document.getElementById('globalSearchInput');
        const themeSwitcherBtn = document.getElementById('themeSwitcherBtn');
        const promptFoldersGridContainer = document.getElementById('promptFoldersGridContainer');
        const noPromptFoldersMessage = document.getElementById('noPromptFoldersMessage');
        const addPromptFolderBtn = document.getElementById('addPromptFolderBtn');
        const saveFolderOrderBtn = document.getElementById('saveFolderOrderBtn');
        const promptsListContainer = document.getElementById('promptsListContainer');
        const noPromptsMessage = document.getElementById('noPromptsMessage');
        const addPromptBtn = document.getElementById('addPromptBtn');
        const savePromptOrderBtn = document.getElementById('savePromptOrderBtn');
        const hiddenBgInput = document.getElementById('hiddenBgInput');
        const changeBgBtn = document.getElementById('changeBgBtn');
        const editModeToggleBtn = document.getElementById('edit-mode-toggle-btn');
        const adminPasswordModal = document.getElementById('adminPasswordModal');
        const adminPasswordInput = document.getElementById('adminPasswordInput');
        const submitAdminPasswordBtn = document.getElementById('submitAdminPasswordBtn');
        const cancelAdminPasswordBtn = document.getElementById('cancelAdminPasswordBtn');
        const formModal = document.getElementById('formModal');
        const genericFormContainer = document.getElementById('genericFormContainer');
        const fullscreenImageViewer = document.getElementById('fullscreenImageViewer');
        const fullscreenImage = fullscreenImageViewer.querySelector('img');
        const closeFullscreenBtn = fullscreenImageViewer.querySelector('.close-fullscreen-btn');
        const promptDisplayModal = document.getElementById('promptDisplayModal');
        const activePromptDisplayArea = document.getElementById('activePromptDisplayArea');

        let tempPromptImageFiles = []; 
        let currentEditingPromptImages = []; 
       
        function closeFormModal() { 
            formModal.style.display = 'none';
            genericFormContainer.innerHTML = '';
        }

        // --- INITIALIZATION & DATA HANDLING ---
        async function loadInitialData() {
            showLoadingMessage("Cargando...");
            try {
                const response = await fetch('load_state.php?t=' + Date.now());
                if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                const data = await response.json();
                if (data && !data.error) {
                    appData.settings = { ...appData.settings, ...(data.settings || {}) };
                    appData.prompts = normalizeData(data.prompts, 'prompt');
                    appData.promptFolders = normalizeData(data.promptFolders, 'folder');
                }
            } catch (error) {
                console.error('Error crítico en carga:', error);
                showPersistentMessage(`Error de carga. Usando datos por defecto.`, "error");
            }
            applyInitialSettings();
            updateEditModeUI(); 
            clearLoadingMessage();
        }
       
        function normalizeData(items, type) {
            if (!Array.isArray(items)) return [];
            return items.map(item => ({
                id: item.id || `${type}_${Date.now()}_${Math.random()}`,
                name: item.name || (type === 'folder' ? "Carpeta Sin Nombre" : undefined),
                title: item.title || (type === 'prompt' ? "Prompt Sin Título" : undefined),
                descriptionHTML: item.descriptionHTML || "",
                exampleImageUrls: Array.isArray(item.exampleImageUrls) ? item.exampleImageUrls.filter(u => typeof u === 'string') : [],
                promptText: item.promptText || "",
                folderId: item.folderId || null,
                iconUrl: item.iconUrl || "",
                description: item.description || "",
                isPinned: item.isPinned || false,
                timestampAdded: item.timestampAdded || Date.now(),
                timestampUpdated: item.timestampUpdated || Date.now(),
            }));
        }

        async function saveDataToBackend() {
            if (!isEditable) return false;
            showLoadingMessage("Guardando...");
            const formData = new FormData();
            formData.append('password', currentPassword);
            const dataToSave = { ...appData };
            dataToSave.aiAppsCategories = []; 
            dataToSave.prompts = dataToSave.prompts.map(p => ({ ...p, exampleImageUrls: p.exampleImageUrls.filter(i => typeof i === 'string') }));
            dataToSave.promptFolders = dataToSave.promptFolders.map(f => ({ ...f, iconUrl: typeof f.iconUrl === 'string' ? f.iconUrl : '' }));
            formData.append('jsonData', JSON.stringify(dataToSave));
            appData.prompts.forEach(p => p.exampleImageUrls.forEach((img, i) => { if (img instanceof File) formData.append(`prompt_image_${p.id}_${i}`, img); }));
            appData.promptFolders.forEach(f => { if (f.iconUrl instanceof File) formData.append(`folder_icon_${f.id}`, f.iconUrl); });
            try {
                const r = await fetch('guardar_cambios.php', { method: 'POST', body: formData });
                if (!r.ok) throw new Error(`Error del servidor: ${r.status}`);
                const res = await r.json();
                if (!res.success) throw new Error(res.error || 'Error desconocido al guardar.');
                if (res.filePaths) {
                    (res.filePaths.prompts || []).forEach(fp => { const p = appData.prompts.find(p=>p.id===fp.promptId); if(p) p.exampleImageUrls[fp.originalPlaceholderIndex] = fp.newPath; });
                    (res.filePaths.folders || []).forEach(fp => { const f = appData.promptFolders.find(f=>f.id===fp.folderId); if(f) f.iconUrl = fp.newPath; });
                }
                return true;
            } catch (error) {
                console.error('Error en saveDataToBackend:', error);
                showPersistentMessage(error.message, "error");
                return false;
            } finally { clearLoadingMessage(); }
        }

        // --- RENDERING & UI LOGIC ---
        function renderAll() {
            renderPromptFolders();
            renderPrompts(); 
        }
       
        function renderPromptFolders() {
            promptFoldersGridContainer.innerHTML = '';
            const searchTerm = globalSearchInput.value.toLowerCase().trim();
            let filteredFolders = appData.promptFolders.filter(f => !searchTerm || f.name.toLowerCase().includes(searchTerm) || (f.description || '').toLowerCase().includes(searchTerm));
            noPromptFoldersMessage.style.display = filteredFolders.length === 0 ? 'block' : 'none';
            noPromptFoldersMessage.textContent = searchTerm ? "No hay carpetas que coincidan." : "No hay carpetas. ¡Crea una!";
            filteredFolders.forEach((folder) => {
                const originalIndex = appData.promptFolders.findIndex(f => f.id === folder.id);
                const folderEl = promptFoldersGridContainer.appendChild(document.createElement('div'));
                folderEl.className = 'folder-item';
                folderEl.innerHTML = `
                    ${isEditable ? `<div class="item-order-buttons"><button class="move-folder-left-btn" title="Mover Izquierda" ${originalIndex === 0 ? 'disabled' : ''}>←</button><button class="move-folder-right-btn" title="Mover Derecha" ${originalIndex === appData.promptFolders.length - 1 ? 'disabled' : ''}>→</button></div>` : ''}
                    ${isEditable ? `<div class="item-edit-buttons"><button class="edit-folder-btn" title="Editar"><i class="fas fa-edit"></i></button><button class="delete-folder-btn" title="Eliminar"><i class="fas fa-trash-alt"></i></button></div>` : ''}
                    <div class="folder-header"><img src="${folder.iconUrl || 'https://via.placeholder.com/50/ccc/888?text=F'}" alt="${folder.name} Icon" class="folder-icon interactive-image-thumbnail"><div class="folder-name">${folder.name}</div></div>
                    <p class="folder-description">${folder.description || "<em>Sin descripción</em>"}</p>`;
                
                folderEl.onclick = (e) => { if (!e.target.closest('.item-edit-buttons, .item-order-buttons, .folder-icon')) handleFolderClick(folder.id, folderEl); };
                
                // INICIO: Lógica de temporizador REFINADA
                // Ya no hay onmouseenter en la carpeta. Solo onmouseleave.
                folderEl.onmouseleave = () => {
                    closeMenuTimer = setTimeout(closeActivePopups, 60); // Un poco más de tiempo
                };
                // FIN: Lógica de temporizador REFINADA

                if (isEditable) {
                    folderEl.querySelector('.edit-folder-btn')?.addEventListener('click', () => openPromptFolderForm(folder.id));
                    folderEl.querySelector('.delete-folder-btn')?.addEventListener('click', () => deletePromptFolder(folder.id));
                    folderEl.querySelector('.move-folder-left-btn')?.addEventListener('click', () => movePromptFolder(folder.id, -1));
                    folderEl.querySelector('.move-folder-right-btn')?.addEventListener('click', () => movePromptFolder(folder.id, 1));
                }
            });
            attachGenericImageEventListeners(promptFoldersGridContainer);
        }

        function handleFolderClick(folderId, folderElement) {
            closeActivePopups(); // Cierra cualquier popup anterior al hacer clic
            const menu = document.body.appendChild(document.createElement('div'));
            menu.className = 'folder-prompts-menu';
            
            // INICIO: Lógica de temporizador REFINADA
            // onmouseenter en el menú cancela el cierre
            menu.onmouseenter = () => {
                clearTimeout(closeMenuTimer);
            };
            // onmouseleave del menú lo cierra
            menu.onmouseleave = () => {
                closeActivePopups();
            };
            // FIN: Lógica de temporizador REFINADA

            const ul = menu.appendChild(document.createElement('ul'));
            const promptsInFolder = appData.prompts.filter(p => p.folderId === folderId);

            if (promptsInFolder.length > 0) {
                promptsInFolder.forEach(p => {
                    const li = ul.appendChild(document.createElement('li'));
                    const a = li.appendChild(document.createElement('a'));
                    a.href = `#`;
                    a.textContent = p.title;
                    a.onclick = e => { e.preventDefault(); closeActivePopups(); renderActivePrompt(p.id); };

                    a.addEventListener('mouseenter', (e) => {
                        document.querySelectorAll('.prompt-link-description-popup').forEach(pop => pop.remove());
                        const descPopup = document.createElement('div');
                        descPopup.className = 'prompt-link-description-popup';
                        descPopup.innerHTML = p.descriptionHTML || '<em>Este prompt no tiene descripción.</em>';
                        document.body.appendChild(descPopup);
                        const popupWidth = 280;
                        const popupMargin = 10;
                        const linkRect = a.getBoundingClientRect();
                        if ((linkRect.right + popupWidth + popupMargin) > window.innerWidth) {
                            descPopup.style.left = `${linkRect.left - popupWidth - popupMargin + window.scrollX}px`;
                        } else {
                            descPopup.style.left = `${linkRect.right + popupMargin + window.scrollX}px`;
                        }
                        descPopup.style.top = `${linkRect.top + window.scrollY}px`;
                        descPopup.style.display = 'block';
                    });

                    a.addEventListener('mouseleave', () => {
                        const existingPopup = document.querySelector('.prompt-link-description-popup');
                        if (existingPopup) existingPopup.remove();
                    });
                });
            } else {
                ul.innerHTML = '<li><em style="color:var(--placeholder-text-color);">Carpeta vacía</em></li>';
            }

            activePopups.folderMenu = menu;
            const rect = folderElement.getBoundingClientRect();
            menu.style.cssText = `left:${rect.left+window.scrollX}px; top:${rect.bottom+5+window.scrollY}px; display:block;`;
        }
       
        function closeActivePopups() {
            clearTimeout(closeMenuTimer);
            if (activePopups.folderMenu) activePopups.folderMenu.remove(); 
            activePopups.folderMenu = null;
            document.querySelectorAll('.prompt-link-description-popup').forEach(pop => pop.remove());
        }
       
        function renderPrompts() {
            const section = document.getElementById('promptsSection');
            const sectionTitle = section.querySelector('.section-title-wrapper');
            if (isEditable) {
                sectionTitle.style.display = 'block';
                promptsListContainer.style.display = 'grid';
                promptsListContainer.classList.add('edit-mode-title-view');
                const searchTerm = globalSearchInput.value.toLowerCase().trim();
                let filtered = appData.prompts.filter(p => !searchTerm || p.title.toLowerCase().includes(searchTerm) || p.promptText.toLowerCase().includes(searchTerm));
                promptsListContainer.innerHTML = '';
                noPromptsMessage.style.display = filtered.length === 0 ? 'block' : 'none';
                noPromptsMessage.textContent = searchTerm ? "No hay prompts que coincidan." : "No hay prompts. ¡Añade uno!";
                filtered.forEach(prompt => {
                    const originalIndex = appData.prompts.findIndex(p => p.id === prompt.id);
                    const itemEl = promptsListContainer.appendChild(document.createElement('div'));
                    itemEl.className = 'prompt-title-item';
                    itemEl.innerHTML = `<span class="prompt-title-text">${prompt.isPinned ? `<i class="fas fa-thumbtack" title="Fijado" style="margin-right: 8px; color: var(--accent-color);"></i>` : ''}${prompt.title}</span><div class="item-controls"><button class="edit-prompt-btn" title="Editar"><i class="fas fa-edit"></i></button><button class="move-prompt-up-btn" title="Subir" ${originalIndex===0?'disabled':''}>↑</button><button class="move-prompt-down-btn" title="Bajar" ${originalIndex===appData.prompts.length-1?'disabled':''}>↓</button><button class="delete-prompt-btn" title="Eliminar"><i class="fas fa-trash-alt"></i></button></div>`;
                    itemEl.querySelector('.edit-prompt-btn').onclick = () => openPromptForm(prompt.id);
                    itemEl.querySelector('.delete-prompt-btn').onclick = () => deletePrompt(prompt.id);
                    itemEl.querySelector('.move-prompt-up-btn').onclick = () => movePrompt(prompt.id, -1);
                    itemEl.querySelector('.move-prompt-down-btn').onclick = () => movePrompt(prompt.id, 1);
                });
            } else { // Vision Mode
                promptsListContainer.classList.remove('edit-mode-title-view');
                promptsListContainer.style.display = 'none';
                sectionTitle.style.display = 'none'; 
                noPromptsMessage.style.display = 'none';
            }
        }

        function renderActivePrompt(promptId) {
            const p = appData.prompts.find(p => p.id === promptId);
            if (!p) {
                activePromptDisplayArea.innerHTML = '<p>Prompt no encontrado.</p>';
                return;
            }

            activePromptDisplayArea.innerHTML = `
                <h3 class="prompt-title">${p.title}</h3>
                <hr style="margin:10px 0 20px;">
                <div class="prompt-description">${p.descriptionHTML || ''}</div>
                <div class="prompt-example-images">${(p.exampleImageUrls || []).filter(u => typeof u === 'string').map(url => `<img src="${url}" class="interactive-image-thumbnail">`).join('')}</div>
                <div class="prompt-text-display">${p.promptText.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
                <div class="prompt-actions">
                    <button class="copy-prompt-btn">Copiar Enlace</button>
                    <button id="closeActivePromptBtn" class="cancel-btn">Cerrar</button> 
                </div>`;
            
            activePromptDisplayArea.querySelector('.copy-prompt-btn').onclick = () => copyToClipboard(p.promptText);
            activePromptDisplayArea.querySelector('#closeActivePromptBtn').onclick = () => {
                promptDisplayModal.style.display = 'none';
                activePromptDisplayArea.innerHTML = '';
            };
            
            attachGenericImageEventListeners(activePromptDisplayArea);
            promptDisplayModal.style.display = 'flex';
        }
       
        // --- FORM HANDLERS ---
        function openPromptForm(id = null) {
            const p = id ? appData.prompts.find(p => p.id === id) : null;
            tempPromptImageFiles = []; currentEditingPromptImages = p ? [...p.exampleImageUrls.filter(u=>typeof u==='string')] : [];
            genericFormContainer.innerHTML = `<h3>${p ? 'Editar Prompt' : 'Añadir Prompt'}</h3><input type="hidden" id="editingPromptId" value="${p?.id||''}">
                <div class="form-group"><label for="promptTitleInput">Título:</label><input type="text" id="promptTitleInput" value="${p?.title||''}"></div>
                <div class="form-group form-group-checkbox"><input type="checkbox" id="promptIsPinnedCheckbox" ${p?.isPinned ? 'checked' : ''}><label for="promptIsPinnedCheckbox">Fijar enlace en la parte superior</label></div>
                <div class="form-group"><label for="promptDescriptionHTMLInput">Descripción (HTML):</label><textarea id="promptDescriptionHTMLInput" rows="4">${p?.descriptionHTML||''}</textarea></div>
                <div class="form-group"><label for="promptFolderSelect">Carpeta:</label><select id="promptFolderSelect"><option value="">(Sin carpeta)</option>${appData.promptFolders.map(f=>`<option value="${f.id}" ${p?.folderId===f.id?'selected':''}>${f.name}</option>`).join('')}</select></div>
                <div class="form-group"><label for="promptExampleImageFilesInput">Imágenes (máx. 3):</label><input type="file" id="promptExampleImageFilesInput" multiple accept="image/*"><div id="promptImagePreviewContainer" class="image-preview-container"></div></div>
                <div class="form-group"><label for="promptTextInput">Texto del Enlace:</label><textarea id="promptTextInput" rows="6">${p?.promptText||''}</textarea></div>
                <div class="form-buttons"><button class="save-btn">Guardar</button><button type="button" class="cancel-btn">Cancelar</button></div>`;
            renderPromptFormImagePreviews();
            genericFormContainer.querySelector('#promptExampleImageFilesInput').onchange=handlePromptFormImageSelection;
            genericFormContainer.querySelector('.save-btn').onclick = savePromptHandler;
            genericFormContainer.querySelector('.cancel-btn').onclick = closeFormModal;
            formModal.style.display = 'flex';
        }
        function handlePromptFormImageSelection(e) {
            Array.from(e.target.files).forEach(file => {
                if((currentEditingPromptImages.length+tempPromptImageFiles.length)<3){ const r=new FileReader();r.onload=ev=> {tempPromptImageFiles.push({file,previewUrl:ev.target.result});renderPromptFormImagePreviews();};r.readAsDataURL(file);}
                else{alert("Máximo 3 imágenes.");}
            });
            e.target.value="";
        }
        function renderPromptFormImagePreviews() {
            const c=document.getElementById('promptImagePreviewContainer'); if(!c)return; c.innerHTML='';
            [...currentEditingPromptImages,...tempPromptImageFiles.map(f=>f.previewUrl)].forEach((url,i)=>{
                const w=c.appendChild(document.createElement('div')); w.className='img-preview-wrapper'; w.innerHTML=`<img src="${url}"><button class="delete-prompt-image-btn" data-index="${i}">×</button>`;
            });
            c.querySelectorAll('button').forEach(b=>b.onclick=e=>{const i=parseInt(e.currentTarget.dataset.index);if(i<currentEditingPromptImages.length){currentEditingPromptImages.splice(i,1);}else{tempPromptImageFiles.splice(i-currentEditingPromptImages.length,1);}renderPromptFormImagePreviews();});
        }

        function findLastPinnedIndex(arr) {
            for (let i = arr.length - 1; i >= 0; i--) {
                if (arr[i].isPinned) { return i; }
            }
            return -1; // No pinned items found
        }

        function savePromptHandler() {
            const id = document.getElementById('editingPromptId').value;
            const isPinned = document.getElementById('promptIsPinnedCheckbox').checked;
            const promptData = { 
                id: id || `p_${Date.now()}`, 
                title: document.getElementById('promptTitleInput').value.trim(), 
                descriptionHTML: document.getElementById('promptDescriptionHTMLInput').value.trim(), 
                exampleImageUrls: [...currentEditingPromptImages, ...tempPromptImageFiles.map(f => f.file)], 
                promptText: document.getElementById('promptTextInput').value.trim(), 
                folderId: document.getElementById('promptFolderSelect').value || null, 
                isPinned: isPinned,
                timestampUpdated: Date.now(), 
                timestampAdded: id ? appData.prompts.find(p => p.id === id)?.timestampAdded || Date.now() : Date.now() 
            };

            if (!promptData.title || !promptData.promptText) {
                alert("Título y Texto del Prompt son obligatorios.");
                return;
            }

            const existingIndex = appData.prompts.findIndex(p => p.id === id);

            if (existingIndex > -1) { // UPDATE
                const oldIsPinned = appData.prompts[existingIndex].isPinned;
                if (oldIsPinned === promptData.isPinned) {
                    appData.prompts[existingIndex] = promptData;
                } else {
                    appData.prompts.splice(existingIndex, 1);
                    const lastPinnedIndex = findLastPinnedIndex(appData.prompts);
                    const insertionIndex = lastPinnedIndex + 1;
                    appData.prompts.splice(insertionIndex, 0, promptData);
                }
            } else { // CREATE
                const lastPinnedIndex = findLastPinnedIndex(appData.prompts);
                const insertionIndex = lastPinnedIndex + 1;
                appData.prompts.splice(insertionIndex, 0, promptData);
            }

            saveDataToBackend().then(ok => {
                if (ok) {
                    closeFormModal();
                    renderAll();
                }
            });
        }

        const uI=genericFormContainer.querySelector('#folderIconUrlInput'),fI=genericFormContainer.querySelector('#folderIconFileInput'),pV=genericFormContainer.querySelector('#folderIconPreviewContainer');const uP=s=>{pV.innerHTML=s?`<div class="img-preview-wrapper"><img src="${s}"><button class="delete-prompt-image-btn">×</button></div>`:'';if(s)pV.querySelector('button').onclick=()=>{uI.value='';fI.value='';uP()};};if(f?.iconUrl&&typeof f.iconUrl==='string')uP(f.iconUrl);fI.onchange=e=>{if(e.target.files[0]){uI.value='';const r=new FileReader();r.onload=ev=>uP(ev.target.result);r.readAsDataURL(e.target.files[0]);}};uI.oninput=()=>{if(uI.value){fI.value='';uP(uI.value);}};genericFormContainer.querySelector('.save-btn').onclick=savePromptFolderHandler;genericFormContainer.querySelector('.cancel-btn').onclick=closeFormModal;formModal.style.display='flex';}

        const i=appData.promptFolders.findIndex(f=>f.id===id);if(i>-1)appData.promptFolders[i]=data;else appData.promptFolders.push(data);saveDataToBackend().then(ok=>{if(ok){closeFormModal();renderPromptFolders();}});}
        function deletePromptFolder(id){const f=appData.promptFolders.find(f=>f.id===id);if(f&&confirm(`Eliminar carpeta "${f.name}"? Los prompts se desvincularán.`)){appData.promptFolders=appData.promptFolders.filter(f=>f.id!==id);appData.prompts.forEach(p=>{if(p.folderId===id)p.folderId=null;});saveDataToBackend().then(ok=>{if(ok)renderAll();});}}

        function applyInitialSettings(){const isDark=appData.settings.theme!=='light';document.body.classList.toggle('dark-theme',isDark);themeSwitcherBtn.textContent=isDark?'Tema Claro':'Tema Oscuro';if(appData.settings.background)document.body.style.backgroundImage=appData.settings.background;}
        function toggleTheme(){const isDark=document.body.classList.toggle('dark-theme');appData.settings.theme=isDark?'dark':'light';themeSwitcherBtn.textContent=isDark?'Tema Claro':'Tema Oscuro';if(isEditable)saveDataToBackend();}
        function handleBackgroundChange(e){const f=e.target.files[0];if(!f||!isEditable)return;const r=new FileReader();r.onload=ev=>{appData.settings.background=`url(${ev.target.result})`;saveDataToBackend().then(()=>applyInitialSettings());};r.readAsDataURL(f);}

        function showLoadingMessage(m){let d=document.getElementById('loadingOverlay');if(!d){d=document.body.appendChild(document.createElement('div'));d.id='loadingOverlay';d.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);color:white;display:flex;justify-content:center;align-items:center;z-index:20000;font-size:2em;';}d.textContent=m;d.style.display='flex';}
        function clearLoadingMessage(){const d=document.getElementById('loadingOverlay');if(d)d.style.display='none';}
        function showPersistentMessage(m,t="info"){if(t==="error")alert(`Error: ${m}`);else alert(m);console.log(`${t.toUpperCase()}: ${m}`);}

        // --- EVENT LISTENERS GLOBALES ---

        globalSearchInput.oninput = renderAll;
        closeFullscreenBtn.onclick = closeFullscreenImage;
        fullscreenImageViewer.onclick = e => { if (e.target === fullscreenImageViewer) closeFullscreenImage(); };

  <script>
   document.addEventListener('DOMContentLoaded', () => {
  const addBtn = document.getElementById('addAppCategoryBtn');
  const container = document.getElementById('aiAppsCategoriesContainer');

  addBtn.addEventListener('click', () => {
    const title = prompt('Nombre de la categoría de Apps IA:', 'Nueva Categoría');
    if (!title) return;

    // Crear bloque de categoría
    const categoryEl = document.createElement('div');
    categoryEl.className = 'category-container';
    categoryEl.innerHTML = `
      <div class="category-header">
        <h3>${title}</h3>
        <div class="category-controls">
          <button class="edit-app-category-btn" title="Editar categoría"><i class="fas fa-edit"></i></button>

      <div class="apps-grid">
        <p class="no-items-message">No hay apps en esta categoría.</p>
      </div>
    `;
    container.appendChild(categoryEl);

    // Listeners de los nuevos botones:
    categoryEl.querySelector('.edit-app-category-btn').onclick = () => {
      const nuevo = prompt('Renombrar categoría:', title);
      if (nuevo) categoryEl.querySelector('h3').textContent = nuevo;
    };
    categoryEl.querySelector('.delete-app-category-btn').onclick = () => {

      // aquí abres tu formulario para añadir apps

});
</script>
<script>
  // --- 1) Asignar listener al botón "Añadir Categoría" ---
  const addAppCategoryBtn = document.getElementById('addAppCategoryBtn');
  addAppCategoryBtn.addEventListener('click', handleAddAppCategory);

  // --- 2) Delegación de eventos dentro del contenedor de categorías ---
  const appsContainer = document.getElementById('aiAppsCategoriesContainer');
  appsContainer.addEventListener('click', e => {
    const catEl = e.target.closest('.category-container');
    if (!catEl) return;
    const catId = catEl.dataset.categoryId;

    // Editar categoría
    if (e.target.closest('.edit-app-category-btn')) {
      const cat = appData.aiAppsCategories.find(c => c.id === catId);
      const nuevo = prompt('Renombrar categoría:', cat.title);
      if (nuevo) {
        cat.title = nuevo.trim();
        saveDataToBackend().then(renderFilteredApps);
      }
    }

    // Eliminar categoría
    if (e.target.closest('.delete-app-category-btn')) {
      deleteAppCategory(catId);
    }

    // “Añadir App a …”
    if (e.target.closest('.add-app-to-category-btn')) {
      openAppForm(null, catId);
    }
  });

  // === Función que crea una nueva categoría ===
  function handleAddAppCategory() {
    if (!isEditable) return;
    const title = prompt("Nombre para la nueva categoría de Apps IA:", "Nueva Categoría");
    if (!title || !title.trim()) return;
    const newCategory = {
      id: `catApp_${Date.now()}_${Math.random().toString(36).substr(2,9)}`,
      title: title.trim(),
      apps: [],
      timestampAdded: Date.now(),
      timestampUpdated: Date.now()
    };
    appData.aiAppsCategories.push(newCategory);
    saveDataToBackend().then(renderFilteredApps);
  }

  // === Función que elimina una categoría ===
  function deleteAppCategory(categoryId) {
    if (!isEditable) return;
    const category = appData.aiAppsCategories.find(c => c.id === categoryId);
    if (!category) return;
    if (confirm(`¿Eliminar la categoría "${category.title}" y todas sus apps?`)) {
      appData.aiAppsCategories = appData.aiAppsCategories.filter(c => c.id !== categoryId);
      saveDataToBackend().then(renderFilteredApps);
    }
  }

  // === Función que abre el formulario para añadir/editar una App ===
  function openAppForm(appId = null, categoryId = null) {
    if (!isEditable) return;
    const appToEdit = appId
      ? appData.aiAppsCategories.flatMap(c => c.apps).find(a => a.id === appId)
      : null;
    let targetCategoryId = categoryId;
    if (appToEdit && !targetCategoryId) {
      const parentCat = appData.aiAppsCategories.find(c => c.apps.some(a => a.id === appId));
      if (parentCat) targetCategoryId = parentCat.id;
    }
    if (!targetCategoryId) {
      alert("Selecciona primero una categoría de Apps IA.");
      return;
    }

    // --- Construye el HTML del formulario (idéntico al tuyo) ---
    genericFormContainer.innerHTML = `
      <h3>${appToEdit ? 'Editar App' : 'Añadir App'} a "${appData.aiAppsCategories.find(c=>c.id===targetCategoryId).title}"</h3>
      <input type="hidden" id="editingAppId" value="${appToEdit?.id||''}">
      <input type="hidden" id="targetAppCategoryId" value="${targetCategoryId}">
      <div class="form-group">
        <label>Nombre:</label>
        <input type="text" id="appNameInput" value="${appToEdit?.name||''}">
      </div>
      <div class="form-group">
        <label>URL Sitio Web:</label>
        <input type="url" id="appWebsiteUrlInput" value="${appToEdit?.websiteUrl||''}">
      </div>
      <div class="form-group">
        <label>Logo (URL o subir):</label>
        <input type="url" id="appLogoUrlInput" value="${appToEdit?.logoUrl||''}" placeholder="http://...">
        <input type="file" id="appLogoFileInput" accept="image/*" style="margin-top:5px;">
      </div>
      <div class="form-group">
        <label>Desc. Breve:</label>
        <textarea id="appBriefDescriptionInput" rows="2">${appToEdit?.briefDescription||''}</textarea>
      </div>
      <div class="form-group">
        <label>Tags (separados por coma):</label>
        <input type="text" id="appTagsInput" value="${(appToEdit?.tags||[]).join(', ')}">
      </div>
      <div class="form-group">
        <label>Precio:</label>
        <select id="appPricingModelSelect">
          ${['Gratis','Freemium','Por Créditos','De Pago','Prueba Gratuita']
            .map(p=>`<option value="${p}" ${appToEdit?.pricingModel===p?'selected':''}>${p}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>URL Tutorial:</label>
        <input type="url" id="appTutorialUrlInput" value="${appToEdit?.tutorialUrl||''}">
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="appIsPrivateCheckbox" ${appToEdit?.isPrivate?'checked':''}> Info detallada privada</label>
      </div>
      <div class="form-buttons">
        <button id="saveAppBtn" class="save-btn">Guardar</button>
        <button id="cancelFormBtn" type="button" class="cancel-btn">Cancelar</button>
      </div>`;

    // --- Listeners del formulario ---
    document.getElementById('saveAppBtn').onclick = saveAppHandler;
    document.getElementById('cancelFormBtn').onclick = closeFormModal;
    formModal.style.display = 'flex';
  }

  // === Función que guarda la App desde el formulario ===
  function saveAppHandler() {
    const editingAppId = document.getElementById('editingAppId').value;
    const targetCategoryId = document.getElementById('targetAppCategoryId').value;
    const category = appData.aiAppsCategories.find(c => c.id === targetCategoryId);
    if (!category) { alert("Categoría no encontrada."); return; }

    const newApp = {
      id: editingAppId || `app_${Date.now()}_${Math.random().toString(36).substr(2,9)}`,
      name: document.getElementById('appNameInput').value.trim(),
      websiteUrl: document.getElementById('appWebsiteUrlInput').value.trim(),
      logoUrl: document.getElementById('appLogoUrlInput').value.trim(),
      briefDescription: document.getElementById('appBriefDescriptionInput').value.trim(),
      tags: document.getElementById('appTagsInput').value.split(',').map(t=>t.trim()).filter(Boolean),
      pricingModel: document.getElementById('appPricingModelSelect').value,
      tutorialUrl: document.getElementById('appTutorialUrlInput').value.trim(),
      isPrivate: document.getElementById('appIsPrivateCheckbox').checked,
      timestampAdded: editingAppId
        ? (category.apps.find(a=>a.id===editingAppId)?.timestampAdded||Date.now())
        : Date.now(),
      timestampUpdated: Date.now()
    };
    if (!newApp.name) { alert("Nombre de App requerido."); return; }

    if (editingAppId) {
      const idx = category.apps.findIndex(a=>a.id===editingAppId);
      category.apps[idx] = newApp;
    } else {
      category.apps.push(newApp);
    }

    saveDataToBackend().then(ok => {
      if (ok) {
        closeFormModal();
        renderFilteredApps();
      }
    });
  }
</script>
