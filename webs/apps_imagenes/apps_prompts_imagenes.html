<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>APPs y Prompts para crear imágenes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
  /* ===== CORRECCIONES DE VISIBILIDAD ===== */
.prompts-section {
    display: block;
}

.prompts-section #promptsListContainer {
    display: none;  /* Oculto por defecto */
}

body.edit-mode .prompts-section #promptsListContainer {
    display: grid;  /* Visible solo en modo edición */
}

.prompts-section #activePromptDisplayArea {
    display: none;  /* Oculto por defecto */
}

body:not(.edit-mode) .prompts-section #activePromptDisplayArea:not(:empty) {
    display: block; /* Visible solo en modo visión cuando tiene contenido */
}

/* ===== CORRECCIONES FINALES ===== */
.form-modal-overlay {
    display: none; /* Asegura que se muestre correctamente solo cuando se necesita */
    z-index: 10000;
    /* display: flex; Ya no es necesario aquí, se controla por JS */
}

.folder-prompts-menu {
    z-index: 1010;
}
    
    /* ===== RESET O AJUSTES BÁSICOS ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ===== FUENTES (Primarias del DHI) ===== */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');

    /* ===== VARIABLES CSS (Temas - Base DHI) ===== */
    :root {
      --bg-color: #f0f2f5; --card-bg-color: #ffffff; --text-color: #333333;
      --primary-color: #007bff; --accent-color: #00bcd4; --heading-color: #2c3e50;
      --border-color: #e0e0e0; --shadow-color: rgba(0,0,0,0.1);
      --column-bg: rgba(230,230,250,0.05); --column-backdrop: blur(8px);
      --column-header-color: var(--accent-color); --placeholder-text-color: #7f8c8d;
      --button-edit-bg: rgba(0,0,0,0.05); --button-edit-hover-bg: rgba(0,0,0,0.1);
      --font-primary: 'Inter', sans-serif; --font-secondary: 'Roboto', sans-serif;
      
      /* Variables RGB para opacidad */
      --card-bg-color-rgb: 255,255,255;
      --text-color-rgb: 51,51,51;

      --prompt-block-bg: var(--card-bg-color);
      --folder-button-bg: var(--card-bg-color);
      }
    body.dark-theme {
      --bg-color: #1a1a2e; --card-bg-color: #2c3e50; --text-color: #e0e0e0;
      --primary-color: #00aeff; --accent-color: #00e5ff; --heading-color: #ffffff;
      --border-color: #4f5b6a; --shadow-color: rgba(0,0,0,0.3);
      --column-bg: rgba(44,62,80,0.2); --column-header-color: var(--accent-color);
      --placeholder-text-color: #95a5a6; --button-edit-bg: rgba(255,255,255,0.1);
      --button-edit-hover-bg: rgba(255,255,255,0.2);
      
      /* Variables RGB para opacidad en tema oscuro */
      --card-bg-color-rgb: 44,62,80;
      --text-color-rgb: 224,224,224;
      }
    body { font-family:var(--font-secondary); min-height:100vh; background-color:var(--bg-color); background-size:cover; background-position:center; background-attachment:fixed; color:var(--text-color); transition:background-color .3s,color .3s; touch-action:manipulation; padding-top:80px; }
    
    .main-app-container { max-width:100%; margin:0 auto; padding:20px; }
    
.filters-search-bar {
        position:fixed; top:0; left:0; width:100%; background-color:var(--card-bg-color); padding:15px 20px; box-shadow:0 2px 10px var(--shadow-color); z-index:1001; display:flex; flex-wrap:wrap; gap:15px; align-items:center;
    }
    .filters-search-bar input[type="search"], .filters-search-bar select { padding:10px; border:1px solid var(--border-color); border-radius:6px; background-color:var(--bg-color); color:var(--text-color); font-family:var(--font-secondary); }
    .filters-search-bar input[type="search"] { flex-grow:1; min-width:200px; }
    .filters-search-bar label { margin-right:5px; font-weight:600; color:var(--text-color); }
    .filters-search-bar .theme-switcher-btn { padding:10px 15px; background-color:var(--primary-color); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
    .filters-search-bar .theme-switcher-btn:hover { opacity:.9; }

    
   /* Estilos para el botón "Ver los diferentes estilos" */
.view-styles-btn {
    display: block; /* <-- CAMBIO CLAVE: fuerza al botón a ocupar su propia línea */
    width: fit-content; /* Hacemos que el ancho se ajuste a su contenido */
    margin-left: auto; /* Centramos el bloque del botón */
    margin-right: auto; /* Centramos el bloque del botón */
    margin-bottom: 10px; /* Espacio mínimo entre este botón y el título de abajo */
    text-decoration: none;
    
    /* Copiamos los estilos de .section-title */
    font-family: var(--font-primary);
    color: var(--heading-color);
    background-color: rgba(var(--card-bg-color-rgb), 10);
    border-radius: 10px;
    box-shadow: 0 3px 7px var(--shadow-color);
    padding: 12px 30px;
    font-size: 30px; /* Un poco más pequeño que el título principal para crear jerarquía */
    border: none;
    cursor: pointer;
    white-space: nowrap;  
    transition: opacity 0.2s ease;
}
.view-styles-btn:hover {
    opacity: 0.85; /* Efecto hover sutil */
}

/* Ajustamos el contenedor de los títulos */
.section-title-wrapper {
    text-align: center;
    margin: 40px 0 25px 0;
    position: relative;  
    padding-top: 0; /* Eliminamos el padding superior que ya no es necesario */
}
    .section-title {
        font-family: var(--font-primary);
        color: var(--heading-color);
        font-size: 28px;
        border-bottom: none;
        padding: 12px 30px;
        display: inline-block;
        background-color: rgba(var(--card-bg-color-rgb), 0.75);
        border-radius: 10px;
        box-shadow: 0 3px 7px var(--shadow-color);
    }
    .add-item-btn {
        display: none; margin: 0 auto 25px auto; padding: 10px 20px;
        background-color: var(--primary-color); color: white; border: none;
        border-radius: 6px; cursor: pointer; font-weight: bold; text-align: center;
    }
    .add-item-btn:hover { opacity: 0.85; }
    body.edit-mode .add-item-btn { display: block; width: fit-content; }

    /* === ESTILOS SECCIÓN APPS IA === */
    .apps-ia-section .category-container {
        flex:1 1 100%; min-width:300px; background:var(--column-bg); backdrop-filter:var(--column-backdrop);
        border:1px solid var(--border-color); border-radius:15px; padding:20px;
        box-shadow:0 4px 12px var(--shadow-color); height:fit-content; margin-bottom:20px; position:relative;
    }

    .apps-ia-section .apps-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
    }
    .apps-ia-section .app-card {
        background-color: var(--card-bg-color);
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 2px 8px var(--shadow-color);
        display: flex;
        flex-direction: column;
        gap: 10px;
        transition: transform .2s ease, box-shadow .2s ease;
        position: relative;

    }

    .apps-ia-section .app-card:hover { transform:translateY(-5px); box-shadow:0 6px 15px var(--shadow-color); }
    .apps-ia-section .app-card .app-header { display:flex; align-items:center; gap:10px; }
    .apps-ia-section .app-card .app-logo { width:50px; height:50px; object-fit:contain; border-radius:8px; background-color:var(--bg-color); cursor:pointer; }
    .apps-ia-section .app-card .app-logo.interactive-image-thumbnail:hover { transform:scale(1.2); z-index: 10; transition: transform .2s ease; }

    .apps-ia-section .app-card .app-name { font-family:var(--font-primary); font-size:18px; font-weight:600; color:var(--heading-color); }
    .apps-ia-section .app-card .app-brief-description { font-size:14px; line-height:1.4; color:var(--text-color); flex-grow:1; min-height:40px; }
    .apps-ia-section .app-card .app-tags-pricing { display:flex; justify-content:space-between; align-items:center; font-size:12px; margin-top:10px; }
    .apps-ia-section .app-card .app-tags span, .apps-ia-section .app-card .app-pricing span { background-color:var(--accent-color); color:white; padding:3px 8px; border-radius:12px; opacity:.85; }
    .apps-ia-section .app-card .app-tags { display:flex; flex-wrap:wrap; gap:5px; }
    .apps-ia-section .app-card .app-tags .tag { background-color:var(--primary-color); opacity:.7; }
    .apps-ia-section .app-card .app-actions { display:flex; gap:10px; margin-top:auto; }

    /* === CORRECCIÓN: Estilo de botones de tarjeta de App === */
    .apps-ia-section .app-card .app-actions button {
        flex-grow:1;
        padding:10px 15px;
        border:none;
        border-radius:6px;
        cursor:pointer;
        font-weight:bold;
        transition:background-color .2s,opacity .2s;
        color:white;
    }
    .apps-ia-section .app-card .app-actions .visit-site-btn { background-color:var(--primary-color); }
    .apps-ia-section .app-card .app-actions .more-info-btn { background-color:var(--primary-color); }

    .apps-ia-section .app-card .app-actions button:hover { opacity:.85; }
    .apps-ia-section .app-card .app-actions button:disabled { background-color:#ccc; cursor:not-allowed; opacity:.7; }
    body.dark-theme .apps-ia-section .app-card .app-actions button:disabled { background-color:#555; color:#aaa; }
    .apps-ia-section .app-card .new-badge { position:absolute; top:-5px; right:-5px; background-color:#ff4757; color:white; padding:3px 8px; font-size:10px; font-weight:bold; border-radius:5px; transform:rotate(10deg); z-index:1; }
    .apps-ia-section .app-card .item-edit-buttons { display:none; position:absolute; top:5px; right:5px; background:rgba(var(--card-bg-color-rgb),.9); padding:5px; border-radius:5px; z-index:10; }
    .apps-ia-section .app-card .item-edit-buttons button { background:transparent; border:none; color:var(--text-color); cursor:pointer; font-size:14px; margin:0 2px; }
    .apps-ia-section .app-card .item-edit-buttons button:hover { color:var(--primary-color); }
    .apps-ia-section .app-card .item-order-buttons { display:none; justify-content:center; gap:10px; margin-top:10px; }
    body.edit-mode .apps-ia-section .app-card .item-edit-buttons,
    body.edit-mode .apps-ia-section .app-card .item-order-buttons { display:flex; }
    .apps-ia-section .app-card .item-order-buttons button { background:var(--button-edit-bg); color:var(--text-color); border:1px solid var(--border-color); padding:5px 10px; border-radius:4px; cursor:pointer; font-size:1em; }
    .apps-ia-section .app-card .item-order-buttons button:hover { background:var(--button-edit-hover-bg); }
    .apps-ia-section .app-card .item-order-buttons button:disabled { opacity:.5; cursor:not-allowed; }
    .apps-ia-section .initial-load-message, .apps-ia-section .no-items-message { width:100%; text-align:center; font-size:1.2em; color:var(--placeholder-text-color); margin-top:30px; padding:20px; }
    .apps-ia-section .category-header .category-controls button { background:transparent; border:none; color:var(--text-color); cursor:pointer; font-size:1em; margin-left: 5px; display:none;}

    #priceFilteredAppsContainer { display: none; /* Oculto hasta que se filtre por precio */ }


    /* === ESTILOS SECCIÓN CARPETAS (para Prompts) === */
    .prompt-folders-section .folders-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
    }

    .prompt-folders-section .folder-item {
        background-color:var(--card-bg-color);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 2px 8px var(--shadow-color);
        width: 300px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        position: relative;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .prompt-folders-section .folder-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 15px var(--shadow-color);
    }

    .prompt-folders-section .folder-item .folder-header {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        margin-bottom: 5px;
    }

    .prompt-folders-section .folder-item .folder-icon {
        width: 50px;
        height: 50px;
        object-fit: contain;
        border-radius: 8px;
        background-color: var(--bg-color);
    }

    .prompt-folders-section .folder-item .folder-name {
        font-family: var(--font-primary);
        font-size: 18px;
        font-weight: 600;
        color: var(--heading-color);
        text-align: left;
        flex-grow: 1;
    }

    .prompt-folders-section .folder-item .folder-description {
        font-size: 14px;
        line-height: 1.4;
        color: var(--text-color);
        flex-grow: 1;
        min-height: 40px;
        text-align: left;
        width: 100%;
        word-wrap: break-word;
        margin-bottom: 10px;
    }
    .prompt-folders-section .folder-item .folder-description em {
        color: var(--placeholder-text-color);
    }

    .prompt-folders-section .folder-item .item-edit-buttons,
    .prompt-folders-section .folder-item .item-order-buttons {
        display: none;
        position: absolute;
        top: 5px;
        gap: 5px;
    }
    .prompt-folders-section .folder-item .item-edit-buttons { right: 5px; }
    .prompt-folders-section .folder-item .item-order-buttons { left: 5px; }

    body.edit-mode .prompt-folders-section .folder-item .item-edit-buttons,
    body.edit-mode .prompt-folders-section .folder-item .item-order-buttons { display: flex; }

    .prompt-folders-section .folder-item .item-edit-buttons button,
    .prompt-folders-section .folder-item .item-order-buttons button {
        background: var(--button-edit-bg);
        color: var(--text-color);
        border: 1px solid var(--border-color);
        padding: 3px 7px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.9em;
    }
    .prompt-folders-section .folder-item .item-edit-buttons button:hover,
    .prompt-folders-section .folder-item .item-order-buttons button:hover {
        background: var(--button-edit-hover-bg);
    }

    .prompt-folders-section .no-items-message {
        text-align:center;
        font-size:1.2em;
        color:var(--placeholder-text-color);
        margin-top:30px;
        padding:20px;
    }

   /* =================================================================== */
/* === ESTILOS PARA EL POPUP DE PROMPTS DE UNA CARPETA (CORREGIDO) === */
/* =================================================================== */

/* Contenedor principal del menú popup */
.folder-prompts-menu {
    display: none; 
    position: absolute; 
    background-color: var(--card-bg-color);
    border: 1px solid var(--border-color); 
    border-radius: 8px; 
    box-shadow: 0 4px 12px var(--shadow-color);
    padding: 10px; 
    z-index: 1010; 
    width: 300px; 
    max-height: 400px; 
    display: flex; /* Usamos flexbox para posicionar el botón "Hecho" abajo */
    flex-direction: column;
}

.folder-prompts-menu ul { 
    list-style: none; 
    padding: 0; 
    margin: 0;
    overflow-y: auto; /* Scroll para la lista si es muy larga */
    flex-grow: 1; /* La lista ocupa el espacio disponible */
}

/* Cada elemento (fila) de la lista de prompts */
.folder-prompts-menu li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 0;
    border-bottom: 1px solid var(--border-color);
}

.folder-prompts-menu li:last-child {
    border-bottom: none;
}

/* El enlace del título del prompt */
.folder-prompts-menu li a.prompt-title-link {
    flex-grow: 1;
    display: block;
    padding: 8px 5px;
    color: var(--text-color);
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
}

body:not(.edit-mode) .folder-prompts-menu li a.prompt-title-link:hover {
    background-color: var(--bg-color);
}

body.edit-mode .folder-prompts-menu li a.prompt-title-link:hover {
    color: var(--accent-color);
}

/* Contenedor para los botones (subir, bajar, etc.) */
.folder-prompts-menu li .prompt-controls {
    display: none; /* Oculto por defecto */
    flex-shrink: 0;
    gap: 5px;
}

/* Se muestra solo en modo edición */
body.edit-mode .folder-prompts-menu li .prompt-controls {
    display: flex;
}

.folder-prompts-menu li .prompt-controls button {
    background: var(--button-edit-bg);
    color: var(--text-color);
    border: 1px solid var(--border-color);
    padding: 3px 7px;
    border-radius: 4px;
    cursor: pointer;
}
.folder-prompts-menu li .prompt-controls button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

/* Botón "Hecho" al final del popup */
.folder-prompts-menu .close-folder-menu-btn {
    margin-top: 10px; /* Espacio entre la lista y el botón */
    padding: 8px 15px;
    background-color: var(--primary-color);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    width: 100%;
}
.folder-prompts-menu .close-folder-menu-btn:hover {
    opacity: 0.85;
}

/* El popup que muestra la descripción al hacer hover sobre un título */
.prompt-link-description-popup {
    display: none; 
    position: absolute;
    background-color: #1A1D21; /* Fondo oscuro como pediste */
    color: var(--text-color);
    padding: 10px 15px; 
    border-radius: 6px;
    border: 1px solid var(--border-color);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    width: 300px; /* Ancho fijo */
    z-index: 1012; 
    pointer-events: none; /* Crucial para que no interfiera con el ratón */
    font-size: 14px; 
    line-height: 1.5;
    max-height: 250px; 
    overflow-y: auto;
}

/* El popup que muestra la descripción al hacer hover sobre un título */
.prompt-link-description-popup {
    display: none; 
    position: absolute;
    background-color: #1A1D21;
    color: var(--text-color);
    padding: 10px 15px; 
    border-radius: 6px;
    border: 1px solid var(--border-color);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    width: 300px;
    z-index: 1012; 
    pointer-events: none;
    font-size: 14px; 
    line-height: 1.5;
    max-height: 250px; 
    overflow-y: auto;
}

    /* === ESTILOS SECCIÓN PROMPTS === */

        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        margin-bottom: 30px;
    }

body.edit-mode .prompts-section #promptsListContainer {

}

.prompts-section #activePromptDisplayArea {

<button id="scrollToTopBtn" class="scroll-to-top-floating-btn" title="Ir al inicio"><i class="fas fa-arrow-up"></i></button>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
        console.log("DOM completamente cargado. Iniciando App Centro de Comandos IA...");

        // ESTADO DE LA APLICACIÓN Y VARIABLES
        let appData = {
            settings: { background: '', theme: 'dark', lastAppPricingFilter: '_all_' },
            aiAppsCategories: [],
            prompts: [],
            promptFolders: []
        };
        let isEditable = false;
        let currentPassword = "";
        // -- INICIO DE BLOQUE CORREGIDO --
        let activePopups = {
            folderMenu: null
        };
        let closeMenuTimer = null;
        // -- FIN DE BLOQUE CORREGIDO --
        
        // ELEMENTOS DEL DOM
        const globalSearchInput = document.getElementById('globalSearchInput');
        const appPricingFilter = document.getElementById('appPricingFilter');
        const themeSwitcherBtn = document.getElementById('themeSwitcherBtn');
        const scrollToFoldersBtn = document.getElementById('scrollToFoldersBtn');
        const scrollToTopBtn = document.getElementById('scrollToTopBtn');
        
        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 100) {
                scrollToTopBtn.style.display = 'block';
            } else {
                scrollToTopBtn.style.display = 'none';
            }
        });
        
        const aiAppsCategoriesContainer = document.getElementById('aiAppsCategoriesContainer');
        const noAppCategoriesMessage = document.getElementById('noAppCategoriesMessage');
        const addAppCategoryBtn = document.getElementById('addAppCategoryBtn');
        const promptFoldersGridContainer = document.getElementById('promptFoldersGridContainer');
        const noPromptFoldersMessage = document.getElementById('noPromptFoldersMessage');
        const addPromptFolderBtn = document.getElementById('addPromptFolderBtn');
        const promptsListContainer = document.getElementById('promptsListContainer');
        const activePromptDisplayArea = document.getElementById('activePromptDisplayArea');
        const noPromptsMessage = document.getElementById('noPromptsMessage');
        const addPromptBtn = document.getElementById('addPromptBtn');
        const hiddenBgInput = document.getElementById('hiddenBgInput');
        const changeBgBtn = document.getElementById('changeBgBtn');
        const orderAppCategoriesBtn = document.getElementById('orderAppCategoriesBtn');
        const editModeToggleBtn = document.getElementById('edit-mode-toggle-btn');
        const adminPasswordModal = document.getElementById('adminPasswordModal');
        const adminPasswordInput = document.getElementById('adminPasswordInput');
        const submitAdminPasswordBtn = document.getElementById('submitAdminPasswordBtn');
        const cancelAdminPasswordBtn = document.getElementById('cancelAdminPasswordBtn');
        const appCategoryOrderModal = document.getElementById('appCategoryOrderModal');
        const appCategoryOrderList = document.getElementById('appCategoryOrderList');
        const closeAppCategoryOrderModalBtn = document.getElementById('closeAppCategoryOrderModalBtn');
        const formModal = document.getElementById('formModal');
        const genericFormContainer = document.getElementById('genericFormContainer');
        const fullscreenImageViewer = document.getElementById('fullscreenImageViewer');
        const fullscreenImage = fullscreenImageViewer.querySelector('img');
        const closeFullscreenBtn = fullscreenImageViewer.querySelector('.close-fullscreen-btn');
        let tempPromptImageFiles = [];
        let currentEditingPromptImages = [];

        // INICIALIZACIÓN
        async function loadInitialData() {
            showLoadingMessage("Cargando datos...");
            try {
                const response = await fetch('/Paginas/pagina_apps_prompts_imagenes/load_state.php?t=' + Date.now());
                if (!response.ok) throw new Error(`Error al cargar: ${response.status}`);
                const loadedData = await response.json();
                if (loadedData && !loadedData.error) {
                    appData.settings = { ...appData.settings, ...(loadedData.settings || {}) };
                    appData.aiAppsCategories = normalizeAppCategoriesData(loadedData.aiAppsCategories || []);
                    appData.prompts = normalizePromptsData(loadedData.prompts || []);
                    appData.promptFolders = normalizePromptFoldersData(loadedData.promptFolders || []);
                } else {
                    console.warn("No se cargaron datos o formato incorrecto. Usando defaults.");
                    initializeDefaultData();
                }
            } catch (error) {
                console.error('Error crítico en loadInitialData:', error);
                showPersistentMessage(`Error crítico: ${error.message}. Usando defaults.`, "error");
                initializeDefaultData();
            }
            applyInitialSettings();
            updateEditModeUI();
            clearLoadingMessage();
        }

        function initializeDefaultData() {
            appData.settings = { background: '', theme: 'dark', lastAppPricingFilter: '_all_' };
            appData.aiAppsCategories = [];
            appData.prompts = [];
            appData.promptFolders = [];
        }

        function normalizeAppCategoriesData(categories) {
            return (categories || []).map(cat => ({
                id: cat.id || `catApp_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                title: cat.title || "Categoría Sin Título",
                apps: (cat.apps || []).map(app => ({
                    id: app.id || `app_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                    name: app.name || "App Sin Nombre",
                    websiteUrl: app.websiteUrl || "",
                    logoUrl: app.logoUrl || "",
                    briefDescription: app.briefDescription || "",
                    detailedDescription: app.detailedDescription || "",
                    tags: Array.isArray(app.tags) ? app.tags : (typeof app.tags === 'string' ? app.tags.split(',').map(t => t.trim()).filter(Boolean) : []),
                    pricingModel: app.pricingModel || "Gratis",
                    tutorialUrl: app.tutorialUrl || "",
                    isPrivate: !!app.isPrivate,
                    timestampAdded: app.timestampAdded || Date.now(),
                    timestampUpdated: app.timestampUpdated || Date.now(),
                }))
            }));
        }

        function normalizePromptsData(prompts) {
            return (prompts || []).map(p => ({
                id: p.id || `prompt_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                title: p.title || "Prompt Sin Título",
                descriptionHTML: p.descriptionHTML || "",
                exampleImageUrls: Array.isArray(p.exampleImageUrls) ? p.exampleImageUrls.filter(url => typeof url === 'string') : [],
                promptText: p.promptText || "",
                englishPromptText: p.englishPromptText || "",
                folderId: p.folderId || null,
                timestampAdded: p.timestampAdded || Date.now(),
                timestampUpdated: p.timestampUpdated || Date.now(),
            }));
        }

        function normalizePromptFoldersData(folders) {
            return (folders || []).map(f => ({
                id: f.id || `folder_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                name: f.name || "Carpeta Sin Nombre",
                iconUrl: f.iconUrl || "",
                description: f.description || "",
                timestampAdded: f.timestampAdded || Date.now(),
                timestampUpdated: f.timestampUpdated || Date.now(),
            }));
        }
        
        function showLoadingMessage(message) { /* ... (sin cambios) ... */ let loadingDiv = document.getElementById('loadingOverlay'); if (!loadingDiv) { loadingDiv = document.createElement('div'); loadingDiv.id = 'loadingOverlay'; Object.assign(loadingDiv.style, { position: 'fixed', top: '0', left: '0', width: '100%', height: '100%', backgroundColor: 'rgba(0,0,0,0.7)', color: 'white', display: 'flex', justifyContent: 'center', alignItems: 'center', zIndex: '20000', fontSize: '2em', textAlign: 'center' }); document.body.appendChild(loadingDiv); } loadingDiv.textContent = message; loadingDiv.style.display = 'flex'; }
        function clearLoadingMessage() { /* ... (sin cambios) ... */ const loadingDiv = document.getElementById('loadingOverlay'); if (loadingDiv) loadingDiv.style.display = 'none'; }
        function showPersistentMessage(message, type = "info") { /* ... (sin cambios) ... */ if (type === "error") alert(`Error: ${message}`); else if (type === "success") alert(`Éxito: ${message}`); console.log(`${type.toUpperCase()}: ${message}`); }

        async function saveDataToBackend() { /* ... (sin cambios) ... */ if (!isEditable) return false; showLoadingMessage("Guardando cambios..."); const formData = new FormData(); formData.append('password', currentPassword); const dataToSave = JSON.parse(JSON.stringify(appData)); dataToSave.aiAppsCategories.forEach(cat => cat.apps.forEach(app => { if (app.logoUrl && typeof app.logoUrl !== 'string') app.logoUrl = null; })); dataToSave.prompts.forEach(p => p.exampleImageUrls = p.exampleImageUrls.filter(url => typeof url === 'string')); dataToSave.promptFolders.forEach(f => { if (f.iconUrl && typeof f.iconUrl !== 'string') f.iconUrl = null; }); formData.append('jsonData', JSON.stringify(dataToSave)); appData.prompts.forEach(prompt => { (prompt.exampleImageUrls || []).forEach((item, index) => { if (item instanceof File) formData.append(`prompt_image_${prompt.id}_${index}`, item, item.name); }); }); appData.promptFolders.forEach(folder => { if (folder.iconUrl instanceof File) formData.append(`folder_icon_${folder.id}`, folder.iconUrl, folder.iconUrl.name); }); appData.aiAppsCategories.forEach(category => { category.apps.forEach(app => { if (app.logoUrl instanceof File) formData.append(`app_logo_${app.id}`, app.logoUrl, app.logoUrl.name); }); }); try { const response = await fetch('/Paginas/pagina_apps_prompts_imagenes/guardar_cambios.php', { method: 'POST', body: formData }); if (!response.ok) { const errorText = await response.text(); throw new Error(`Error del servidor: ${response.status}. ${errorText}`); } const result = await response.json(); if (result.success) { console.log('Datos guardados con éxito.', result); if (result.filePaths) { updateLocalDataWithNewFilePaths(result.filePaths); } return true; } else { throw new Error(result.error || 'Error desconocido al guardar.'); } } catch (error) { console.error('Error en saveDataToBackend:', error); showPersistentMessage(`Error guardando: ${error.message}`, "error"); return false; } finally { clearLoadingMessage(); } }
        function updateLocalDataWithNewFilePaths(filePaths) { /* ... (sin cambios) ... */ (filePaths.prompts || []).forEach(fp => { const prompt = appData.prompts.find(p => p.id === fp.promptId); if (prompt) { const fileIndex = (prompt.exampleImageUrls || []).findIndex(item => item instanceof File && item.name === fp.originalName); if (fileIndex !== -1) { prompt.exampleImageUrls[fileIndex] = fp.newPath; } } }); (filePaths.folders || []).forEach(fp => { const folder = appData.promptFolders.find(f => f.id === fp.folderId); if (folder && folder.iconUrl instanceof File && folder.iconUrl.name === fp.originalName) { folder.iconUrl = fp.newPath; } }); (filePaths.apps || []).forEach(fp => { const app = appData.aiAppsCategories.flatMap(c => c.apps).find(a => a.id === fp.appId); if (app && app.logoUrl instanceof File && app.logoUrl.name === fp.originalName) { app.logoUrl = fp.newPath; } }); }

        // --- RENDERIZADO ---
        function renderAll() { renderFilteredApps(); renderPromptFolders(); renderPrompts(); updateFilterUIDefaults(); }

        /**

        function closeActivePopups() {

        /**
         * Mueve un prompt arriba o abajo DENTRO de su carpeta, afectando el orden global.
         */
        function movePromptInFolder(promptId, folderId, direction) {
            // 1. Obtener los índices GLOBALES de todos los prompts que pertenecen a esta carpeta
            const siblingIndices = appData.prompts
                .map((p, index) => (p.folderId === folderId ? index : -1))
                .filter(index => index !== -1);
            
            // 2. Encontrar el índice GLOBAL del prompt que queremos mover
            const currentGlobalIndex = appData.prompts.findIndex(p => p.id === promptId);
            if (currentGlobalIndex === -1) return;

            // 3. Encontrar la posición LOCAL de nuestro prompt dentro de la lista de hermanos
            const currentLocalIndex = siblingIndices.indexOf(currentGlobalIndex);
            if (currentLocalIndex === -1) return;

            // 4. Calcular la nueva posición LOCAL
            const newLocalIndex = currentLocalIndex + direction;

            // 5. Validar que la nueva posición está dentro de los límites
            if (newLocalIndex < 0 || newLocalIndex >= siblingIndices.length) return;

            // 6. Obtener los índices GLOBALES de origen y destino para el intercambio
            const sourceIndex = siblingIndices[currentLocalIndex];
            const targetIndex = siblingIndices[newLocalIndex];

            // 7. Realizar el intercambio en el array principal de datos
            const temp = appData.prompts[sourceIndex];
            appData.prompts[sourceIndex] = appData.prompts[targetIndex];
            appData.prompts[targetIndex] = temp;
        }

        function handleImageClickForFullscreen(event) { if (event.currentTarget.src && !event.currentTarget.src.includes('via.placeholder.com')) { openFullscreenImage(event.currentTarget.src); } }
        function copyToClipboard(text, message = "Copiado.") { navigator.clipboard.writeText(text).then(() => showPersistentMessage(message, "success")).catch(err => { console.error('Error copiando:', err); showPersistentMessage('Error al copiar.', "error");}); }
        
        // --- EVENT LISTENERS GLOBALES ---
        editModeToggleBtn.addEventListener('click', toggleEditMode);
        submitAdminPasswordBtn.addEventListener('click', handlePasswordSubmit);
        adminPasswordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); handlePasswordSubmit(); } });
        cancelAdminPasswordBtn.addEventListener('click', () => adminPasswordModal.style.display = 'none');
        themeSwitcherBtn.addEventListener('click', toggleTheme);
        scrollToTopBtn.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'instant' }); });
        scrollToFoldersBtn.addEventListener('click', () => { const foldersSection = document.getElementById('promptFoldersSection'); if (foldersSection) { foldersSection.scrollIntoView({ behavior: 'instant' }); } });
        changeBgBtn.addEventListener('click', () => { if(isEditable) hiddenBgInput.click() });
        hiddenBgInput.addEventListener('change', handleBackgroundChange);
        orderAppCategoriesBtn.addEventListener('click', openAppCategoryOrderModal);
        appCategoryOrderList.addEventListener('click', handleAppCategoryOrderChange);
        closeAppCategoryOrderModalBtn.addEventListener('click', closeAndSaveAppCategoryOrder);
        addAppCategoryBtn.addEventListener('click', handleAddAppCategory);
        addPromptBtn.addEventListener('click', () => openPromptForm());
        addPromptFolderBtn.addEventListener('click', () => openPromptFolderForm());
        globalSearchInput.addEventListener('input', applyFiltersAndSort);
        appPricingFilter.addEventListener('change', applyFiltersAndSort);
        closeFullscreenBtn.addEventListener('click', closeFullscreenImage);
        fullscreenImageViewer.addEventListener('click', (e) => { if (e.target === fullscreenImageViewer) closeFullscreenImage(); });
        document.addEventListener('keydown', (e) => { if (e.key === "Escape") { if (fullscreenImageViewer.style.display === 'flex') closeFullscreenImage(); else if (formModal.style.display === 'flex') closeFormModal(); else if (adminPasswordModal.style.display === 'flex') adminPasswordModal.style.display = 'none'; else if (appCategoryOrderModal.style.display === 'flex') appCategoryOrderModal.style.display = 'none'; else closeActivePopups(); } });
        
        // ===== CAMBIO CLAVE: Listener global para cerrar el popup si se hace clic fuera =====
        document.addEventListener('click', (e) => { 
            // Cierra el popup de la carpeta solo si está abierto y el clic fue fuera de él y fuera de una tarjeta de carpeta
            if (activePopups.folderMenu && !activePopups.folderMenu.contains(e.target) && !e.target.closest('.folder-item')) {
                 closeActivePopups();
            }
        });

        // ARRANQUE
        loadInitialData();
    });
</script>
</body>
</html>
