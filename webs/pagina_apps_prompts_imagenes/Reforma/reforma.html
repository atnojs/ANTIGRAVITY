<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página en mantenimiento</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #000;
    }
    img.fullscreen {
      width: 100%;
      height: 100%;
      object-fit: contain; /* <- muestra toda la imagen */
      object-position: center;
      display: block;
    }
  </style>
</head>
<body>
  <img src="reforma.png" alt="Página en mantenimiento" class="fullscreen">
</body>
</html>
