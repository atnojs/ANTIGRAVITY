</head>
  <body class="bg-white text-zinc-800">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
      import { GoogleGenAI } from "https://esm.sh/@google/genai@^1.10.0";

      // =================================================================
      // Gemini Service (from services/geminiService.ts)
      // =================================================================
      const getImageDimensions = (file) => {
          return new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.readAsDataURL(file);
              reader.onload = (event) => {
                  if (!event.target?.result) {
                      return reject(new Error("Failed to read file."));
                  }
                  const img = new Image();
                  img.src = event.target.result;
                  img.onload = () => {
                      resolve({ width: img.naturalWidth, height: img.naturalHeight });
                  };
                  img.onerror = (err) => reject(new Error(`Image load error: ${err}`));
              };
              reader.onerror = (err) => reject(new Error(`File reader error: ${err}`));
          });
      };

      const cropToOriginalAspectRatio = (
          imageDataUrl,
          originalWidth,
          originalHeight,
          targetDimension
      ) => {
          return new Promise((resolve, reject) => {
              const img = new Image();
              img.src = imageDataUrl;
              img.onload = () => {
                  const aspectRatio = originalWidth / originalHeight;
                  let contentWidth, contentHeight;
                  if (aspectRatio > 1) { // Landscape
                      contentWidth = targetDimension;
                      contentHeight = targetDimension / aspectRatio;
                  } else { // Portrait or square
                      contentHeight = targetDimension;
                      contentWidth = targetDimension * aspectRatio;
                  }

                  const x = (targetDimension - contentWidth) / 2;
                  const y = (targetDimension - contentHeight) / 2;

                  const canvas = document.createElement('canvas');
                  canvas.width = contentWidth;
                  canvas.height = contentHeight;

                  const ctx = canvas.getContext('2d');
                  if (!ctx) {
                      return reject(new Error('Could not get canvas context for cropping.'));
                  }
                  
                  ctx.drawImage(img, x, y, contentWidth, contentHeight, 0, 0, contentWidth, contentHeight);
                  resolve(canvas.toDataURL('image/jpeg', 0.95));
              };
              img.onerror = (err) => reject(new Error(`Image load error during cropping: ${err}`));
          });
      };

      const resizeImage = (file, targetDimension) => {
          return new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.readAsDataURL(file);
              reader.onload = (event) => {
                  if (!event.target?.result) {
                      return reject(new Error("Failed to read file."));
                  }
                  const img = new Image();
                  img.src = event.target.result;
                  img.onload = () => {
                      const canvas = document.createElement('canvas');
                      canvas.width = targetDimension;
                      canvas.height = targetDimension;

                      const ctx = canvas.getContext('2d');
                      if (!ctx) {
                          return reject(new Error('Could not get canvas context.'));
                      }

                      ctx.fillStyle = 'black';
                      ctx.fillRect(0, 0, targetDimension, targetDimension);

                      const aspectRatio = img.width / img.height;
                      let newWidth, newHeight;

                      if (aspectRatio > 1) {
                          newWidth = targetDimension;
                          newHeight = targetDimension / aspectRatio;
                      } else {
                          newHeight = targetDimension;
                          newWidth = targetDimension * aspectRatio;
                      }

                      const x = (targetDimension - newWidth) / 2;
                      const y = (targetDimension - newHeight) / 2;
                      
                      ctx.drawImage(img, x, y, newWidth, newHeight);

                      canvas.toBlob((blob) => {
                          if (blob) {
                              resolve(new File([blob], file.name, {
                                  type: 'image/jpeg',
                                  lastModified: Date.now()
                              }));
                          } else {
                              reject(new Error('Canvas to Blob conversion failed.'));
                          }
                      }, 'image/jpeg', 0.95);
                  };
                  img.onerror = (err) => reject(new Error(`Image load error: ${err}`));
              };
              reader.onerror = (err) => reject(new Error(`File reader error: ${err}`));
          });
      };

      const fileToPart = async (file) => {
          const dataUrl = await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.readAsDataURL(file);
              reader.onload = () => resolve(reader.result);
              reader.onerror = error => reject(error);
          });
          
          const arr = dataUrl.split(',');
          if (arr.length < 2) throw new Error("Invalid data URL");
          const mimeMatch = arr[0].match(/:(.*?);/);
          if (!mimeMatch || !mimeMatch[1]) throw new Error("Could not parse MIME type from data URL");
          
          const mimeType = mimeMatch[1];
          const data = arr[1];
          return { inlineData: { mimeType, data } };
      };

      const fileToDataUrl = (file) => {
          return new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.readAsDataURL(file);
              reader.onload = () => resolve(reader.result);
              reader.onerror = error => reject(error);
          });
      };

      const markImage = async (
          paddedSquareFile, 
          position,
          originalDimensions
      ) => {
          return new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.readAsDataURL(paddedSquareFile);
              reader.onload = (event) => {
                  if (!event.target?.result) {
                      return reject(new Error("Failed to read file for marking."));
                  }
                  const img = new Image();
                  img.src = event.target.result;
                  img.onload = () => {
                      const canvas = document.createElement('canvas');
                      canvas.width = img.width;
                      canvas.height = img.height;
                      const targetDimension = canvas.width;

                      const ctx = canvas.getContext('2d');
                      if (!ctx) {
                          return reject(new Error('Could not get canvas context for marking.'));
                      }

                      ctx.drawImage(img, 0, 0);

                      const { originalWidth, originalHeight } = originalDimensions;
                      const aspectRatio = originalWidth / originalHeight;
                      let contentWidth, contentHeight;

                      if (aspectRatio > 1) {
                          contentWidth = targetDimension;
                          contentHeight = targetDimension / aspectRatio;
                      } else {
                          contentHeight = targetDimension;
                          contentWidth = targetDimension * aspectRatio;
                      }
                      
                      const offsetX = (targetDimension - contentWidth) / 2;
                      const offsetY = (targetDimension - contentHeight) / 2;

                      const markerXInContent = (position.xPercent / 100) * contentWidth;
                      const markerYInContent = (position.yPercent / 100) * contentHeight;
                      
                      const finalMarkerX = offsetX + markerXInContent;
                      const finalMarkerY = offsetY + markerYInContent;

                      const markerRadius = Math.max(5, Math.min(canvas.width, canvas.height) * 0.015);

                      ctx.beginPath();
                      ctx.arc(finalMarkerX, finalMarkerY, markerRadius, 0, 2 * Math.PI, false);
                      ctx.fillStyle = 'red';
                      ctx.fill();
                      ctx.lineWidth = markerRadius * 0.2;
                      ctx.strokeStyle = 'white';
                      ctx.stroke();

                      canvas.toBlob((blob) => {
                          if (blob) {
                              resolve(new File([blob], `marked-${paddedSquareFile.name}`, {
                                  type: 'image/jpeg',
                                  lastModified: Date.now()
                              }));
                          } else {
                              reject(new Error('Canvas to Blob conversion failed during marking.'));
                          }
                      }, 'image/jpeg', 0.95);
                  };
                  img.onerror = (err) => reject(new Error(`Image load error during marking: ${err}`));
              };
              reader.onerror = (err) => reject(new Error(`File reader error during marking: ${err}`));
          });
      };

      const generateCompositeImage = async (
          objectImage, 
          objectDescription,
          environmentImage,
          environmentDescription,
          dropPosition
      ) => {
        console.log('Starting multi-step image generation process...');
        const ai = new GoogleGenAI({ apiKey: process.env.API_KEY });

        const { width: originalWidth, height: originalHeight } = await getImageDimensions(environmentImage);
        
        const MAX_DIMENSION = 1024;
        
        console.log('Resizing product and scene images...');
        const resizedObjectImage = await resizeImage(objectImage, MAX_DIMENSION);
        const resizedEnvironmentImage = await resizeImage(environmentImage, MAX_DIMENSION);

        console.log('Marking scene image for analysis...');
        const markedResizedEnvironmentImage = await markImage(resizedEnvironmentImage, dropPosition, { originalWidth, originalHeight });

        const debugImageUrl = await fileToDataUrl(markedResizedEnvironmentImage);

        console.log('Generating semantic location description...');
        
        const markedEnvironmentImagePart = await fileToPart(markedResizedEnvironmentImage);

        const descriptionPrompt = `
You are an expert scene analyst. I will provide you with an image that has a red marker on it.
Your task is to provide a very dense, semantic description of what is at the exact location of the red marker.
Be specific about surfaces, objects, and spatial relationships. This description will be used to guide another AI in placing a new object.

Example semantic descriptions:
- "The product location is on the dark grey fabric of the sofa cushion, in the middle section, slightly to the left of the white throw pillow."
- "The product location is on the light-colored wooden floor, in the patch of sunlight coming from the window, about a foot away from the leg of the brown leather armchair."
- "The product location is on the white marble countertop, just to the right of the stainless steel sink and behind the green potted plant."

On top of the semantic description above, give a rough relative-to-image description.

Example relative-to-image descriptions:
- "The product location is about 10% away from the bottom-left of the image."
- "The product location is about 20% away from the right of the image."

Provide only the two descriptions concatenated in a few sentences.
`;
        
        let semanticLocationDescription = '';
        try {
            const descriptionResponse = await ai.models.generateContent({
              model: 'gemini-3.1-flash-image-preview',
              contents: { parts: [{ text: descriptionPrompt }, markedEnvironmentImagePart] }
            });
            semanticLocationDescription = descriptionResponse.text;
            console.log('Generated description:', semanticLocationDescription);
        } catch (error) {
            console.error('Failed to generate semantic location description:', error);
            semanticLocationDescription = `at the specified location.`;
        }

        console.log('Preparing to generate composite image...');
        
        const objectImagePart = await fileToPart(resizedObjectImage);
        const cleanEnvironmentImagePart = await fileToPart(resizedEnvironmentImage);
        
        const prompt = `
**Role:**
You are a visual composition expert. Your task is to take a 'product' image and seamlessly integrate it into a 'scene' image, adjusting for perspective, lighting, and scale.

**Specifications:**
-   **Product to add:**
    The first image provided. It may be surrounded by black padding or background, which you should ignore and treat as transparent and only keep the product.
-   **Scene to use:**
    The second image provided. It may also be surrounded by black padding, which you should ignore.
-   **Placement Instruction (Crucial):**
    -   You must place the product at the location described below exactly. You should only place the product once. Use this dense, semantic description to find the exact spot in the scene.
    -   **Product location Description:** "${semanticLocationDescription}"
-   **Final Image Requirements:**
    -   The output image's style, lighting, shadows, reflections, and camera perspective must exactly match the original scene.
    -   Do not just copy and paste the product. You must intelligently re-render it to fit the context. Adjust the product's perspective and orientation to its most natural position, scale it appropriately, and ensure it casts realistic shadows according to the scene's light sources.
    -   The product must have proportional realism. For example, a lamp product can't be bigger than a sofa in scene.
    -   You must not return the original scene image without product placement. The product must be always present in the composite image.

The output should ONLY be the final, composed image. Do not add any text or explanation.
`;

        const textPart = { text: prompt };
        
        console.log('Sending images and augmented prompt...');
        
        const response = await ai.models.generateContent({
          model: 'gemini-3.1-flash-image-preview',
          contents: { parts: [objectImagePart, cleanEnvironmentImagePart, textPart] },
        });

        console.log('Received response.');
        
        const imagePartFromResponse = response.candidates?.[0]?.content?.parts?.find(part => part.inlineData);

        if (imagePartFromResponse?.inlineData) {
          const { mimeType, data } = imagePartFromResponse.inlineData;
          console.log(`Received image data (${mimeType}), length:`, data.length);
          const generatedSquareImageUrl = `data:${mimeType};base64,${data}`;
          
          console.log('Cropping generated image to original aspect ratio...');
          const finalImageUrl = await cropToOriginalAspectRatio(
              generatedSquareImageUrl,
              originalWidth,
              originalHeight,
              MAX_DIMENSION
          );
          
          return { finalImageUrl, debugImageUrl, finalPrompt: prompt };
        }

        console.error("Model response did not contain an image part.", response);
        throw new Error("The AI model did not return an image. Please try again.");
      };

      // =================================================================
      // React Components
      // =================================================================
      const { useState, useCallback, useEffect, useRef, forwardRef, useImperativeHandle, StrictMode } = React;

      const Spinner = () => {
        return (
          <svg
            className="animate-spin h-16 w-16 text-zinc-800 mx-auto"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              className="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              strokeWidth="4"
            ></circle>
            <path
              className="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
        );
      };

      const TouchGhost = ({ imageUrl, position }) => {
        if (!imageUrl || !position) {
          return null;
        }
        const style = {
          position: 'fixed',
          left: position.x,
          top: position.y,
          transform: 'translate(-50%, -50%)',
          width: '120px',
          height: '120px',
          pointerEvents: 'none',
          zIndex: 9999,
        };
        return (
          <div style={style} className="bg-white/80 backdrop-blur-md rounded-2xl shadow-2xl p-2">
            <img
              src={imageUrl}
              alt="Dragging product"
              className="w-full h-full object-contain"
            />
          </div>
        );
      };
      
      const ObjectCard = ({ product, isSelected, onClick }) => {
          const cardClasses = `
              bg-white rounded-lg shadow-md overflow-hidden transition-all duration-300
              ${onClick ? 'cursor-pointer hover:shadow-xl hover:scale-105' : ''}
              ${isSelected ? 'border-2 border-blue-500 shadow-xl scale-105' : 'border border-zinc-200'}
          `;

          return (
              <div className={cardClasses} onClick={onClick}>
                  <div className="aspect-square w-full bg-zinc-100 flex items-center justify-center">
                      <img src={product.imageUrl} alt={product.name} className="w-full h-full object-contain" />
                  </div>
                  <div className="p-3 text-center">
                      <h4 className="text-sm font-semibold text-zinc-700 truncate">{product.name}</h4>
                  </div>
              </div>
          );
      };
      
      const Header = () => {
        return (
          <header className="w-full p-4 text-center">
            <div className="flex items-center justify-center">
                <h1 className="text-6xl md:text-8xl font-extrabold tracking-tight text-zinc-800">
                  Home Canvas
                </h1>
            </div>
            <p className="mt-4 text-lg text-zinc-600 max-w-3xl mx-auto">
              Simply upload photos of product and scene, then drag your product onto a perfect spot.
              <br />
              Gemini will create a photorealistic composite.
            </p>
          </header>
        );
      };
      
      const DebugModal = ({ isOpen, onClose, imageUrl, prompt }) => {
        if (!isOpen || !imageUrl) {
          return null;
        }

        const handleModalContentClick = (e) => {
          e.stopPropagation();
        };

        const CloseIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
        );

        return (
          <div 
            className="fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center p-4 animate-fade-in"
            onClick={onClose}
            aria-modal="true"
            role="dialog"
          >
            <div 
              className="bg-white rounded-xl shadow-2xl w-full max-w-4xl p-6 md:p-8 relative transform transition-all flex flex-col"
              style={{ maxHeight: '90vh' }}
              onClick={handleModalContentClick}
              role="document"
            >
              <button 
                onClick={onClose}
                className="absolute top-4 right-4 text-zinc-500 hover:text-zinc-800 transition-colors z-10"
                aria-label="Close modal"
              >
                <CloseIcon />
              </button>
              <div className="text-center mb-4 flex-shrink-0">
                <h2 className="text-2xl font-extrabold text-zinc-800">Debug View</h2>
              </div>
              
              <div className="flex flex-col gap-4 overflow-y-auto">
                <div>
                  <p className="text-zinc-600 mb-2">This is the image sent to the AI, with a red marker indicating the placement.</p>
                  <div className="rounded-lg overflow-hidden bg-zinc-100">
                      <img src={imageUrl} alt="Debug view of marked scene" className="w-full h-full object-contain" />
                  </div>
                </div>
                
                {prompt && (
                  <div>
                      <h3 className="text-lg font-bold text-zinc-800 mb-2">Final Prompt to Image Model</h3>
                      <pre className="bg-zinc-100 text-zinc-700 p-4 rounded-lg text-xs whitespace-pre-wrap">
                          <code>{prompt}</code>
                      </pre>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };
      
      const ImageUploader = forwardRef(({ id, label, onFileSelect, imageUrl, isDropZone = false, onProductDrop, persistedOrbPosition, showDebugButton, onDebugClick, isTouchHovering = false, touchOrbPosition = null }, ref) => {
        const inputRef = useRef(null);
        const imgRef = useRef(null);
        const [isDraggingOver, setIsDraggingOver] = useState(false);
        const [orbPosition, setOrbPosition] = useState(null);
        const [fileTypeError, setFileTypeError] = useState(null);

        useImperativeHandle(ref, () => imgRef.current);
        
        useEffect(() => {
          if (!imageUrl) {
            setFileTypeError(null);
          }
        }, [imageUrl]);

        const UploadIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" className="h-12 w-12 text-zinc-500 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1}>
              <path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
          </svg>
        );

        const WarningIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mr-2 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
              <path fillRule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.21 3.03-1.742 3.03H4.42c-1.532 0-2.492-1.696-1.742-3.03l5.58-9.92zM10 13a1 1 0 110-2 1 1 0 010 2zm-1-4a1 1 0 011-1h.01a1 1 0 110 2H10a1 1 0 01-1-1z" clipRule="evenodd" />
          </svg>
        );

        const handleFileChange = (event) => {
          const file = event.target.files?.[0];
          if (file) {
            const allowedTypes = ['image/jpeg', 'image/png'];
            if (!allowedTypes.includes(file.type)) {
              setFileTypeError('For best results, please use PNG, JPG, or JPEG formats.');
            } else {
              setFileTypeError(null);
            }
            onFileSelect(file);
          }
        };
        
        const handlePlacement = useCallback((clientX, clientY, currentTarget) => {
          const img = imgRef.current;
          if (!img || !onProductDrop) return;

          const containerRect = currentTarget.getBoundingClientRect();
          const { naturalWidth, naturalHeight } = img;
          const { width: containerWidth, height: containerHeight } = containerRect;
          const imageAspectRatio = naturalWidth / naturalHeight;
          const containerAspectRatio = containerWidth / containerHeight;
          let renderedWidth, renderedHeight;

          if (imageAspectRatio > containerAspectRatio) {
            renderedWidth = containerWidth;
            renderedHeight = containerWidth / imageAspectRatio;
          } else {
            renderedHeight = containerHeight;
            renderedWidth = containerHeight * imageAspectRatio;
          }
          
          const offsetX = (containerWidth - renderedWidth) / 2;
          const offsetY = (containerHeight - renderedHeight) / 2;
          const pointX = clientX - containerRect.left;
          const pointY = clientY - containerRect.top;
          const imageX = pointX - offsetX;
          const imageY = pointY - offsetY;

          if (imageX < 0 || imageX > renderedWidth || imageY < 0 || imageY > renderedHeight) {
            console.warn("Action was outside the image boundaries.");
            return;
          }

          const xPercent = (imageX / renderedWidth) * 100;
          const yPercent = (imageY / renderedHeight) * 100;

          onProductDrop({ x: pointX, y: pointY }, { xPercent, yPercent });
        }, [onProductDrop]);

        const handleClick = (event) => {
          if (isDropZone && onProductDrop) {
            handlePlacement(event.clientX, event.clientY, event.currentTarget);
          } else {
            inputRef.current?.click();
          }
        };
        
        const handleDragOver = useCallback((event) => {
            event.preventDefault();
            setIsDraggingOver(true);
            if (isDropZone && onProductDrop) {
                const rect = event.currentTarget.getBoundingClientRect();
                setOrbPosition({
                    x: event.clientX - rect.left,
                    y: event.clientY - rect.top
                });
            }
        }, [isDropZone, onProductDrop]);

        const handleDragLeave = useCallback((event) => {
            event.preventDefault();
            setIsDraggingOver(false);
            setOrbPosition(null);
        }, []);

        const handleDrop = useCallback((event) => {
            event.preventDefault();
            setIsDraggingOver(false);
            setOrbPosition(null);

            if (isDropZone && onProductDrop) {
                handlePlacement(event.clientX, event.clientY, event.currentTarget);
            } else {
                const file = event.dataTransfer.files?.[0];
                if (file && file.type.startsWith('image/')) {
                    const allowedTypes = ['image/jpeg', 'image/png'];
                    if (!allowedTypes.includes(file.type)) {
                        setFileTypeError('For best results, please use PNG, JPG, or JPEG formats.');
                    } else {
                        setFileTypeError(null);
                    }
                    onFileSelect(file);
                }
            }
        }, [isDropZone, onProductDrop, onFileSelect, handlePlacement]);
        
        const showHoverState = isDraggingOver || isTouchHovering;
        const currentOrbPosition = orbPosition || touchOrbPosition;
        const isActionable = isDropZone || !imageUrl;

        const uploaderClasses = `w-full aspect-video bg-zinc-100 border-2 border-dashed rounded-lg flex items-center justify-center transition-all duration-300 relative overflow-hidden ${
            showHoverState ? 'border-blue-500 bg-blue-50 is-dragging-over'
          : isDropZone ? 'border-zinc-400 cursor-crosshair'
          : 'border-zinc-300 hover:border-blue-500 cursor-pointer'
        } ${!isActionable ? 'cursor-default' : ''}`;

        return (
          <div className="flex flex-col items-center w-full">
            {label && <h3 className="text-xl font-semibold mb-4 text-zinc-700">{label}</h3>}
            <div
              className={uploaderClasses}
              onClick={isActionable ? handleClick : undefined}
              onDragOver={handleDragOver}
              onDragLeave={handleDragLeave}
              onDrop={handleDrop}
              data-dropzone-id={id}
            >
              <input
                type="file"
                id={id}
                ref={inputRef}
                onChange={handleFileChange}
                accept="image/png, image/jpeg"
                className="hidden"
              />
              {imageUrl ? (
                <>
                  <img 
                    ref={imgRef}
                    src={imageUrl} 
                    alt={label || 'Uploaded Scene'} 
                    className="w-full h-full object-contain" 
                  />
                  <div 
                      className="drop-orb" 
                      style={{ 
                          left: currentOrbPosition ? currentOrbPosition.x : -9999, 
                          top: currentOrbPosition ? currentOrbPosition.y : -9999 
                      }}
                  ></div>
                  {persistedOrbPosition && (
                      <div 
                          className="drop-orb" 
                          style={{ 
                              left: persistedOrbPosition.x, 
                              top: persistedOrbPosition.y,
                              opacity: 1,
                              transform: 'translate(-50%, -50%) scale(1)',
                              transition: 'none',
                          }}
                      ></div>
                  )}
                  {showDebugButton && onDebugClick && (
                      <button
                          onClick={(e) => {
                              e.stopPropagation();
                              onDebugClick();
                          }}
                          className="absolute bottom-2 right-2 bg-black bg-opacity-60 text-white text-xs font-semibold px-3 py-1.5 rounded-md hover:bg-opacity-80 transition-all z-20 shadow-lg"
                          aria-label="Show debug view"
                      >
                          Debug
                      </button>
                  )}
                </>
              ) : (
                <div className="text-center text-zinc-500 p-4">
                  <UploadIcon />
                  <p>Click to upload or drag & drop</p>
                </div>
              )}
            </div>
            {fileTypeError && (
              <div className="w-full mt-2 text-sm text-yellow-800 bg-yellow-100 border border-yellow-300 rounded-lg p-3 flex items-center animate-fade-in" role="alert">
                  <WarningIcon />
                  <span>{fileTypeError}</span>
              </div>
            )}
          </div>
        );
      });

      // =================================================================
      // Main App Component (from App.tsx)
      // =================================================================
      const App = () => {
        const [selectedProduct, setSelectedProduct] = useState(null);
        const [productImageFile, setProductImageFile] = useState(null);
        const [sceneImage, setSceneImage] = useState(null);
        const [isLoading, setIsLoading] = useState(false);
        const [error, setError] = useState(null);
        const [loadingMessageIndex, setLoadingMessageIndex] = useState(0);
        const [persistedOrbPosition, setPersistedOrbPosition] = useState(null);
        const [debugImageUrl, setDebugImageUrl] = useState(null);
        const [debugPrompt, setDebugPrompt] = useState(null);
        const [isDebugModalOpen, setIsDebugModalOpen] = useState(false);
        const [isTouchDragging, setIsTouchDragging] = useState(false);
        const [touchGhostPosition, setTouchGhostPosition] = useState(null);
        const [isHoveringDropZone, setIsHoveringDropZone] = useState(false);
        const [touchOrbPosition, setTouchOrbPosition] = useState(null);
        const sceneImgRef = useRef(null);
        
        const transparentDragImage = new Image();
        transparentDragImage.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';

        const loadingMessages = [
            "Analyzing your product...",
            "Surveying the scene...",
            "Describing placement location with AI...",
            "Crafting the perfect composition prompt...",
            "Generating photorealistic options...",
            "Assembling the final scene..."
        ];

        const dataURLtoFile = (dataurl, filename) => {
            const arr = dataurl.split(',');
            if (arr.length < 2) throw new Error("Invalid data URL");
            const mimeMatch = arr[0].match(/:(.*?);/);
            if (!mimeMatch || !mimeMatch[1]) throw new Error("Could not parse MIME type from data URL");

            const mime = mimeMatch[1];
            const bstr = atob(arr[1]);
            let n = bstr.length;
            const u8arr = new Uint8Array(n);
            while(n--){
                u8arr[n] = bstr.charCodeAt(n);
            }
            return new File([u8arr], filename, {type:mime});
        }

        const sceneImageUrl = sceneImage ? URL.createObjectURL(sceneImage) : null;
        const productImageUrl = selectedProduct ? selectedProduct.imageUrl : null;

        const handleProductImageUpload = useCallback((file) => {
          setError(null);
          try {
              const imageUrl = URL.createObjectURL(file);
              const product = {
                  id: Date.now(),
                  name: file.name,
                  imageUrl: imageUrl,
              };
              setProductImageFile(file);
              setSelectedProduct(product);
          } catch(err) {
            const errorMessage = err instanceof Error ? err.message : 'An unknown error occurred.';
            setError(`Could not load the product image. Details: ${errorMessage}`);
            console.error(err);
          }
        }, []);

        const handleInstantStart = useCallback(async () => {
          setError(null);
          try {
            const [objectResponse, sceneResponse] = await Promise.all([
              fetch('/assets/object.jpeg'),
              fetch('/assets/scene.jpeg')
            ]);

            if (!objectResponse.ok || !sceneResponse.ok) {
              throw new Error('Failed to load default images');
            }
            const [objectBlob, sceneBlob] = await Promise.all([
              objectResponse.blob(),
              sceneResponse.blob()
            ]);
            const objectFile = new File([objectBlob], 'object.jpeg', { type: 'image/jpeg' });
            const sceneFile = new File([sceneBlob], 'scene.jpeg', { type: 'image/jpeg' });
            setSceneImage(sceneFile);
            handleProductImageUpload(objectFile);
          } catch (err) {
            const errorMessage = err instanceof Error ? err.message : 'An unknown error occurred.';
            setError(`Could not load default images. Details: ${errorMessage}`);
            console.error(err);
          }
        }, [handleProductImageUpload]);

        const handleProductDrop = useCallback(async (position, relativePosition) => {
          if (!productImageFile || !sceneImage || !selectedProduct) {
            setError('An unexpected error occurred. Please try again.');
            return;
          }
          setPersistedOrbPosition(position);
          setIsLoading(true);
          setError(null);
          try {
            const { finalImageUrl, debugImageUrl, finalPrompt } = await generateCompositeImage(
              productImageFile, 
              selectedProduct.name,
              sceneImage,
              sceneImage.name,
              relativePosition
            );
            setDebugImageUrl(debugImageUrl);
            setDebugPrompt(finalPrompt);
            const newSceneFile = dataURLtoFile(finalImageUrl, `generated-scene-${Date.now()}.jpeg`);
            setSceneImage(newSceneFile);
          } catch (err) {
            const errorMessage = err instanceof Error ? err.message : 'An unknown error occurred.';
            setError(`Failed to generate the image. ${errorMessage}`);
            console.error(err);
          } finally {
            setIsLoading(false);
            setPersistedOrbPosition(null);
          }
        }, [productImageFile, sceneImage, selectedProduct]);

        const handleReset = useCallback(() => {
          setSelectedProduct(null);
          setProductImageFile(null);
          setSceneImage(null);
          setError(null);
          setIsLoading(false);
          setPersistedOrbPosition(null);
          setDebugImageUrl(null);
          setDebugPrompt(null);
        }, []);

        const handleChangeProduct = useCallback(() => {
          setSelectedProduct(null);
          setProductImageFile(null);
          setPersistedOrbPosition(null);
          setDebugImageUrl(null);
          setDebugPrompt(null);
        }, []);
        
        const handleChangeScene = useCallback(() => {
          setSceneImage(null);
          setPersistedOrbPosition(null);
          setDebugImageUrl(null);
          setDebugPrompt(null);
        }, []);

        useEffect(() => {
          return () => {
              if (sceneImageUrl) URL.revokeObjectURL(sceneImageUrl);
          };
        }, [sceneImageUrl]);
        
        useEffect(() => {
          return () => {
              if (productImageUrl && productImageUrl.startsWith('blob:')) {
                  URL.revokeObjectURL(productImageUrl);
              }
          };
        }, [productImageUrl]);

        useEffect(() => {
          let interval;
          if (isLoading) {
              setLoadingMessageIndex(0);
              interval = setInterval(() => {
                  setLoadingMessageIndex(prevIndex => (prevIndex + 1) % loadingMessages.length);
              }, 3000);
          }
          return () => {
              if (interval) clearInterval(interval);
          };
        }, [isLoading]);

        const handleTouchStart = (e) => {
          if (!selectedProduct) return;
          e.preventDefault();
          setIsTouchDragging(true);
          const touch = e.touches[0];
          setTouchGhostPosition({ x: touch.clientX, y: touch.clientY });
        };

        useEffect(() => {
          const handleTouchMove = (e) => {
            if (!isTouchDragging) return;
            const touch = e.touches[0];
            setTouchGhostPosition({ x: touch.clientX, y: touch.clientY });
            
            const elementUnderTouch = document.elementFromPoint(touch.clientX, touch.clientY);
            const dropZone = elementUnderTouch?.closest('[data-dropzone-id="scene-uploader"]');

            if (dropZone) {
                const rect = dropZone.getBoundingClientRect();
                setTouchOrbPosition({ x: touch.clientX - rect.left, y: touch.clientY - rect.top });
                setIsHoveringDropZone(true);
            } else {
                setIsHoveringDropZone(false);
                setTouchOrbPosition(null);
            }
          };

          const handleTouchEnd = (e) => {
            if (!isTouchDragging) return;
            const touch = e.changedTouches[0];
            const elementUnderTouch = document.elementFromPoint(touch.clientX, touch.clientY);
            const dropZone = elementUnderTouch?.closest('[data-dropzone-id="scene-uploader"]');

            if (dropZone && sceneImgRef.current) {
                const img = sceneImgRef.current;
                const containerRect = dropZone.getBoundingClientRect();
                const { naturalWidth, naturalHeight } = img;
                const { width: containerWidth, height: containerHeight } = containerRect;
                const imageAspectRatio = naturalWidth / naturalHeight;
                const containerAspectRatio = containerWidth / containerHeight;
                let renderedWidth, renderedHeight;
                if (imageAspectRatio > containerAspectRatio) {
                    renderedWidth = containerWidth;
                    renderedHeight = containerWidth / imageAspectRatio;
                } else {
                    renderedHeight = containerHeight;
                    renderedWidth = containerHeight * imageAspectRatio;
                }
                const offsetX = (containerWidth - renderedWidth) / 2;
                const offsetY = (containerHeight - renderedHeight) / 2;
                const dropX = touch.clientX - containerRect.left;
                const dropY = touch.clientY - containerRect.top;
                const imageX = dropX - offsetX;
                const imageY = dropY - offsetY;
                
                if (!(imageX < 0 || imageX > renderedWidth || imageY < 0 || imageY > renderedHeight)) {
                  const xPercent = (imageX / renderedWidth) * 100;
                  const yPercent = (imageY / renderedHeight) * 100;
                  handleProductDrop({ x: dropX, y: dropY }, { xPercent, yPercent });
                }
            }
            setIsTouchDragging(false);
            setTouchGhostPosition(null);
            setIsHoveringDropZone(false);
            setTouchOrbPosition(null);
          };

          if (isTouchDragging) {
            document.body.style.overflow = 'hidden';
            window.addEventListener('touchmove', handleTouchMove, { passive: false });
            window.addEventListener('touchend', handleTouchEnd, { passive: false });
          }

          return () => {
            document.body.style.overflow = 'auto';
            window.removeEventListener('touchmove', handleTouchMove);
            window.removeEventListener('touchend', handleTouchEnd);
          };
        }, [isTouchDragging, handleProductDrop]);

        const renderContent = () => {
          if (error) {
            return (
                <div className="text-center animate-fade-in bg-red-50 border border-red-200 p-8 rounded-lg max-w-2xl mx-auto">
                  <h2 className="text-3xl font-extrabold mb-4 text-red-800">An Error Occurred</h2>
                  <p className="text-lg text-red-700 mb-6">{error}</p>
                  <button
                      onClick={handleReset}
                      className="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-lg text-lg transition-colors"
                    >
                      Try Again
                  </button>
                </div>
              );
          }
          
          if (!productImageFile || !sceneImage) {
            return (
              <div className="w-full max-w-6xl mx-auto animate-fade-in">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
                  <div className="flex flex-col">
                    <h2 className="text-2xl font-extrabold text-center mb-5 text-zinc-800">Upload Product</h2>
                    <ImageUploader 
                      id="product-uploader"
                      onFileSelect={handleProductImageUpload}
                      imageUrl={productImageUrl}
                    />
                  </div>
                  <div className="flex flex-col">
                    <h2 className="text-2xl font-extrabold text-center mb-5 text-zinc-800">Upload Scene</h2>
                    <ImageUploader 
                      id="scene-uploader"
                      onFileSelect={setSceneImage}
                      imageUrl={sceneImageUrl}
                    />
                  </div>
                </div>
                <div className="text-center mt-10 min-h-[4rem] flex flex-col justify-center items-center">
                  <p className="text-zinc-500 animate-fade-in">
                    Upload a product image and a scene image to begin.
                  </p>
                  <p className="text-zinc-500 animate-fade-in mt-2">
                    Or click{' '}
                    <button
                      onClick={handleInstantStart}
                      className="font-bold text-blue-600 hover:text-blue-800 underline transition-colors"
                    >
                      here
                    </button>
                    {' '}for an instant start.
                  </p>
                </div>
              </div>
            );
          }

          return (
            <div className="w-full max-w-7xl mx-auto animate-fade-in">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8 items-stretch">
                <div className="md:col-span-1 flex flex-col">
                  <h2 className="text-2xl font-extrabold text-center mb-5 text-zinc-800">Product</h2>
                  <div className="flex-grow flex items-center justify-center">
                    <div 
                        draggable="true" 
                        onDragStart={(e) => {
                            e.dataTransfer.effectAllowed = 'move';
                            e.dataTransfer.setDragImage(transparentDragImage, 0, 0);
                        }}
                        onTouchStart={handleTouchStart}
                        className="cursor-move w-full max-w-xs"
                    >
                        <ObjectCard product={selectedProduct} isSelected={true} />
                    </div>
                  </div>
                  <div className="text-center mt-4">
                    <div className="h-5 flex items-center justify-center">
                      <button
                          onClick={handleChangeProduct}
                          className="text-sm text-blue-600 hover:text-blue-800 font-semibold"
                      >
                          Change Product
                      </button>
                    </div>
                  </div>
                </div>
                <div className="md:col-span-2 flex flex-col">
                  <h2 className="text-2xl font-extrabold text-center mb-5 text-zinc-800">Scene</h2>
                  <div className="flex-grow flex items-center justify-center">
                    <ImageUploader 
                        ref={sceneImgRef}
                        id="scene-uploader" 
                        onFileSelect={setSceneImage} 
                        imageUrl={sceneImageUrl}
                        isDropZone={!!sceneImage && !isLoading}
                        onProductDrop={handleProductDrop}
                        persistedOrbPosition={persistedOrbPosition}
                        showDebugButton={!!debugImageUrl && !isLoading}
                        onDebugClick={() => setIsDebugModalOpen(true)}
                        isTouchHovering={isHoveringDropZone}
                        touchOrbPosition={touchOrbPosition}
                    />
                  </div>
                  <div className="text-center mt-4">
                    <div className="h-5 flex items-center justify-center">
                      {sceneImage && !isLoading && (
                        <button
                            onClick={handleChangeScene}
                            className="text-sm text-blue-600 hover:text-blue-800 font-semibold"
                        >
                            Change Scene
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              </div>
              <div className="text-center mt-10 min-h-[8rem] flex flex-col justify-center items-center">
                {isLoading ? (
                  <div className="animate-fade-in">
                      <Spinner />
                      <p className="text-xl mt-4 text-zinc-600 transition-opacity duration-500">{loadingMessages[loadingMessageIndex]}</p>
                  </div>
                ) : (
                  <p className="text-zinc-500 animate-fade-in">
                      Drag the product onto a location in the scene, or simply click where you want it.
                  </p>
                )}
              </div>
            </div>
          );
        };
        
        return (
          <div className="min-h-screen bg-white text-zinc-800 flex items-center justify-center p-4 md:p-8">
            <TouchGhost 
              imageUrl={isTouchDragging ? productImageUrl : null} 
              position={touchGhostPosition}
            />
            <div className="flex flex-col items-center gap-8 w-full">
              <Header />
              <main className="w-full">
                {renderContent()}
              </main>
            </div>
            <DebugModal 
              isOpen={isDebugModalOpen} 
              onClose={() => setIsDebugModalOpen(false)}
              imageUrl={debugImageUrl}
              prompt={debugPrompt}
            />
          </div>
        );
      };

      // =================================================================
      // Entry Point (from index.tsx)
      // =================================================================
      const rootElement = document.getElementById('root');
      if (!rootElement) {
        throw new Error("Could not find root element to mount to");
      }

      const root = ReactDOM.createRoot(rootElement);
      root.render(
        <StrictMode>
          <App />
        </StrictMode>
      );
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
