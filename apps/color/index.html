<!-- index.html -->
<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crea Paletas</title>
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="components.css" />
  <link rel="stylesheet" href="app.css" />
  <link rel="icon" href="https://www.atnojs.es/imagenes/favicon_negro1.ico" type="image/x-icon" />
  <!-- Fuentes requeridas por el CSS fuente -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Poppins:wght@400;600&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div class="container">
    <header>
      <h1>Crea Paletas de Color</h1>
      <p>Genera imágenes publicitarias premium a partir de un color o una imagen. Descubre paletas de colores
        complementarias, análogas y monocromáticas que cobran vida con IA.</p>
    </header>

    <main>
      <div class="input-selector">
        <button id="color-mode-btn" class="active" aria-pressed="true">Color</button>
        <button id="image-mode-btn" aria-pressed="false">Imagen</button>
      </div>

      <form id="generator-form" aria-label="Formulario de generación de imágenes">
        <div id="color-input-container">
          <label for="color-input" class="sr-only">Introduce un color</label>
          <input type="text" id="color-input" placeholder="Introduce un color (hex, rgb, etc.)" required>
        </div>

        <div id="image-input-container" class="hidden">
          <label for="image-upload" class="image-upload-label">
            <!-- Icono accesible conserva estructura -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd"
                d="M1 5.25A2.25 2.25 0 0 1 3.25 3h13.5A2.25 2.25 0 0 1 19 5.25v9.5A2.25 2.25 0 0 1 16.75 17H3.25A2.25 2.25 0 0 1 1 14.75v-9.5Zm1.5 5.81v3.69c0 .414.336.75.75.75h13.5a.75.75 0 0 0 .75-.75v-2.69l-2.22-2.219a.75.75 0 0 0-1.06 0l-1.91 1.909-.44-1.44a.75.75 0 0 0-1.408-.43l-3.05 4.29-2.58-2.579a.75.75 0 0 0-1.06 0l-2.22 2.22Z"
                clip-rule="evenodd" />
              <path d="M9 10a.75.75 0 0 0 0-1.5H7.25a.75.75 0 0 0 0 1.5H9Z" />
            </svg>
            <span>Seleccionar o arrastrar imagen</span>
            <span id="file-name" class="file-name"></span>
          </label>
          <input type="file" id="image-upload" accept="image/*" class="sr-only">
        </div>

        <div id="text-option-container" class="hidden">
          <p class="option-label">¿Incluir texto sugerido?</p>
          <div class="text-selector">
            <button type="button" id="with-text-btn" aria-pressed="false">Con Texto</button>
            <button type="button" id="no-text-btn" aria-pressed="false">Sin Texto</button>
            <button type="button" id="custom-text-btn" aria-pressed="false">Personalizado</button>
          </div>
          <div id="custom-text-wrapper" class="hidden">
            <input type="text" id="custom-text-input" placeholder="Escribe el texto que desees..." maxlength="50">
          </div>
        </div>

        <button type="submit" id="generate-btn" disabled>Generar Paletas de Color</button>
      </form>

      <div id="loader" class="hidden"></div>

      <section id="results-container" class="results-container" aria-live="polite"></section>
    </main>
  </div>
  <script src="app.js"></script>
  <footer>
    <p id="footer-text">&copy; 2025 Atnojs. Todos los derechos reservados.</p>
  </footer>
</body>

</html>
