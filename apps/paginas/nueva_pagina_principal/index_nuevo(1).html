<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Directorio de Herramientas IA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="imagenes/favicon2.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    /* ===== RESET O AJUSTES BÁSICOS ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ===== FUENTES ===== */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');

    /* ===== VARIABLES CSS (Temas) ===== */
    :root {
      --bg-color: #f0f2f5;
      --card-bg-color: #ffffff;
      --text-color: #333333;
      --primary-color: #007bff; /* Azul primario */
      --accent-color: #00bcd4; /* Cian como acento */
      --heading-color: #2c3e50; /* Azul oscuro para encabezados */
      --border-color: #e0e0e0;
      --shadow-color: rgba(0, 0, 0, 0.1);
      --column-bg: rgba(230, 230, 250, 0.05); /* Lavanda muy sutil */
      --column-backdrop: blur(8px);
      --column-header-color: var(--accent-color);
      --placeholder-text-color: #7f8c8d; /* Gris suave para placeholders */


      /* Tipografía */
      --font-primary: 'Inter', sans-serif;
      --font-secondary: 'Roboto', sans-serif;
    }

    body.dark-theme {
      --bg-color: #1a1a2e; /* Azul noche oscuro */
      --card-bg-color: #2c3e50; /* Azul oscuro para tarjetas */
      --text-color: #e0e0e0;
      --primary-color: #00aeff; /* Azul más brillante */
      --accent-color: #00e5ff; /* Cian más brillante */
      --heading-color: #ffffff;
      --border-color: #4f5b6a;
      --shadow-color: rgba(0, 0, 0, 0.3);
      --column-bg: rgba(44, 62, 80, 0.2); /* Azul oscuro transparente para columnas */
      --column-header-color: var(--accent-color);
      --placeholder-text-color: #95a5a6; /* Gris más claro para placeholders en tema oscuro */
    }

    /* ===== BODY ===== */
    body {
      font-family: var(--font-secondary);
      min-height: 100vh;
      background-color: var(--bg-color);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
      touch-action: manipulation;
      padding-top: 80px; /* Espacio para la barra de filtros/búsqueda fija */
    }

    .container {
      max-width: 100%;
      margin: 0 auto;
      padding: 20px;
    }

    /* ===== BARRA DE FILTROS Y BÚSQUEDA ===== */
    .filters-search-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: var(--card-bg-color); 
      padding: 15px 20px;
      box-shadow: 0 2px 10px var(--shadow-color);
      z-index: 1001; 
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
    }

    .filters-search-bar input[type="search"],
    .filters-search-bar select {
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background-color: var(--bg-color); 
      color: var(--text-color);
      font-family: var(--font-secondary);
    }
     .filters-search-bar input[type="search"] {
        flex-grow: 1;
        min-width: 200px;
    }

    .filters-search-bar label {
        margin-right: 5px;
        font-weight: 600;
        color: var(--text-color); 
    }

    .theme-switcher {
        padding: 10px 15px;
        background-color: var(--primary-color);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
    }
    .theme-switcher:hover {
        opacity: 0.9;
    }


    .columns-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px; 
      position: relative;
    }
    .columns-container .initial-load-message { /* Estilo para el mensaje inicial */
        width: 100%;
        text-align: center;
        font-size: 1.2em;
        color: var(--placeholder-text-color);
        margin-top: 30px;
        padding: 20px;
    }


    .column { 
      flex: 1 1 100%; 
      min-width: 300px; 
      background: var(--column-bg);
      backdrop-filter: var(--column-backdrop);
      border: 1px solid var(--border-color);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 4px 12px var(--shadow-color);
      height: fit-content;
      margin-bottom: 20px;
    }

    .column h2 { 
      color: var(--column-header-color);
      font-family: var(--font-primary);
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--accent-color);
      padding-bottom: 10px;
    }

    .ai-tools-grid { 
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
    }
    .ai-tools-grid .no-tools-message { /* Mensaje si no hay herramientas en una categoría */
        grid-column: 1 / -1; /* Ocupa todas las columnas del grid */
        text-align: center;
        color: var(--placeholder-text-color);
        padding: 20px;
    }


    /* ===== TARJETAS DE HERRAMIENTAS DE IA ===== */
    .ai-tool-card {
      background-color: var(--card-bg-color);
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 8px var(--shadow-color);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative; 
    }
    .ai-tool-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 15px var(--shadow-color);
    }

    .ai-tool-card .tool-header {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .ai-tool-card .tool-logo {
        width: 50px;
        height: 50px;
        object-fit: contain;
        border-radius: 8px;
        background-color: #f0f0f0; 
    }
    .ai-tool-card .tool-name {
        font-family: var(--font-primary);
        font-size: 18px;
        font-weight: 600;
        color: var(--heading-color);
    }
    .ai-tool-card .tool-brief-description {
        font-size: 14px;
        line-height: 1.4;
        color: var(--text-color);
        flex-grow: 1; 
        min-height: 40px; 
    }
    .ai-tool-card .tool-tags-pricing {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        margin-top: 10px;
    }
    .ai-tool-card .tool-tags span, .ai-tool-card .tool-pricing span {
        background-color: var(--accent-color);
        color: white; 
        padding: 3px 8px;
        border-radius: 12px;
        opacity: 0.85;
    }
     .ai-tool-card .tool-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
    }
    .ai-tool-card .tool-tags .tag {
        background-color: var(--primary-color); 
        opacity: 0.7;
    }

    .ai-tool-card .tool-actions {
        display: flex;
        gap: 10px;
        margin-top: auto; 
    }
    .ai-tool-card .tool-actions button {
        flex-grow: 1;
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: background-color 0.2s, opacity 0.2s;
        color: white; 
    }
    .ai-tool-card .tool-actions .visit-site-btn {
        background-color: var(--primary-color);
    }
    .ai-tool-card .tool-actions .visit-site-btn:hover {
        opacity: 0.85;
    }
    .ai-tool-card .tool-actions .more-info-btn {
        background-color: var(--accent-color);
    }
     .ai-tool-card .tool-actions .more-info-btn:hover {
        opacity: 0.85;
    }
    .ai-tool-card .tool-actions button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
        opacity: 0.7;
    }
    body.dark-theme .ai-tool-card .tool-actions button:disabled {
        background-color: #555; /* Botón deshabilitado en tema oscuro */
        color: #aaa;
    }


    .new-badge {
        position: absolute;
        top: -5px;
        right: -5px;
        background-color: #ff4757; 
        color: white;
        padding: 3px 8px;
        font-size: 10px;
        font-weight: bold;
        border-radius: 5px;
        transform: rotate(10deg);
        z-index: 1; 
    }


    /* ===== MEDIA QUERIES ===== */
    @media (max-width: 768px) {
      body { padding-top: 150px; } 
      .filters-search-bar { flex-direction: column; align-items: stretch; }
      .column h2 { font-size: 20px; }
      .ai-tools-grid { grid-template-columns: 1fr; } 
    }


    /* ===== BOTONES DE EDICIÓN GENERALES ===== */
    .column-controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: none;
      flex-direction: column; 
      gap: 10px;
      z-index: 1000;
    }

    .add-column-btn, .change-bg-btn { 
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 2px 10px var(--shadow-color);
      transition: background 0.3s ease, opacity 0.3s ease;
    }
    .add-column-btn:hover, .change-bg-btn:hover {
      opacity: 0.85;
    }

    #edit-mode-btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      padding: 15px 30px; 
      font-size: 16px;
      background-color: transparent; 
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 2px 10px var(--shadow-color);
      transition: background-color 0.3s ease, opacity 0.3s ease;
    }
    #edit-mode-btn:hover {
        background-color: transparent;
    }
    #edit-mode-btn.active { 
        background-color: #27ae60; 
    }
     #edit-mode-btn.active:hover {
        background-color: #229954;
    }


    /* ===== BOTONES DE EDICIÓN PARA CATEGORÍAS Y TARJETAS ===== */
    .add-link-btn { 
      background: rgba(0, 123, 255, 0.7);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      margin-top: 15px;
      display: none; 
      font-weight: 600;
    }
    .add-link-btn:hover { background: rgba(0, 123, 255, 1); }

    .remove-column-btn { 
      background: rgba(255, 0, 0, 0.7);
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      margin-top: 10px;
      cursor: pointer;
      font-weight: bold;
      display: none; 
    }
    .remove-column-btn:hover { background: rgba(255, 0, 0, 1); }

    .tool-edit-buttons { 
      display: none; 
      position: absolute;
      top: 5px;
      right: 5px;
      background: rgba(255,255,255,0.8);
      padding: 5px;
      border-radius: 5px;
      z-index: 10;
    }
    body.dark-theme .tool-edit-buttons {
        background: rgba(44, 62, 80, 0.9); 
    }
    .tool-edit-buttons button {
      background: transparent;
      border: none;
      color: var(--text-color); 
      cursor: pointer;
      font-size: 14px;
      margin: 0 2px;
    }
    .tool-edit-buttons button:hover { color: var(--primary-color); }


    #bgInput { display: none; }

    /* ===== POPUP "MÁS INFORMACIÓN" (TOOLTIP REUTILIZADO) ===== */
    .tooltip {
      position: fixed; 
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card-bg-color);
      color: var(--text-color);
      padding: 25px;
      border-radius: 12px;
      font-size: 15px;
      font-family: var(--font-secondary);
      max-width: 700px; 
      width: 90vw;
      max-height: 85vh;
      overflow-y: auto;
      z-index: 9999;
      box-shadow: 0 5px 20px rgba(0,0,0,0.25);
      line-height: 1.6;
    }
    .popup-description {
      margin: 0 0 20px 0;
      padding: 0;
      color: var(--text-color); 
    }
    .popup-description p { margin: 0 0 10px 0; text-align: left; }
    .popup-description strong, .popup-description b { color: var(--heading-color); } 
    .images-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px; 
      margin: 15px 0;
      padding: 0;
      width: 100%;
    }
    .popup-description img, .description-preview img { 
      max-width: 100%; 
      height: auto;
      border-radius: 6px;
      display: block; 
      object-fit: contain; 
    }
    .popup-description .resizable-img-container {
        border: none; 
        max-width: calc(50% - 5px); 
        margin: 0; 
    }
    @media (max-width: 576px) {
        .popup-description .resizable-img-container {
            max-width: 100%; 
        }
    }

    .popup-buttons {
      display: flex;
      justify-content: flex-end; 
      gap: 10px;
      margin-top: 20px;
      border-top: 1px solid var(--border-color);
      padding-top: 15px;
    }
    .popup-buttons button {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    .popup-buttons button:hover { opacity: 0.85; }
    .popup-buttons button.secondary { background-color: var(--accent-color); }


    /* ===== FORMULARIO PARA AÑADIR/EDITAR HERRAMIENTAS ===== */
    .add-link-form-container {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card-bg-color);
      color: var(--text-color);
      border-radius: 12px;
      padding: 25px;
      max-width: 700px;
      width: 90vw;
      z-index: 10000; 
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      font-family: var(--font-secondary);
      max-height: 90vh;
      overflow-y: auto;
    }
    .add-link-form-container h3 {
      margin-bottom: 20px;
      text-align: center;
      font-size: 20px;
      color: var(--heading-color);
      font-family: var(--font-primary);
    }
    .form-group { margin-bottom: 15px; }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: var(--text-color); 
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-color); 
      color: var(--text-color);
      font-family: var(--font-secondary);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group input[type="file"] { padding: 5px; } 

    .form-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    .form-buttons button {
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      border: none;
      transition: opacity 0.2s;
    }
    .form-buttons button#saveLinkBtn { background-color: var(--primary-color); color: white;}
    .form-buttons button#cancelLinkBtn { background-color: #6c757d; color: white; } 
    .form-buttons button:hover { opacity: 0.85; }

    .checkbox-group { display: flex; align-items: center; margin-bottom: 15px; }
    .checkbox-group input[type="checkbox"] { width: auto; margin-right: 10px; }
    .checkbox-group label { display: inline; margin-bottom: 0; font-weight: normal; color: var(--text-color); }

    .card-preview-area {
        margin-top: 20px;
        padding: 15px;
        border: 1px dashed var(--border-color);
        border-radius: 8px;
        background-color: var(--bg-color); 
    }
    .card-preview-area h4 { margin-bottom: 10px; font-family: var(--font-primary); color: var(--heading-color); }
    .card-preview-area .ai-tool-card {
        background-color: var(--card-bg-color); 
        pointer-events: none; 
        box-shadow: none; 
    }


    /* ===== MODAL DE CONTRASEÑA (Para modo edición) ===== */
    .password-modal { 
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      z-index: 10001; 
      justify-content: center;
      align-items: center;
    }
    .password-modal-content {
      background-color: var(--card-bg-color);
      color: var(--text-color);
      padding: 25px;
      border-radius: 12px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    .password-modal h3 { margin-top: 0; margin-bottom: 15px; font-size: 18px; color: var(--heading-color); }
    .password-modal input[type="password"] {
      width: 100%; padding: 10px; border-radius: 6px;
      border: 1px solid var(--border-color); margin-bottom: 15px;
      background-color: var(--bg-color); color: var(--text-color);
    }
    .password-modal-buttons { display: flex; justify-content: center; gap: 10px; }
    .password-modal-buttons button {
      padding: 10px 20px; border-radius: 6px; cursor: pointer;
      font-weight: bold; border: none; transition: opacity 0.2s;
      color: white;
    }
    #submitAdminPasswordBtn { background-color: var(--primary-color); }
    #cancelAdminPasswordBtn { background-color: #6c757d; }
    .password-modal-buttons button:hover { opacity: 0.85; }


    /* Estilos para herramientas de imagen en el formulario (se mantienen) */
    .image-tools { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .image-tools button {
      background: var(--accent-color); color: white; border: none;
      border-radius: 4px; padding: 8px 12px; cursor: pointer; font-size: 13px;
      transition: opacity 0.2s;
    }
    .image-tools button:hover { opacity: 0.85; }
    .image-upload-input { display: none; }
    .description-preview {
      margin-top: 15px; padding: 15px; border: 1px dashed var(--border-color);
      border-radius: 8px; min-height: 100px; max-height: 300px; overflow-y: auto;
      background-color: var(--bg-color);
      color: var(--text-color); 
    }
     .description-preview .images-container { }
    .paste-area {
      width: 100%; height: 50px; border: 2px dashed var(--border-color);
      border-radius: 8px; background-color: var(--bg-color);
      display: flex; align-items: center; justify-content: center;
      margin-top: 10px; cursor: pointer; font-size: 14px; color: #666;
    }
    body.dark-theme .paste-area { color: #bbb; }
    .paste-area:hover { border-color: var(--accent-color); }

    .resizable-img-container {
      position: relative; display: inline-block; 
      margin: 5px; 
      border: 2px dashed transparent; 
      overflow: visible; vertical-align: middle; line-height: 0;
    }
    body.edit-mode .description-preview .resizable-img-container {
        border: 2px dashed var(--accent-color);
        max-width: none !important; 
    }
    .resizable-img-container img {
      display: block; max-width: 100%; margin: 0; padding: 0;
      vertical-align: bottom; line-height: 0;
    }
    .resize-handle, .delete-image-btn { display: none; } 

    body.edit-mode .resize-handle, body.edit-mode .delete-image-btn {
      display: block; 
      position: absolute;
      background: var(--accent-color); color: white;
      border-radius: 50%; z-index: 100; cursor: pointer;
      border: 2px solid var(--card-bg-color);
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
    }
    body.edit-mode .resize-handle {
      width: 16px; height: 16px; right: -8px; bottom: -8px; cursor: se-resize;
    }
    body.edit-mode .delete-image-btn {
      width: 22px; height: 22px; top: -10px; right: -10px;
      font-size: 14px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
    }
    body.edit-mode .description-preview img:not(.resizable-img-container img) {
        border: 2px dashed var(--accent-color);
    }

  </style>
</head>
<body>
  <div class="filters-search-bar">
    <input type="search" id="searchInput" placeholder="Buscar herramienta por nombre, descripción, tags...">
    <div>
      <label for="categoryFilter">Categoría:</label>
      <select id="categoryFilter">
        <option value="" selected>¿Qué categoría quieres ver?</option> 
        <option value="_all_">Todas las Categorías</option>
        </select>
    </div>
    <div>
      <label for="pricingFilter">Precio:</label>
      <select id="pricingFilter">
        <option value="">Todos</option>
        <option value="Gratis">Gratis</option>
        <option value="Freemium">Freemium</option>
        <option value="De Pago">De Pago</option>
        <option value="Prueba Gratuita">Prueba Gratuita</option>
      </select>
    </div>
    <div>
        <label for="sortOrder">Ordenar por:</label>
        <select id="sortOrder">
            <option value="default">Por defecto</option>
            <option value="newest">Más nuevos primero</option>
            <option value="oldest">Más antiguos primero</option>
            <option value="nameAsc">Nombre (A-Z)</option>
            <option value="nameDesc">Nombre (Z-A)</option>
        </select>
    </div>
    <button id="themeSwitcher" class="theme-switcher">Tema Oscuro</button>
  </div>

  <div class="container">
    <div class="columns-container" id="columnsContainer">
      </div>
  </div>

  <input type="file" id="bgInput" accept="image/*">

  <div class="column-controls">
    <button class="change-bg-btn" onclick="document.getElementById('bgInput').click()">Cambiar Fondo</button>
    <button class="add-column-btn" onclick="addColumn()">Añadir Categoría</button>
  </div>

  <button id="edit-mode-btn" class="edit-mode-btn"></button>

  <div id="adminPasswordModal" class="password-modal">
    <div class="password-modal-content">
      <h3>Activar Modo Edición</h3>
      <input type="password" id="adminPasswordInput" placeholder="Introduce la contraseña de administrador">
      <div class="password-modal-buttons">
        <button id="submitAdminPasswordBtn">Activar</button>
        <button id="cancelAdminPasswordBtn">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="linkFormContainer" class="add-link-form-container" style="display: none;">
    </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      let isEditable = false;
      let activeResizeContainer = null;
      let initialWidth, initialX; 
      let websiteData = { columns: [], background: '' };

      const columnsContainer = document.getElementById('columnsContainer');
      const columnControls = document.querySelector('.column-controls');
      const editModeBtn = document.getElementById('edit-mode-btn');
      
      const adminPasswordModal = document.getElementById('adminPasswordModal');
      const adminPasswordInput = document.getElementById('adminPasswordInput');
      const submitAdminPasswordBtn = document.getElementById('submitAdminPasswordBtn');
      const cancelAdminPasswordBtn = document.getElementById('cancelAdminPasswordBtn');

      let linkFormContainer = document.getElementById('linkFormContainer');
      let linkFormTitle, toolNameInput, toolUrlInput, toolLogoUrlInput, toolBriefDescriptionInput,
          toolDetailedDescriptionInput, toolTagsInput, toolPricingModelSelect, toolTutorialUrlInput,
          toolPrivateCheckbox, 
          editingToolIdInput, editingCategoryIndexInput, saveLinkBtn, cancelLinkBtn,
          cardPreviewName, cardPreviewLogo, cardPreviewDescription, cardPreviewPricing;
      
      let _descriptionPreviewForm, _insertImageBtnForm, _uploadImageBtnForm, 
          _imageUploadInputForm, _pasteAreaForm, _previewDescriptionBtnForm, 
          _toolDetailedDescriptionInput;

      function createOrUpdateLinkForm() {
        if (!linkFormContainer) {
          linkFormContainer = document.createElement('div');
          linkFormContainer.id = 'linkFormContainer';
          linkFormContainer.className = 'add-link-form-container';
          document.body.appendChild(linkFormContainer);
        }

        linkFormContainer.innerHTML = `
          <h3 id="linkFormTitle">Añadir Nueva Herramienta IA</h3>
          <input type="hidden" id="editingToolId" value="">
          <input type="hidden" id="editingCategoryIndex" value="-1">
          <div class="form-group">
            <label for="toolName">Nombre de la Herramienta:</label>
            <input type="text" id="toolName" placeholder="Ej: Super Generador AI">
          </div>
          <div class="form-group">
            <label for="toolUrl">URL del Sitio Web:</label>
            <input type="url" id="toolUrl" placeholder="https://ejemplo.com">
          </div>
          <div class="form-group">
            <label for="toolLogoUrl">URL del Logo/Icono:</label>
            <input type="url" id="toolLogoUrl" placeholder="https://ejemplo.com/logo.png">
          </div>
          <div class="form-group">
            <label for="toolBriefDescription">Descripción Breve (para la tarjeta, 1-2 líneas):</label>
            <textarea id="toolBriefDescription" rows="2" placeholder="Una descripción concisa."></textarea>
          </div>
          <div class="form-group">
            <label for="toolDetailedDescription">Descripción Detallada (para "Más Información" - HTML permitido):</label>
            <textarea id="toolDetailedDescription" rows="5" placeholder="Escribe aquí o inserta imagen..."></textarea>
            <div class="image-tools">
              <button id="insertImageBtnForm" type="button">Insertar Imagen por URL</button>
              <button id="uploadImageBtnForm" type="button">Subir Imagen</button>
              <input type="file" id="imageUploadInputForm" class="image-upload-input" accept="image/*">
              <button id="previewDescriptionBtnForm" type="button">Vista Previa Detallada</button>
            </div>
            <div class="paste-area" id="pasteAreaForm" tabindex="0">Pega imagen aquí (Ctrl+V)</div>
            <div id="descriptionPreviewForm" class="description-preview" style="display: none;"></div>
          </div>
          <div class="form-group">
            <label for="toolTags">Tags (separados por coma):</label>
            <input type="text" id="toolTags" placeholder="Ej: generador de texto, productividad, gratis">
          </div>
          <div class="form-group">
            <label for="toolPricingModel">Modelo de Precios:</label>
            <select id="toolPricingModel">
              <option value="Gratis">Gratis</option>
              <option value="Freemium">Freemium</option>
              <option value="De Pago">De Pago</option>
              <option value="Prueba Gratuita">Prueba Gratuita</option>
            </select>
          </div>
          <div class="form-group">
            <label for="toolTutorialUrl">URL del Tutorial (opcional):</label>
            <input type="url" id="toolTutorialUrl" placeholder="https://ejemplo.com/tutorial">
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="toolPrivateCheckbox">
            <label for="toolPrivateCheckbox">Info detallada es privada (restringir acceso a no admins)</label>
          </div>
          <div class="card-preview-area">
              <h4>Previsualización de Tarjeta:</h4>
              <div class="ai-tool-card">
                  <div class="tool-header">
                      <img id="cardPreviewLogo" src="https://via.placeholder.com/50" alt="logo preview" class="tool-logo">
                      <span id="cardPreviewName" class="tool-name">Nombre Herramienta</span>
                  </div>
                  <p id="cardPreviewDescription" class="tool-brief-description">Descripción breve aparecerá aquí...</p>
                  <div class="tool-tags-pricing">
                      <div id="cardPreviewTagsContainer" class="tool-tags"></div>
                      <span id="cardPreviewPricing" class="tool-pricing"><span>Modelo Precio</span></span>
                  </div>
                  <div class="tool-actions">
                      <button class="visit-site-btn" type="button" disabled>Visitar Sitio</button>
                      <button class="more-info-btn" type="button" disabled>Más Info</button>
                  </div>
              </div>
          </div>
          <div class="form-buttons">
            <button id="saveLinkBtn" type="button">GUARDAR HERRAMIENTA</button>
            <button id="cancelLinkBtn" type="button">CANCELAR</button>
          </div>
        `;
        setupFormReferencesAndEvents();
        setupImageTools('Form');
      }
      
      function setupFormReferencesAndEvents() {
        linkFormTitle = document.getElementById('linkFormTitle');
        toolNameInput = document.getElementById('toolName');
        toolUrlInput = document.getElementById('toolUrl');
        toolLogoUrlInput = document.getElementById('toolLogoUrl');
        toolBriefDescriptionInput = document.getElementById('toolBriefDescription');
        _toolDetailedDescriptionInput = document.getElementById('toolDetailedDescription'); // Asignar a la variable global
        toolTagsInput = document.getElementById('toolTags');
        toolPricingModelSelect = document.getElementById('toolPricingModel');
        toolTutorialUrlInput = document.getElementById('toolTutorialUrl');
        toolPrivateCheckbox = document.getElementById('toolPrivateCheckbox');
        editingToolIdInput = document.getElementById('editingToolId');
        editingCategoryIndexInput = document.getElementById('editingCategoryIndex');
        saveLinkBtn = document.getElementById('saveLinkBtn');
        cancelLinkBtn = document.getElementById('cancelLinkBtn');
        
        cardPreviewName = document.getElementById('cardPreviewName');
        cardPreviewLogo = document.getElementById('cardPreviewLogo');
        cardPreviewDescription = document.getElementById('cardPreviewDescription');
        cardPreviewPricing = document.getElementById('cardPreviewPricing').firstElementChild;
        const cardPreviewTagsContainer = document.getElementById('cardPreviewTagsContainer');

        const updatePreview = () => {
            if(cardPreviewName) cardPreviewName.textContent = toolNameInput.value || "Nombre Herramienta";
            if(cardPreviewLogo) cardPreviewLogo.src = toolLogoUrlInput.value || "https://via.placeholder.com/50";
            if(cardPreviewDescription) cardPreviewDescription.textContent = toolBriefDescriptionInput.value || "Descripción breve...";
            if(cardPreviewPricing && toolPricingModelSelect) cardPreviewPricing.textContent = toolPricingModelSelect.value;
            if(cardPreviewTagsContainer && toolTagsInput) {
                cardPreviewTagsContainer.innerHTML = toolTagsInput.value.split(',')
                    .map(tag => tag.trim())
                    .filter(tag => tag)
                    .map(tag => `<span class="tag">${tag}</span>`).join('');
            }
        };
        
        [toolNameInput, toolLogoUrlInput, toolBriefDescriptionInput, toolTagsInput].forEach(input => {
            if(input) input.addEventListener('input', updatePreview);
        });
        if(toolPricingModelSelect) toolPricingModelSelect.addEventListener('change', updatePreview);

        saveLinkBtn.removeEventListener('click', saveToolHandler);
        saveLinkBtn.addEventListener('click', saveToolHandler);
        
        cancelLinkBtn.removeEventListener('click', closeLinkForm);
        cancelLinkBtn.addEventListener('click', closeLinkForm);
      }

      function closeLinkForm() {
        if (linkFormContainer) linkFormContainer.style.display = 'none';
        if (_descriptionPreviewForm) _descriptionPreviewForm.style.display = 'none'; // Usar variable global
        if (_previewDescriptionBtnForm) _previewDescriptionBtnForm.textContent = 'Vista Previa Detallada'; // Usar variable global
      }

      function setupImageTools(suffix = '') {
          _descriptionPreviewForm = document.getElementById('descriptionPreview' + suffix);
          _insertImageBtnForm = document.getElementById('insertImageBtn' + suffix);
          _uploadImageBtnForm = document.getElementById('uploadImageBtn' + suffix);
          _imageUploadInputForm = document.getElementById('imageUploadInput' + suffix);
          _pasteAreaForm = document.getElementById('pasteArea' + suffix);
          _previewDescriptionBtnForm = document.getElementById('previewDescriptionBtn' + suffix);
          // _toolDetailedDescriptionInput ya se asigna en setupFormReferencesAndEvents

          if (_insertImageBtnForm) {
              _insertImageBtnForm.removeEventListener('click', handleInsertImageViaButton);
              _insertImageBtnForm.addEventListener('click', handleInsertImageViaButton);
          }
          if (_uploadImageBtnForm && _imageUploadInputForm) {
              _uploadImageBtnForm.removeEventListener('click', () => _imageUploadInputForm.click());
              _uploadImageBtnForm.addEventListener('click', () => _imageUploadInputForm.click());
              _imageUploadInputForm.removeEventListener('change', handleImageUploadViaInput);
              _imageUploadInputForm.addEventListener('change', handleImageUploadViaInput);
          }
          if (_previewDescriptionBtnForm && _descriptionPreviewForm) {
              _previewDescriptionBtnForm.removeEventListener('click', () => toggleDescriptionPreview(_descriptionPreviewForm, _toolDetailedDescriptionInput, _previewDescriptionBtnForm));
              _previewDescriptionBtnForm.addEventListener('click', () => toggleDescriptionPreview(_descriptionPreviewForm, _toolDetailedDescriptionInput, _previewDescriptionBtnForm));
          }
          if (_pasteAreaForm) {
              _pasteAreaForm.removeEventListener('click', () => _pasteAreaForm.focus());
              _pasteAreaForm.addEventListener('click', () => _pasteAreaForm.focus());
              _pasteAreaForm.removeEventListener('paste', handlePasteIntoTextarea);
              _pasteAreaForm.addEventListener('paste', handlePasteIntoTextarea);
          }
          if (_toolDetailedDescriptionInput) {
              _toolDetailedDescriptionInput.removeEventListener('paste', handlePasteIntoTextarea);
              _toolDetailedDescriptionInput.addEventListener('paste', handlePasteIntoTextarea);
          }
      }
      
      function handleInsertImageViaButton() {
        const imageUrl = prompt('Introduce la URL de la imagen:');
        if (imageUrl && imageUrl.trim() !== '' && _toolDetailedDescriptionInput && _descriptionPreviewForm) {
          insertResizableImage(imageUrl, _toolDetailedDescriptionInput, _descriptionPreviewForm);
        }
      }

      function handleImageUploadViaInput(e) {
        if (e.target.files && e.target.files[0] && _toolDetailedDescriptionInput && _descriptionPreviewForm) {
          const file = e.target.files[0];
          const reader = new FileReader();
          reader.onload = (event) => insertResizableImage(event.target.result, _toolDetailedDescriptionInput, _descriptionPreviewForm);
          reader.readAsDataURL(file);
        }
      }
      
      function toggleDescriptionPreview(previewEl, detailedInputEl, previewBtnEl) {
          if (previewEl.style.display === 'none') {
              previewEl.innerHTML = detailedInputEl.value;
              previewEl.style.display = 'block';
              if(previewBtnEl) previewBtnEl.textContent = 'Ocultar Vista Previa Detallada';
              processLegacyImages(previewEl); 
              organizeImages(previewEl);     
              if (isEditable) {
                  const containers = previewEl.querySelectorAll('.resizable-img-container');
                  containers.forEach(container => container.style.maxWidth = 'none');
              }
          } else {
              previewEl.style.display = 'none';
              if(previewBtnEl) previewBtnEl.textContent = 'Vista Previa Detallada';
          }
      }

      function processLegacyImages(containerElement) { 
        const standaloneImages = Array.from(containerElement.querySelectorAll('img:not(.resizable-img-container img)'));
        standaloneImages.forEach(img => {
          const currentWidth = img.style.width || img.width || 300;
          const parent = img.parentNode;
          const newContainer = document.createElement('div');
          newContainer.className = 'resizable-img-container';
          newContainer.style.width = typeof currentWidth === 'string' ? currentWidth : currentWidth + 'px';
          if (isEditable) newContainer.style.maxWidth = 'none';
          
          const newImg = img.cloneNode(true);
          newImg.style.width = ''; newImg.style.height = ''; newImg.style.maxWidth = '';
          newImg.style.margin = '0'; newImg.style.padding = '0';
          newContainer.appendChild(newImg);

          const resizeHandle = document.createElement('div');
          resizeHandle.className = 'resize-handle';
          newContainer.appendChild(resizeHandle);
          const deleteBtn = document.createElement('div');
          deleteBtn.className = 'delete-image-btn';
          deleteBtn.textContent = '×';
          newContainer.appendChild(deleteBtn);
          parent.replaceChild(newContainer, img);
        });
        setupResizableImages(containerElement); 
      }

      function organizeImages(containerElement) { 
        const imageContainers = containerElement.querySelectorAll('.resizable-img-container');
        if (imageContainers.length > 1) {
          let imagesFlexContainer = containerElement.querySelector('.images-container');
          if (!imagesFlexContainer) { 
            imagesFlexContainer = document.createElement('div');
            imagesFlexContainer.className = 'images-container';
            imageContainers.forEach(imgCont => {
                if (imgCont.parentNode === containerElement) {
                    imagesFlexContainer.appendChild(imgCont);
                }
            });
            if (imagesFlexContainer.childNodes.length > 0) { 
                 containerElement.appendChild(imagesFlexContainer);
            }
          } else { 
              imageContainers.forEach(imgCont => {
                  if(imgCont.parentNode !== imagesFlexContainer && imgCont.parentNode === containerElement) {
                      imagesFlexContainer.appendChild(imgCont);
                  }
              });
          }
        }
      }
      
      function insertResizableImage(imageUrl, targetTextarea, associatedPreview) {
        const imgContainerHtml = `
          <div class="resizable-img-container" style="width: 300px; max-width: none;">
            <img src="${imageUrl}" alt="Imagen insertada">
            <div class="resize-handle"></div>
            <div class="delete-image-btn">×</div>
          </div>
        `;
        const start = targetTextarea.selectionStart;
        const end = targetTextarea.selectionEnd;
        targetTextarea.value = targetTextarea.value.substring(0, start) + imgContainerHtml + targetTextarea.value.substring(end);
        targetTextarea.selectionStart = targetTextarea.selectionEnd = start + imgContainerHtml.length;

        associatedPreview.innerHTML = targetTextarea.value;
        if (associatedPreview.style.display === 'none') {
            associatedPreview.style.display = 'block';
            const previewBtn = document.getElementById('previewDescriptionBtnForm');
            if(previewBtn) previewBtn.textContent = 'Ocultar Vista Previa Detallada';
        }
        processLegacyImages(associatedPreview);
        organizeImages(associatedPreview);
         if (isEditable) {
            const containers = associatedPreview.querySelectorAll('.resizable-img-container');
            containers.forEach(container => container.style.maxWidth = 'none');
        }
      }

      function setupResizableImages(containerElement) {
        const resizableContainers = containerElement.querySelectorAll('.resizable-img-container');
        resizableContainers.forEach(rc => {
          if (isEditable) rc.style.maxWidth = 'none';
          const handle = rc.querySelector('.resize-handle');
          const deleteBtn = rc.querySelector('.delete-image-btn');
          
          if (handle) {
            if (handle._hasEvents) { 
                handle.removeEventListener('mousedown', startResize);
                handle.removeEventListener('touchstart', startResize);
            }
            handle._hasEvents = true;
            handle.addEventListener('mousedown', startResize);
            handle.addEventListener('touchstart', startResize, { passive: false });
          }
          if (deleteBtn) {
            if (deleteBtn._hasEvents) { 
                deleteBtn.removeEventListener('click', handleDeleteImage);
            }
            deleteBtn._hasEvents = true;
            deleteBtn.addEventListener('click', handleDeleteImage);
          }
        });
      }
      
      function handleDeleteImage() { 
          const containerToRemove = this.closest('.resizable-img-container');
          if (confirm('¿Eliminar esta imagen?')) {
              containerToRemove.remove();
              updateTextareaFromPreview(_toolDetailedDescriptionInput, _descriptionPreviewForm);
          }
      }

      function startResize(e) {
        e.preventDefault();
        activeResizeContainer = this.closest('.resizable-img-container');
        activeResizeContainer.style.maxWidth = 'none';
        initialWidth = activeResizeContainer.offsetWidth;
        initialX = (e.touches ? e.touches[0] : e).clientX;
        document.addEventListener('mousemove', resizeMove);
        document.addEventListener('touchmove', resizeMove, { passive: false });
        document.addEventListener('mouseup', stopResize);
        document.addEventListener('touchend', stopResize);
      }

      function resizeMove(e) {
        if (!activeResizeContainer) return;
        e.preventDefault();
        activeResizeContainer.style.maxWidth = 'none';
        const currentX = (e.touches ? e.touches[0] : e).clientX;
        const deltaX = currentX - initialX;
        const newWidth = Math.max(50, initialWidth + deltaX); 
        activeResizeContainer.style.width = newWidth + 'px';
        updateTextareaFromPreview(_toolDetailedDescriptionInput, _descriptionPreviewForm);
      }

      function stopResize() {
        if (!activeResizeContainer) return;
        if (isEditable) activeResizeContainer.style.maxWidth = 'none';
        document.removeEventListener('mousemove', resizeMove);
        document.removeEventListener('touchmove', resizeMove);
        document.removeEventListener('mouseup', stopResize);
        document.removeEventListener('touchend', stopResize);
        updateTextareaFromPreview(_toolDetailedDescriptionInput, _descriptionPreviewForm);
        activeResizeContainer = null;
      }

      function updateTextareaFromPreview(targetTextarea, sourcePreview) {
        if (sourcePreview && targetTextarea) {
          targetTextarea.value = sourcePreview.innerHTML;
        }
      }
      
      function handlePasteIntoTextarea(e) { 
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (let i = 0; i < items.length; i++) {
          if (items[i].type.indexOf('image') !== -1) {
            e.preventDefault();
            const blob = items[i].getAsFile();
            const reader = new FileReader();
            reader.onload = (event) => insertResizableImage(event.target.result, _toolDetailedDescriptionInput, _descriptionPreviewForm);
            reader.readAsDataURL(blob);
            break;
          }
        }
      }

      function saveToolHandler() {
        if (!isEditable) { closeLinkForm(); return; }
        const toolData = {
          id: editingToolIdInput.value || `tool_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
          name: toolNameInput.value.trim(),
          websiteUrl: toolUrlInput.value.trim(),
          logoUrl: toolLogoUrlInput.value.trim(),
          briefDescription: toolBriefDescriptionInput.value.trim(),
          detailedDescription: _toolDetailedDescriptionInput.value.trim(), 
          tags: toolTagsInput.value.split(',').map(tag => tag.trim()).filter(tag => tag),
          pricingModel: toolPricingModelSelect.value,
          tutorialUrl: toolTutorialUrlInput.value.trim(),
          isPrivate: toolPrivateCheckbox.checked,
          timestampAdded: editingToolIdInput.value ? (findToolById(editingToolIdInput.value)?.tool.timestampAdded || Date.now()) : Date.now(),
          timestampUpdated: Date.now()
        };

        if (!toolData.name) { alert("Por favor, introduce un nombre para la herramienta."); return; }
        if (toolData.websiteUrl && !toolData.websiteUrl.startsWith('http://') && !toolData.websiteUrl.startsWith('https://')) {
            toolData.websiteUrl = 'https://' + toolData.websiteUrl;
        }

        const categoryIndex = parseInt(editingCategoryIndexInput.value, 10);
        if (categoryIndex < 0 || categoryIndex >= websiteData.columns.length) {
            alert("Categoría no válida."); return;
        }
        
        const category = websiteData.columns[categoryIndex];
        if (!category.tools) category.tools = [];

        const existingToolIndex = category.tools.findIndex(t => t.id === toolData.id);
        if (existingToolIndex > -1) {
          category.tools[existingToolIndex] = toolData;
        } else {
          category.tools.push(toolData);
        }
        
        closeLinkForm();
        renderAllContent();
        saveWebsiteState();
      }
      
      function findToolById(toolId) {
          for (const category of websiteData.columns) {
              if (category.tools) {
                  const tool = category.tools.find(t => t.id === toolId);
                  if (tool) return { tool, category };
              }
          }
          return null;
      }

      function renderAllContent() {
        columnsContainer.innerHTML = ''; 
        const categoryFilterSelect = document.getElementById('categoryFilter');
        let currentCategoryFilterValue = categoryFilterSelect.value; 

        categoryFilterSelect.innerHTML = `
            <option value="" ${currentCategoryFilterValue === "" ? "selected" : ""}>¿Qué categoría quieres ver?</option>
            <option value="_all_" ${currentCategoryFilterValue === "_all_" ? "selected" : ""}>Todas las Categorías</option>
        `;

        websiteData.columns.forEach((category) => {
          const option = document.createElement('option');
          option.value = category.title; 
          option.textContent = category.title;
          if (category.title === currentCategoryFilterValue && currentCategoryFilterValue !== "" && currentCategoryFilterValue !== "_all_") {
            option.selected = true;
          }
          categoryFilterSelect.appendChild(option);
        });
        
        filterAndSortTools(); 
        setupEditModeUI();
      }

      function createCategoryElement(categoryData, categoryIndex) {
        const columnDiv = document.createElement('div');
        columnDiv.className = 'column';
        columnDiv.dataset.categoryIndex = categoryIndex;
        columnDiv.dataset.categoryTitle = categoryData.title;

        const titleH2 = document.createElement('h2');
        titleH2.textContent = categoryData.title;
        if (isEditable) {
          titleH2.setAttribute('contenteditable', 'true');
          titleH2.addEventListener('blur', (e) => {
            const newTitle = e.target.textContent.trim();
            if (newTitle && websiteData.columns[categoryIndex].title !== newTitle) {
                websiteData.columns[categoryIndex].title = newTitle;
                saveWebsiteState();
                // Guardar el valor actual del filtro de categoría antes de re-renderizar
                const currentCategoryFilterValue = document.getElementById('categoryFilter').value;
                renderAllContent(); 
                // Restaurar el valor del filtro
                document.getElementById('categoryFilter').value = currentCategoryFilterValue;

            } else { 
                e.target.textContent = websiteData.columns[categoryIndex].title;
            }
          });
        }
        columnDiv.appendChild(titleH2);

        const toolsGridDiv = document.createElement('div');
        toolsGridDiv.className = 'ai-tools-grid';
        columnDiv.appendChild(toolsGridDiv);
        
        if (isEditable) {
          const addToolBtn = document.createElement('button');
          addToolBtn.className = 'add-link-btn';
          addToolBtn.textContent = '+ Añadir Herramienta IA';
          addToolBtn.onclick = () => openToolFormForAdd(categoryIndex);
          columnDiv.appendChild(addToolBtn);

          const removeCategoryBtn = document.createElement('button');
          removeCategoryBtn.className = 'remove-column-btn';
          removeCategoryBtn.textContent = 'Eliminar Categoría';
          removeCategoryBtn.onclick = () => removeCategory(categoryIndex);
          columnDiv.appendChild(removeCategoryBtn);
        }
        return columnDiv;
      }

      function createToolCardElement(toolData, categoryIndex) {
        const card = document.createElement('div');
        card.className = 'ai-tool-card';
        card.dataset.toolId = toolData.id;
        card.dataset.name = toolData.name.toLowerCase();
        card.dataset.briefDescription = toolData.briefDescription.toLowerCase();
        card.dataset.tags = toolData.tags.join(',').toLowerCase();
        card.dataset.pricingModel = toolData.pricingModel;
        card.dataset.timestampAdded = toolData.timestampAdded;

        const isNew = (Date.now() - toolData.timestampAdded) < (7 * 24 * 60 * 60 * 1000);
        if (isNew) {
            const newBadge = document.createElement('span');
            newBadge.className = 'new-badge';
            newBadge.textContent = 'NUEVO';
            card.appendChild(newBadge);
        }

        card.innerHTML = `
          <div class="tool-header">
            <img src="${toolData.logoUrl || 'https://via.placeholder.com/50'}" alt="${toolData.name} logo" class="tool-logo">
            <span class="tool-name">${toolData.name}</span>
          </div>
          <p class="tool-brief-description">${toolData.briefDescription}</p>
          <div class="tool-tags-pricing">
            <div class="tool-tags">
              ${toolData.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
            </div>
            <span class="tool-pricing"><span>${toolData.pricingModel}</span></span>
          </div>
          <div class="tool-actions">
            <button class="visit-site-btn" data-url="${toolData.websiteUrl}">Visitar Sitio Web</button>
            <button class="more-info-btn">Más Información</button>
          </div>
        `;

        card.querySelector('.visit-site-btn').addEventListener('click', function(e) {
          e.stopPropagation();
          const url = this.dataset.url;
          if (url) window.open(url, '_blank');
        });
        
        const moreInfoBtn = card.querySelector('.more-info-btn');
        if (toolData.isPrivate && !isEditable) {
            moreInfoBtn.textContent = "Info Restringida";
            moreInfoBtn.disabled = true; 
        } else {
            moreInfoBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                displayToolDetailsInPopup(toolData); 
            });
        }

        if (isEditable) {
          const editButtons = document.createElement('div');
          editButtons.className = 'tool-edit-buttons';
          editButtons.innerHTML = `
            <button title="Editar"><i class="fas fa-edit"></i></button>
            <button title="Eliminar"><i class="fas fa-trash-alt"></i></button>
          `;
          editButtons.querySelector('button[title="Editar"]').onclick = (e) => {
            e.stopPropagation();
            openToolFormForEdit(toolData, categoryIndex);
          };
          editButtons.querySelector('button[title="Eliminar"]').onclick = (e) => {
            e.stopPropagation();
            removeTool(toolData.id, categoryIndex);
          };
          card.appendChild(editButtons);
        }
        return card;
      }

      function displayToolDetailsInPopup(toolData) {
        document.querySelectorAll('.tooltip.popup').forEach(p => p.remove());
        const popup = document.createElement('div');
        popup.className = 'tooltip popup';

        let tutorialButtonHTML = '';
        if (toolData.tutorialUrl) {
          tutorialButtonHTML = `<button id="popupGoToTutorialBtn" class="secondary">Ver Tutorial</button>`;
        }
        
        let finalDescription = toolData.detailedDescription;
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = finalDescription; 

        const imagesInPopup = tempDiv.querySelectorAll('.resizable-img-container');
        imagesInPopup.forEach(imgContainer => {
            const handle = imgContainer.querySelector('.resize-handle');
            const deleteBtn = imgContainer.querySelector('.delete-image-btn');
            if (handle) handle.remove();
            if (deleteBtn) deleteBtn.remove();
            imgContainer.style.border = 'none'; 
        });
        
        if (imagesInPopup.length > 1 && !tempDiv.querySelector('.images-container')) {
            const imagesContainer = document.createElement('div');
            imagesContainer.className = 'images-container';
            imagesInPopup.forEach(imgC => imagesContainer.appendChild(imgC.cloneNode(true))); 
            
            let otherContent = Array.from(tempDiv.childNodes).filter(node => !node.classList || !node.classList.contains('resizable-img-container'));
            tempDiv.innerHTML = '';
            otherContent.forEach(node => tempDiv.appendChild(node));
            tempDiv.appendChild(imagesContainer);
        } else if (imagesInPopup.length === 1 && !tempDiv.querySelector('.images-container')) {
             imagesInPopup[0].style.maxWidth = '100%';
        }
        finalDescription = tempDiv.innerHTML; 

        popup.innerHTML = `
          <div class="popup-description">${finalDescription}</div>
          <div class="popup-buttons">
            <button id="popupGoToLinkBtn">Ir al Sitio Web</button>
            ${tutorialButtonHTML}
            <button id="popupCloseBtn">Cerrar</button>
          </div>
        `;
        document.body.appendChild(popup);

        popup.querySelector('#popupGoToLinkBtn').onclick = () => {
          if (toolData.websiteUrl) window.open(toolData.websiteUrl, '_blank');
          popup.remove();
        };
        if (toolData.tutorialUrl) {
          popup.querySelector('#popupGoToTutorialBtn').onclick = () => {
            window.open(toolData.tutorialUrl, '_blank');
            popup.remove();
          };
        }
        popup.querySelector('#popupCloseBtn').onclick = () => popup.remove();
      }

      function setupEditModeUI() {
        const isCurrentlyEditable = isEditable;
        document.body.classList.toggle('edit-mode', isCurrentlyEditable);
        if (columnControls) columnControls.style.display = isCurrentlyEditable ? 'flex' : 'none';
        editModeBtn.classList.toggle('active', isCurrentlyEditable);
        
        document.querySelectorAll('.column h2').forEach(title => {
          if (isCurrentlyEditable) title.setAttribute('contenteditable', 'true');
          else title.removeAttribute('contenteditable');
        });
        document.querySelectorAll('.add-link-btn, .remove-column-btn').forEach(btn => {
          btn.style.display = isCurrentlyEditable ? 'block' : 'none';
        });
        document.querySelectorAll('.tool-edit-buttons').forEach(group => {
          group.style.display = isCurrentlyEditable ? 'inline-flex' : 'none';
        });

        if (!isCurrentlyEditable && linkFormContainer && linkFormContainer.style.display === 'block') {
          closeLinkForm();
        }
      }

      function activateEditMode() {
        adminPasswordModal.style.display = 'flex';
        adminPasswordInput.value = ''; 
        adminPasswordInput.focus();
      }
      
      submitAdminPasswordBtn.addEventListener('click', async () => {
        const password = adminPasswordInput.value;
        if (!password) {
            alert("Por favor, introduce la contraseña.");
            return;
        }
        try {
            const isValid = await window.checkPassword(password); 
            if (isValid) {
                isEditable = true;
                editModeBtn.textContent = 'Desactivar Modo Edición';
                adminPasswordModal.style.display = 'none';
                renderAllContent(); 
            } else {
                alert('Contraseña de administrador incorrecta.');
                adminPasswordInput.value = '';
                adminPasswordInput.focus(); // Permitir reintentar fácilmente
            }
        } catch (error) {
            alert('Error al verificar contraseña de administrador.');
            console.error("Admin password check error:", error);
        }
      });

      // *** NUEVO: Listener para Enter en el campo de contraseña del admin ***
      adminPasswordInput.addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
              e.preventDefault(); // Prevenir cualquier comportamiento por defecto del Enter
              submitAdminPasswordBtn.click(); // Simular clic en el botón de activar
          }
      });

      cancelAdminPasswordBtn.addEventListener('click', () => {
        adminPasswordModal.style.display = 'none';
      });

      function deactivateEditMode() {
        isEditable = false;
        editModeBtn.textContent = 'Activar Modo Edición';
        renderAllContent();
      }

      editModeBtn.addEventListener('click', () => {
        if (!isEditable) activateEditMode();
        else deactivateEditMode();
      });

      window.addColumn = function() {
        if (!isEditable) return;
        const categoryName = prompt("Nombre de la nueva categoría:", "Nueva Categoría");
        if (categoryName && categoryName.trim()) {
          websiteData.columns.push({ title: categoryName.trim(), tools: [] });
          renderAllContent();
          saveWebsiteState();
        }
      };
      
      function removeCategory(categoryIndex) {
        if (!isEditable) return;
        if (confirm(`¿Seguro que quieres eliminar la categoría "${websiteData.columns[categoryIndex].title}" y todas sus herramientas?`)) {
          websiteData.columns.splice(categoryIndex, 1);
          renderAllContent();
          saveWebsiteState();
        }
      }

      function openToolFormForAdd(categoryIndex) {
        if (!isEditable) return;
        createOrUpdateLinkForm();
        linkFormTitle.textContent = `Añadir Herramienta a "${websiteData.columns[categoryIndex].title}"`;
        editingToolIdInput.value = "";
        editingCategoryIndexInput.value = categoryIndex;
        
        toolNameInput.value = "";
        toolUrlInput.value = "";
        toolLogoUrlInput.value = "";
        toolBriefDescriptionInput.value = "";
        _toolDetailedDescriptionInput.value = ""; 
        toolTagsInput.value = "";
        toolPricingModelSelect.value = "Gratis";
        toolTutorialUrlInput.value = "";
        toolPrivateCheckbox.checked = false;
        
        const cardPreviewTagsContainer = document.getElementById('cardPreviewTagsContainer');
        if(cardPreviewName) cardPreviewName.textContent = "Nombre Herramienta";
        if(cardPreviewLogo) cardPreviewLogo.src = "https://via.placeholder.com/50";
        if(cardPreviewDescription) cardPreviewDescription.textContent = "Descripción breve...";
        if(cardPreviewPricing && toolPricingModelSelect) cardPreviewPricing.textContent = toolPricingModelSelect.value;
        if(cardPreviewTagsContainer) cardPreviewTagsContainer.innerHTML = '';

        if(_descriptionPreviewForm) {
            _descriptionPreviewForm.innerHTML = ""; 
            _descriptionPreviewForm.style.display = 'none';
        }
        if(_previewDescriptionBtnForm) _previewDescriptionBtnForm.textContent = 'Vista Previa Detallada';
        
        linkFormContainer.style.display = 'block';
        toolNameInput.focus();
      }

      function openToolFormForEdit(toolData, categoryIndex) {
        if (!isEditable) return;
        createOrUpdateLinkForm();
        linkFormTitle.textContent = `Editar Herramienta: ${toolData.name}`;
        editingToolIdInput.value = toolData.id;
        editingCategoryIndexInput.value = categoryIndex;

        toolNameInput.value = toolData.name;
        toolUrlInput.value = toolData.websiteUrl;
        toolLogoUrlInput.value = toolData.logoUrl;
        toolBriefDescriptionInput.value = toolData.briefDescription;
        _toolDetailedDescriptionInput.value = toolData.detailedDescription; 
        toolTagsInput.value = toolData.tags.join(', ');
        toolPricingModelSelect.value = toolData.pricingModel;
        toolTutorialUrlInput.value = toolData.tutorialUrl || "";
        toolPrivateCheckbox.checked = toolData.isPrivate || false;
        
        const cardPreviewTagsContainer = document.getElementById('cardPreviewTagsContainer');
        if(cardPreviewName) cardPreviewName.textContent = toolData.name;
        if(cardPreviewLogo) cardPreviewLogo.src = toolData.logoUrl || "https://via.placeholder.com/50";
        if(cardPreviewDescription) cardPreviewDescription.textContent = toolData.briefDescription;
        if(cardPreviewPricing && toolPricingModelSelect) cardPreviewPricing.textContent = toolData.pricingModel;
        if(cardPreviewTagsContainer) {
            cardPreviewTagsContainer.innerHTML = toolData.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
        }

        if(_descriptionPreviewForm) {
            _descriptionPreviewForm.innerHTML = ""; 
            _descriptionPreviewForm.style.display = 'none';
        }
        if(_previewDescriptionBtnForm) _previewDescriptionBtnForm.textContent = 'Vista Previa Detallada';
        
        linkFormContainer.style.display = 'block';
      }

      function removeTool(toolId, categoryIndex) {
        if (!isEditable) return;
        const category = websiteData.columns[categoryIndex];
        const tool = category.tools.find(t => t.id === toolId);
        if (confirm(`¿Seguro que quieres eliminar la herramienta "${tool.name}"?`)) {
          category.tools = category.tools.filter(t => t.id !== toolId);
          renderAllContent();
          saveWebsiteState();
        }
      }
      
      async function saveWebsiteState() {
        if (!isEditable) return;
        console.log("Guardando estado...");
        try {
          const response = await fetch('guardar_cambios.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                password: '0', 
                background: websiteData.background || document.body.style.backgroundImage,
                columns: websiteData.columns
            })
          });
          if (!response.ok) {
            console.error('Error guardando en servidor:', response.status, await response.text());
            alert('Error al guardar los cambios en el servidor.');
            return;
          }
          const result = await response.json();
          if (!result.success) {
            console.error('Error del servidor al guardar:', result.error);
            alert(`Error del servidor al guardar: ${result.error || 'Error desconocido.'}`);
          } else {
            console.log('Guardado exitoso en servidor.');
          }
        } catch (error) {
          console.error('Error de red al intentar guardar:', error);
          alert('Error de red al intentar guardar los cambios.');
        }
      }

      async function loadInitialData() {
        try {
          const response = await fetch('load_state.php?t=' + Date.now());
          if (!response.ok) throw new Error(`Fallo al cargar datos del servidor: ${response.status}`);
          const loadedData = await response.json();
          
          if (loadedData && loadedData.error) { 
             console.error("Error en los datos cargados desde PHP:", loadedData.error, loadedData.detalles || "");
             alert(`Error al procesar los datos del servidor: ${loadedData.error}. Se cargarán datos por defecto.`);
             websiteData = { columns: [{ title: "General", tools: [] }], background: '' };
          } else if (loadedData && loadedData.columns) { 
            loadedData.columns.forEach(category => {
                if (!category.tools) category.tools = [];
                category.tools.forEach(tool => {
                    tool.id = tool.id || `tool_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                    tool.name = tool.name || "Herramienta sin nombre";
                    tool.websiteUrl = tool.websiteUrl || "#";
                    tool.logoUrl = tool.logoUrl || "";
                    tool.briefDescription = tool.briefDescription || "";
                    if (tool.hasOwnProperty('description') && !tool.detailedDescription) {
                        tool.detailedDescription = tool.description;
                        delete tool.description; 
                    }
                    tool.detailedDescription = tool.detailedDescription || "";
                    tool.tags = Array.isArray(tool.tags) ? tool.tags : (typeof tool.tags === 'string' ? tool.tags.split(',').map(t=>t.trim()).filter(Boolean) : []);
                    tool.pricingModel = tool.pricingModel || "Gratis";
                    tool.tutorialUrl = tool.tutorialUrl || "";
                    if (tool.hasOwnProperty('private') && !tool.hasOwnProperty('isPrivate')) {
                        tool.isPrivate = tool.private;
                        delete tool.private; 
                    }
                    tool.isPrivate = tool.isPrivate || false;
                    tool.timestampAdded = tool.timestampAdded || Date.now();
                    tool.timestampUpdated = tool.timestampUpdated || tool.timestampAdded;
                });
            });
            websiteData = loadedData;
            if (websiteData.background) {
                document.body.style.backgroundImage = websiteData.background;
            }
          } else { 
            console.warn("No se cargaron datos válidos o el archivo está vacío/malformado. Inicializando con datos por defecto.");
            websiteData = { columns: [{ title: "General", tools: [] }], background: '' };
          }
        } catch (error) { 
          console.error('Error crítico cargando datos iniciales:', error);
          alert(`Error crítico al cargar datos: ${error.message}. Se cargarán datos por defecto.`);
          websiteData = { columns: [{ title: "General", tools: [] }], background: '' };
        }
        createOrUpdateLinkForm();
        const categoryFilterSelect = document.getElementById('categoryFilter');
        if(localStorage.getItem('lastCategoryFilter')) { // Si hay un filtro guardado, usarlo
            categoryFilterSelect.value = localStorage.getItem('lastCategoryFilter');
        } else {
            categoryFilterSelect.value = ""; // Por defecto, "¿Qué categoría quieres ver?"
        }
        renderAllContent(); 
      }
      
      const searchInput = document.getElementById('searchInput');
      const categoryFilter = document.getElementById('categoryFilter');
      const pricingFilter = document.getElementById('pricingFilter');
      const sortOrderSelect = document.getElementById('sortOrder');

      function filterAndSortTools() {
          const searchTerm = searchInput.value.toLowerCase().trim();
          const selectedCategoryTitle = categoryFilter.value; 
          const selectedPricing = pricingFilter.value;
          const sortOrder = sortOrderSelect.value;

          // Guardar el filtro de categoría actual para persistencia entre recargas
          localStorage.setItem('lastCategoryFilter', selectedCategoryTitle);


          if (selectedCategoryTitle === "") { 
              columnsContainer.innerHTML = '<p class="initial-load-message">Por favor, selecciona una categoría para ver las herramientas.</p>';
              return; 
          }
          
          let hasVisibleCategoriesOrTools = false;
          columnsContainer.innerHTML = ''; 

          websiteData.columns.forEach((category, catIndex) => {
              let categoryShouldBeRendered = false;
              if (selectedCategoryTitle === "_all_") {
                  categoryShouldBeRendered = true;
              } else if (category.title === selectedCategoryTitle) {
                  categoryShouldBeRendered = true;
              }

              if (!categoryShouldBeRendered) {
                  return; 
              }
              
              const categoryElement = createCategoryElement(category, catIndex);
              const toolsGrid = categoryElement.querySelector('.ai-tools-grid');
              toolsGrid.innerHTML = ''; 

              let toolsToDisplay = category.tools ? [...category.tools] : [];

              toolsToDisplay = toolsToDisplay.filter(tool => {
                  const searchFields = [
                      tool.name,
                      tool.briefDescription,
                      ...(Array.isArray(tool.tags) ? tool.tags : [])
                  ].join(' ').toLowerCase();
                  
                  const textMatch = searchTerm ? searchFields.includes(searchTerm) : true;
                  const pricingMatch = !selectedPricing || tool.pricingModel === selectedPricing;
                  
                  return textMatch && pricingMatch;
              });
             
              toolsToDisplay.sort((a, b) => {
                  switch (sortOrder) {
                      case 'newest': return b.timestampAdded - a.timestampAdded;
                      case 'oldest': return a.timestampAdded - b.timestampAdded;
                      case 'nameAsc': return a.name.localeCompare(b.name);
                      case 'nameDesc': return b.name.localeCompare(a.name);
                      default: 
                               const originalTools = websiteData.columns[catIndex].tools || [];
                               const indexA = originalTools.indexOf(a);
                               const indexB = originalTools.indexOf(b);
                               return indexA - indexB;
                  }
              });

              if (toolsToDisplay.length > 0) {
                  toolsToDisplay.forEach(tool => {
                      toolsGrid.appendChild(createToolCardElement(tool, catIndex));
                  });
                  columnsContainer.appendChild(categoryElement); 
                  hasVisibleCategoriesOrTools = true;
              } else if (category.title === selectedCategoryTitle) { 
                  toolsGrid.innerHTML = '<p class="no-tools-message">No hay herramientas que coincidan con tu búsqueda en esta categoría.</p>';
                  columnsContainer.appendChild(categoryElement);
                  hasVisibleCategoriesOrTools = true; // La categoría se muestra, aunque vacía
              } else if (selectedCategoryTitle === "_all_" && (!category.tools || category.tools.length === 0)) {
                  // Si "Todas las Categorías" y la categoría está originalmente vacía (y no hay otros filtros que la hagan relevante)
                  toolsGrid.innerHTML = '<p class="no-tools-message">No hay herramientas en esta categoría aún.</p>';
                  columnsContainer.appendChild(categoryElement);
                  // No marcamos hasVisibleCategoriesOrTools = true aquí a menos que queramos forzar su visualización
                  // Dejemos que el mensaje final lo maneje si NINGUNA categoría tuvo herramientas
              }
          });

          if (!hasVisibleCategoriesOrTools && (selectedCategoryTitle === "_all_" || selectedCategoryTitle !== "")) {
              // Si después de procesar todas las categorías relevantes, ninguna tuvo herramientas (o la categoría específica no tuvo)
              columnsContainer.innerHTML = '<p class="initial-load-message">No se encontraron herramientas que coincidan con los filtros aplicados.</p>';
          }
          setupEditModeUI();
      }

      searchInput.addEventListener('input', filterAndSortTools);
      categoryFilter.addEventListener('change', filterAndSortTools);
      pricingFilter.addEventListener('change', filterAndSortTools);
      sortOrderSelect.addEventListener('change', filterAndSortTools);
      
      const themeSwitcher = document.getElementById('themeSwitcher');
      themeSwitcher.addEventListener('click', () => {
          document.body.classList.toggle('dark-theme');
          const isDark = document.body.classList.contains('dark-theme');
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
          themeSwitcher.textContent = isDark ? 'Tema Claro' : 'Tema Oscuro';
      });
      
      function applyInitialTheme() {
          const savedTheme = localStorage.getItem('theme');
          const isDark = savedTheme === 'dark';
          if (isDark) {
              document.body.classList.add('dark-theme');
          }
          themeSwitcher.textContent = isDark ? 'Tema Claro' : 'Tema Oscuro';
      }
      applyInitialTheme();


      document.getElementById('bgInput').addEventListener('change', function(e) {
        if (!isEditable) return;
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(evt) {
            const imageDataUrl = evt.target.result;
            document.body.style.backgroundImage = `url(${imageDataUrl})`;
            websiteData.background = `url(${imageDataUrl})`;
            saveWebsiteState();
          };
          reader.readAsDataURL(file);
        }
      });
      
      loadInitialData();

      document.addEventListener('click', function(e) {
        const activePopup = document.querySelector('.tooltip.popup');
        if (activePopup && !e.target.closest('.tooltip.popup') && !e.target.closest('.more-info-btn')) {
          activePopup.remove();
        }
        if (adminPasswordModal.style.display === 'flex' && !e.target.closest('.password-modal-content') && e.target !== adminPasswordModal && e.target !== editModeBtn && !editModeBtn.contains(e.target)) {
            adminPasswordModal.style.display = 'none';
        }
      });

      window.checkPassword = async function(password) {
        const formData = new FormData();
        formData.append('password', password);
        try {
            const response = await fetch('validar_password.php', {
                method: 'POST',
                body: formData 
            });
            if (!response.ok) {
                console.error("Error en la respuesta del servidor al validar contraseña:", response.status);
                const errorText = await response.text();
                console.error("Detalle del error del servidor:", errorText);
                alert(`Error del servidor (${response.status}) al validar contraseña. Revisa la consola para más detalles.`);
                return false; 
            }
            // Intentar parsear como JSON solo si el Content-Type es application/json
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.indexOf("application/json") !== -1) {
                const result = await response.json();
                if (result && typeof result.success === 'boolean') {
                    return result.success;
                } else {
                    console.error("Respuesta JSON inesperada del servidor al validar contraseña:", result);
                    alert("Respuesta JSON inesperada del servidor. No se pudo validar la contraseña.");
                    return false;
                }
            } else {
                // Si no es JSON, podría ser un error de PHP que no se formatea como JSON
                const errorText = await response.text();
                console.error("Respuesta no JSON del servidor:", errorText);
                alert("Respuesta inesperada del servidor (no JSON). Revisa la consola y el script PHP: validar_password.php");
                return false;
            }
        } catch (error) {
            console.error("Error de red o de parseo al validar contraseña:", error);
            alert("Error de red o de formato al validar contraseña. Verifica tu conexión y el script PHP.");
            return false; 
        }
      };
    });
  </script>
