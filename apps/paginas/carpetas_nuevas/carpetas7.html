<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Tutoriales IA</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="imagenes/favicon_integrado.ico" type="image/x-icon" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=Roboto:wght@300;400;700&display=swap');

/* ——— THEME ——— */
:root{
  --bg1:#0b1020; --bg2:#151a33;
  --card:#131a2f; --card-rgb:19,26,47;
  --text:#e9ecf5; --muted:#a0a8c0; --heading:#ffffff;
  --border:#263052; --accent:#7aa2ff; --accent-2:#50e6ff; --accent-3:#ff7ad9;
  --shadow:rgba(0,0,0,.35);
  --green:#10b981; --red:#ef4444; --orange:#f59e0b; --violet:#8b5cf6;
  --toast-bg: rgba(20,28,54,.95);
}
body.light{
  --bg1:#f3f6ff; --bg2:#eaf0ff;
  --card:#ffffff; --card-rgb:255,255,255;
  --text:#222; --muted:#5b6275; --heading:#1a1e2b; --border:#e6e8f3;
  --accent:#3b5cff; --accent-2:#1fb6ff; --accent-3:#b54dff; --shadow:rgba(0,0,0,.09);
  --toast-bg: rgba(255,255,255,.98);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; color:var(--text); font-family:'Roboto',system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,'Helvetica Neue',Arial,sans-serif;
  background:
    radial-gradient(1200px 700px at 10% -10%, rgba(122,162,255,.25), transparent 60%),
    radial-gradient(900px 600px at 110% 10%, rgba(80,230,255,.18), transparent 60%),
    radial-gradient(1000px 700px at 50% 120%, rgba(255,122,217,.12), transparent 60%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
  min-height:100dvh; padding-top:88px; transition: background .25s ease, color .2s ease;
}

/* ——— BACKGROUND CANVAS (Efecto 1) ——— */
#bgCanvas{
  position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.45; mix-blend-mode:screen;
}

/* ——— TOP BAR ——— */
.filters-search-bar{
  position:fixed; inset:0 0 auto 0; z-index:1001;
  display:flex; flex-wrap:wrap; gap:10px; align-items:center;
  background:rgba(var(--card-rgb),.75); backdrop-filter:saturate(140%) blur(10px);
  border-bottom:1px solid var(--border); padding:12px 16px;
}
.filters-search-bar input[type="search"]{
  flex:1; min-width:220px; padding:12px 14px; border-radius:12px;
  border:1px solid var(--border); background:rgba(255,255,255,.03); color:var(--text);
}
.toolbar-right{display:flex; gap:8px; align-items:center}
.toolbar-btn{
  padding:10px 12px; border:0; border-radius:12px; cursor:pointer;
  color:#fff; font-weight:800; box-shadow:0 8px 24px var(--shadow);
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
}
.toolbar-btn.secondary{ background:linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.06)); color:var(--text); border:1px solid var(--border) }
.toggle-group{display:flex; gap:6px; align-items:center}
.toggle-group .small{font-size:12px; color:var(--muted)}

/* ——— TITLES ——— */
.main-app-container{max-width:1300px;margin:0 auto;padding:22px; position:relative; z-index:1}
.section-title-wrapper{text-align:center;margin:26px 0 18px}
.section-title{
  display:inline-block; font-family:'Inter',sans-serif; font-weight:800; letter-spacing:.3px;
  font-size:26px; color:var(--heading);
  padding:10px 20px; border-radius:16px; border:1px solid var(--border);
  background:linear-gradient(180deg, rgba(var(--card-rgb),.7), rgba(var(--card-rgb),.5));
  box-shadow:0 10px 30px var(--shadow);
}

/* ——— BUTTONS ——— */
.add-item-btn{
  display:none; margin:0 auto 18px; padding:12px 16px; border:0; border-radius:12px; cursor:pointer; font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#fff; box-shadow:0 10px 24px var(--shadow);
}
body.edit-mode .add-item-btn{display:block}

/* ——— FOLDERS ——— */
.folders-grid{display:flex; flex-wrap:wrap; gap:18px; justify-content:center}
.folder-item-wrap{perspective:1000px; width:300px}
.folder-item{
  position:relative; transform-style:preserve-3d; cursor:pointer; overflow:hidden;
  background:rgba(var(--card-rgb), .86); border:1px solid var(--border); border-radius:18px; padding:16px;
  box-shadow:0 18px 40px var(--shadow); transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
}
.folder-item::before{
  content:""; position:absolute; inset:-1px; border-radius:18px; padding:1px;
  background:conic-gradient(from var(--angle,0deg), rgba(122,162,255,.35), rgba(80,230,255,.25), rgba(255,122,217,.35), rgba(122,162,255,.35));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; pointer-events:none;
  animation: spin 4.5s linear infinite paused;
}
.folder-item:hover{ background:rgba(var(--card-rgb), .92); box-shadow: 0 24px 60px rgba(122,162,255,.25), 0 8px 20px var(--shadow) }
.folder-item:hover::before{ animation-play-state:running }
@keyframes spin{ to{ --angle:360deg } }

.folder-header{display:flex; gap:12px; align-items:center; margin-bottom:8px}
.folder-icon{
  width:54px;height:54px;border-radius:12px;object-fit:cover;background:#0d1226;box-shadow: inset 0 0 0 1px var(--border); transform: translateZ(20px);
}
.folder-name{
  font-family:'Inter',sans-serif; font-weight:800; font-size:18px;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 50%, var(--accent-3) 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent; transform: translateZ(18px);
}
.folder-description{ font-size:14px; color:var(--muted); min-height:40px; transform: translateZ(12px); }
.item-edit-buttons,.item-order-buttons{ display:none; position:absolute; top:8px; gap:6px; z-index:5; transform: translateZ(30px) }
.item-edit-buttons{ right:8px } .item-order-buttons{ left:8px }
body.edit-mode .item-edit-buttons, body.edit-mode .item-order-buttons{ display:flex }
.item-edit-buttons button, .item-order-buttons button{
  border:1px solid var(--border); background:rgba(255,255,255,.06); color:var(--text);
  padding:6px 8px; border-radius:10px; cursor:pointer; font-size:12px;
}
.folder-item.drag-shadow{ outline:2px dashed var(--accent-2); outline-offset:4px }

/* ——— FOLDER VIEW ——— */
#folderView{ display:none }
.folder-view-header{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between; margin-bottom:16px }
.folder-view-title{
  font-family:'Inter',sans-serif; font-size:22px; font-weight:800;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 50%, var(--accent-3) 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.folder-view-actions{ display:flex; gap:10px; flex-wrap:wrap; align-items:center }
.btn-back{
  display:inline-flex; align-items:center; gap:8px;
  border:0;
  background:linear-gradient(135deg, var(--accent-3), var(--violet));
  color:#fff; border-radius:12px; padding:10px 14px; font-weight:800; cursor:pointer;
  box-shadow:0 10px 24px var(--shadow);
  transition: box-shadow .2s ease-in-out;
}
.btn-back:before{ content:"\f060"; font-family:"Font Awesome 6 Free"; font-weight:900; }
.btn-back:hover{ box-shadow:0 20px 40px rgba(255,122,217,.25), 0 8px 20px var(--shadow) }

/* ——— VIDEO GRID ——— */
.grid-videos{ display:grid; grid-template-columns:repeat(5,1fr); gap:16px }
@media (max-width:1200px){ .grid-videos{ grid-template-columns:repeat(4,1fr) } }
@media (max-width:900px){  .grid-videos{ grid-template-columns:repeat(3,1fr) } }
@media (max-width:700px){  .grid-videos{ grid-template-columns:repeat(2,1fr) } }
@media (max-width:460px){  .grid-videos{ grid-template-columns:repeat(1,1fr) } }

/* ——— VIDEO CARDS ——— */
.video-tilt-wrap{ perspective:1000px }
.video-card{
  position:relative; transform-style:preserve-3d; will-change: transform;
  background:rgba(var(--card-rgb), .9); border:1px solid var(--border);
  border-radius:16px; overflow:hidden; box-shadow:0 14px 32px var(--shadow);
  display:flex; flex-direction:column; transition:.12s ease;
  --glow: rgba(122,162,255,.25);
}
.video-card::before{
  content:""; position:absolute; inset:-1px; border-radius:16px; padding:1px;
  background:conic-gradient(from var(--angle,0deg), var(--glow), rgba(80,230,255,.25), rgba(255,122,217,.25), var(--glow));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; pointer-events:none;
  animation: spin 6s linear infinite paused;
}
.video-card:hover{ background:rgba(var(--card-rgb), .96); box-shadow:0 22px 54px var(--glow), 0 10px 22px var(--shadow); transform: translateZ(8px) }
.video-card:hover::before{ animation-play-state:running }

.thumb-wrap{ position:relative; aspect-ratio:16/9; background:#0a0a0a; transform: translateZ(22px) }
.thumb-wrap img{
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:contain; padding:1.2rem; filter:saturate(110%);
}
.thumb-skeleton{
  position:absolute; inset:0; background:linear-gradient(90deg, rgba(255,255,255,.06), rgba(255,255,255,.02), rgba(255,255,255,.06));
  background-size:200% 100%; animation: shimmer 1.1s linear infinite;
}
@keyframes shimmer{ to{background-position: -200% 0} }

.video-body{ padding:12px; display:flex; flex-direction:column; gap:6px; flex-grow:1; }
.video-title{ font-weight:800; line-height:1.2; font-family:'Inter',sans-serif; transform: translateZ(16px); flex-grow:1; }
.video-note{ font-size:13px; color:var(--muted); transform: translateZ(12px) }
.video-tags{ display:flex; gap:6px; flex-wrap:wrap; margin-top:2px }
.video-tag{
  font-size:11px; padding:4px 8px; border-radius:999px; border:1px solid var(--border); color:var(--text); opacity:.95;
  background:rgba(255,255,255,.04);
}

/* --- VIDEO CARD ACTIONS --- */
.video-actions { margin-top:10px; transform: translateZ(14px); }
body:not(.edit-mode) .video-actions { display:block; }
body:not(.edit-mode) .video-actions .btn-open{
  display:block; width:100%; text-align:center; padding:12px; font-size:15px; font-weight:800; border-radius:12px;
  color:#fff; background: linear-gradient(135deg, var(--accent-3), var(--violet));
  box-shadow: 0 10px 24px var(--shadow); border:0; cursor:pointer; text-decoration:none; transition: box-shadow .2s;
}
body:not(.edit-mode) .video-actions .btn-open:hover{ box-shadow:0 20px 40px rgba(255,122,217,.25), 0 8px 20px var(--shadow) }

/* Modo EDICIÓN */
body.edit-mode .video-actions{
  display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
}
body.edit-mode .video-actions a,
body.edit-mode .video-actions button{
  display:flex; align-items:center; justify-content:center; font-size:14px; padding:8px; border:0; border-radius:8px; color:#fff; cursor:pointer;
}
.btn-open{ background:linear-gradient(135deg, var(--accent-2), var(--accent)) }
.btn-edit{ background:linear-gradient(135deg, #8b5cf6, #a855f7) }
.btn-dup{ background:linear-gradient(135deg, var(--green), #22d3ee) }
.btn-del{ background:linear-gradient(135deg, #ef4444, #f97316) }
.btn-move{ background:linear-gradient(135deg, rgba(255,255,255,.1), rgba(255,255,255,.06)); color:var(--text); border:1px solid var(--border) }
.btn-upload{ background:linear-gradient(135deg, var(--orange), var(--accent-3)) }

/* selección múltiple */
.select-box{
  position:absolute; top:8px; left:8px; z-index:3; display:none;
  width:22px; height:22px; border-radius:6px; border:1px solid var(--border);
  background:rgba(0,0,0,.2); backdrop-filter: blur(2px);
}
.select-box input{ width:100%; height:100%; margin:0; cursor:pointer }
body.edit-mode .select-box{ display:block }
.video-card.selected{ outline:2px solid var(--accent-2); outline-offset:2px }

/* ——— MODALES Y FORMS ——— */
.form-modal-overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:10000; justify-content:center; align-items:center }
.form-modal-content{
  background:rgba(var(--card-rgb), .96); border:1px solid var(--border);
  border-radius:16px; padding:22px; max-width:900px; width:92vw; box-shadow:0 18px 40px var(--shadow); color:var(--text);
}
.form-modal-content h3{ font-family:'Inter',sans-serif; text-align:center; margin:6px 0 14px }
.form-group{ margin:10px 0 }
.form-group label{ display:block; margin-bottom:6px; font-weight:800; font-family:'Inter',sans-serif }
.form-group input, .form-group textarea, .form-group select{
  width:100%; padding:12px; border-radius:12px; border:1px solid var(--border);
  background:rgba(255,255,255,.03); color:var(--text);
}
.inline-help{ font-size:12px; color:var(--muted); margin-top:6px }
.thumb-preview{ margin-top:10px; border:1px dashed var(--border); border-radius:12px; padding:10px; display:flex; align-items:center; gap:12px }
.thumb-preview img{ width:160px; height:auto; border-radius:8px }
.form-buttons{ display:flex; justify-content:flex-end; gap:10px; margin-top:12px }
.save-btn{ background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#fff; border:0; border-radius:12px; padding:10px 14px; font-weight:800; cursor:pointer }
.cancel-btn{ background:#6c757d; color:#fff; border:0; border-radius:12px; padding:10px 14px; font-weight:800; cursor:pointer }

/* ——— GLOBAL CONTROLS ——— */
.global-controls{ position:fixed; bottom:20px; right:20px; display:none; flex-direction:column; gap:10px; z-index:1000 }
body.edit-mode .global-controls{ display:flex }
.global-controls button{
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:#fff; border:0; border-radius:28px; padding:10px 14px; font-weight:800; cursor:pointer; box-shadow:0 10px 24px var(--shadow)
}
#edit-mode-toggle-btn{
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
  background:transparent; color:#fff; border:1px solid var(--border);
  border-radius:28px; padding:12px 28px; font-weight:800; cursor:pointer; box-shadow:0 8px 20px var(--shadow);
  z-index: 1002;
}
#edit-mode-toggle-btn.active{ background:#dc3545 }

/* ——— TOASTS ——— */
#toasts{ position:fixed; top:14px; right:14px; z-index:20002; display:flex; flex-direction:column; gap:8px }
.toast{
  background:var(--toast-bg); color:var(--text); border:1px solid var(--border); border-radius:12px;
  padding:10px 12px; font-size:13px; box-shadow:0 8px 22px var(--shadow); display:flex; gap:8px; align-items:center; min-width:220px
}
.toast.ok::before{content:"✔️"}
.toast.err::before{content:"⚠️"}
.toast.info::before{content:"ℹ️"}

/* ——— MISC ——— */
.no-items-message{text-align:center;color:var(--muted);padding:18px;width:100%}

/* ——— OPTIMIZACIONES ——— */
.has-search .item-order-buttons, .has-search .btn-move { display: none; }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="filters-search-bar">
  <input type="search" id="globalSearchInput" placeholder="Buscar carpetas o vídeos…" />
  <div class="toolbar-right">
    <div class="toggle-group">
      <button id="themeSwitcherBtn" class="toolbar-btn">Tema Claro</button>
    </div>
  </div>
</div>

<div class="main-app-container">
  <section id="foldersSection">
    <div class="section-title-wrapper"><h2 class="section-title">Tutoriales de IA</h2></div>
    <button id="addFolderBtn" class="add-item-btn">Añadir Carpeta</button>
    <div id="foldersGrid" class="folders-grid"></div>
    <p id="noFoldersMsg" class="no-items-message" style="display:none">No hay carpetas todavía.</p>
  </section>

  <section id="folderView">
    <div class="folder-view-header">
      <div class="folder-view-title" id="folderViewTitle">Carpeta</div>
      <div class="folder-view-actions">
        <button id="backToFoldersBtn" class="btn-back">Volver</button>
        <button id="addVideoBtn" class="add-item-btn">Añadir Vídeo</button>
      </div>
    </div>

    <!-- Toolbar selección múltiple -->
    <div id="bulkBar" style="display:none; margin:0 0 10px; padding:8px; border:1px dashed var(--border); border-radius:12px; background:rgba(255,255,255,.03)">
      <span id="bulkCount">0 seleccionados</span>
      <button id="bulkMoveBtn" class="toolbar-btn secondary">Mover a…</button>
      <button id="bulkDupBtn" class="toolbar-btn secondary">Duplicar en…</button>
      <button id="bulkDelBtn" class="toolbar-btn" style="background:linear-gradient(135deg,#ef4444,#f97316)">Eliminar</button>
    </div>

    <div id="videosGrid" class="grid-videos"></div>
    <p id="noVideosMsg" class="no-items-message" style="display:none">Esta carpeta está vacía.</p>
  </section>
</div>

<!-- Controles globales (solo edición) -->
<div class="global-controls">
  <button id="changeBgBtn" title="Cambiar fondo"><i class="fas fa-image"></i></button>
</div>
<input type="file" id="hiddenBgInput" accept="image/*" style="display:none" />
<button id="edit-mode-toggle-btn"></button>

<!-- Modal contraseña -->
<div id="adminPasswordModal" class="form-modal-overlay">
  <div class="form-modal-content">
    <h3>Acceder al Modo Edición</h3>
    <div class="form-group"><input type="password" id="adminPasswordInput" placeholder="Contraseña" /></div>
    <div class="form-buttons">
      <button id="submitAdminPasswordBtn" class="save-btn">Activar</button>
      <button id="cancelAdminPasswordBtn" class="cancel-btn">Cancelar</button>
    </div>
  </div>
</div>

<!-- Modal genérico -->
<div id="formModal" class="form-modal-overlay">
  <div class="form-modal-content" id="genericFormContainer"></div>
</div>

<div id="toasts"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  /* ===== STATE ===== */
  let appData = {
    settings:{background:'',theme:'dark',fx:'nebula',viewModes:{},savedTagFilters:{}},
    prompts:[],
    promptFolders:[]
  };
  let isEditable = false;
  let currentPassword = '';
  let currentFolderId = null;
  let selection = new Set();

  /* ===== DOM (idéntico a tu versión) ===== */
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  const inputSearch = document.getElementById('globalSearchInput');
  const btnTheme = document.getElementById('themeSwitcherBtn');
  const btnEdit = document.getElementById('edit-mode-toggle-btn');
  const foldersSection = document.getElementById('foldersSection');
  const foldersGrid = document.getElementById('foldersGrid');
  const noFoldersMsg = document.getElementById('noFoldersMsg');
  const addFolderBtn = document.getElementById('addFolderBtn');
  const folderView = document.getElementById('folderView');
  const folderViewTitle = document.getElementById('folderViewTitle');
  const backToFoldersBtn = document.getElementById('backToFoldersBtn');
  const addVideoBtn = document.getElementById('addVideoBtn');
  const videosGrid = document.getElementById('videosGrid');
  const noVideosMsg = document.getElementById('noVideosMsg');
  const bulkBar = document.getElementById('bulkBar');
  const bulkCount = document.getElementById('bulkCount');
  const bulkMoveBtn = document.getElementById('bulkMoveBtn');
  const bulkDupBtn = document.getElementById('bulkDupBtn');
  const bulkDelBtn = document.getElementById('bulkDelBtn');
  const formModal = document.getElementById('formModal');
  const formBox = document.getElementById('genericFormContainer');
  const passModal = document.getElementById('adminPasswordModal');
  const passInput = document.getElementById('adminPasswordInput');
  const submitPassBtn = document.getElementById('submitAdminPasswordBtn');
  const cancelPassBtn = document.getElementById('cancelAdminPasswordBtn');
  const hiddenBgInput = document.getElementById('hiddenBgInput');
  const changeBgBtn = document.getElementById('changeBgBtn');

  /* ===== UTILS ===== */
  const showToast = (msg,type='info')=>{
    const wrap = document.getElementById('toasts');
    const el = document.createElement('div');
    el.className = 'toast '+type;
    el.textContent = msg;
    wrap.appendChild(el);
    setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(-6px)'; }, 2400);
    setTimeout(()=> el.remove(), 3000);
  };
  const slugify = str => (str||'').toString().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') || 'carpeta';
  const getYouTubeId = url=>{
    if(!url) return null;
    try{
      const u = new URL(url);
      if (u.hostname.includes('youtu.be')) return u.pathname.slice(1);
      if (u.searchParams.get('v')) return u.searchParams.get('v');
      const m = u.pathname.match(/\/(embed|shorts|v)\/([^/?#]+)/);
      if (m) return m[2];
    }catch(e){}
    const r = (url+'').match(/(?:v=|\/)([0-9A-Za-z_-]{11})(?:[&?]|$)/);
    return r ? r[1] : null;
  };
  const ytThumb = id => `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
  const now = () => Date.now();
  function showLoading(txt='Cargando…'){
    let d = document.getElementById('loadingOverlay');
    if(!d){
      d = document.createElement('div');
      d.id='loadingOverlay';
      d.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;z-index:20000';
      document.body.appendChild(d);
    }
    d.textContent = txt; d.style.display='flex';
  }
  const hideLoading = ()=>{ const d=document.getElementById('loadingOverlay'); if(d) d.style.display='none'; };
  const alertError = msg => alert('Error: '+msg);

  /* ===== THEME & FX (igual) ===== */
  function applyThemeFromSettings(){
    appData.settings.theme = 'dark';
    document.body.classList.toggle('light', appData.settings.theme==='light');
    btnTheme.textContent = document.body.classList.contains('light') ? 'Tema Oscuro' : 'Tema Claro';
    if(appData.settings.background){
      document.body.style.backgroundImage = appData.settings.background + ', ' + getComputedStyle(document.body).backgroundImage;
      document.body.style.backgroundAttachment='fixed, scroll';
      document.body.style.backgroundSize='cover, auto';
    }

  }

    document.body.classList.toggle('light', !isLight);

  /* ===== FX fondo (igual) ===== */
  let fxRAF = null, particles = [];
  function resizeCanvas(){ canvas.width = innerWidth; canvas.height = innerHeight; }
  function startOrStopFx(on){
    if(on){ resizeCanvas(); createParticles(); animateFx(); addEventListener('resize', resizeCanvas); }
    else{ cancelAnimationFrame(fxRAF); fxRAF=null; particles=[]; ctx.clearRect(0,0,canvas.width,canvas.height); removeEventListener('resize', resizeCanvas); }
  }
  function createParticles(){
    const count = Math.round((innerWidth*innerHeight)/38000);
    particles = Array.from({length:count}, ()=>({
      x: Math.random()*innerWidth, y: Math.random()*innerHeight,
      r: 0.8+Math.random()*2.2,
      dx: (-0.3+Math.random()*0.6), dy:(-0.2+Math.random()*0.4),
      h: Math.floor(Math.random()*360)
    }));
  }
  function animateFx(){
    fxRAF = requestAnimationFrame(animateFx);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.dx; p.y+=p.dy;
      if(p.x<0||p.x>innerWidth) p.dx*=-1;
      if(p.y<0||p>innerHeight) p.dy*=-1;
      ctx.beginPath();
      const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*6);
      g.addColorStop(0, `hsla(${p.h},70%,60%,.6)`); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.arc(p.x,p.y,p.r*6,0,Math.PI*2); ctx.fill();
    });
  }

  /* ===== IMAGE UPLOAD: redimensionar a Blob + subir al servidor ===== */
  function resizeImageToBlob(file, maxW, maxH, mime='image/jpeg', quality=0.85){
    return new Promise((resolve, reject)=>{
      if (!file || !/^image\//i.test(file.type)) return reject('Archivo no válido');
      const reader = new FileReader();
      reader.onerror = ()=> reject('No se pudo leer la imagen');
      reader.onload = e=>{
        const img = new Image();
        img.onload = ()=>{
          let w=img.width, h=img.height;
          if (w>h) { if (w>maxW){ h = Math.round(h*(maxW/w)); w=maxW; } }
          else { if (h>maxH){ w = Math.round(w*(maxH/h)); h=maxH; } }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          c.toBlob(b=>{
            if(!b) return reject('No se pudo procesar la imagen');
            resolve(b);
          }, mime, quality);
        };
        img.onerror = ()=> reject('Imagen corrupta');
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  async function uploadBlob(kind, id, blob){
    const fd = new FormData();
    fd.append('password', currentPassword);
    fd.append('kind', kind);
    fd.append('id', id||'');
    fd.append('file', blob, 'upload.jpg');
    const r = await fetch('subir_imagen.php', {method:'POST', body: fd});
    const j = await r.json();
    if(!r.ok || !j.success) throw new Error(j.error || 'No se pudo subir la imagen');
    return j.url; // ruta relativa
  }

  function attachLazyThumbs(scope=document){
    const imgs = [...scope.querySelectorAll('img[data-src]')];
    const io = new IntersectionObserver(entries=>{
      entries.forEach(ent=>{
        if(ent.isIntersecting){
          const img = ent.target;
          const skeleton = img.previousElementSibling;
          img.setAttribute('referrerpolicy','no-referrer');
          img.onload = ()=>{ skeleton?.remove(); applyDominantGlow(img); };
          img.onerror = ()=> skeleton?.remove();
          img.src = img.dataset.src;
          img.removeAttribute('data-src');
          io.unobserve(img);
        }
      });
    }, {rootMargin:'200px'});
    imgs.forEach(img=> io.observe(img));
  }
  function applyDominantGlow(img){
    const card = img.closest('.video-card');
    try{
      const c = document.createElement('canvas'); const cx = c.getContext('2d');
      c.width = 64; c.height = 36; cx.drawImage(img,0,0,64,36);
      const d = cx.getImageData(0,0,64,36).data; let r=0,g=0,b=0,count=0;
      for(let i=0;i<d.length;i+=4){ r+=d[i]; g+=d[i+1]; b+=d[i+2]; count++; }
      r=Math.round(r/count); g=Math.round(g/count); b=Math.round(b/count);
      card.style.setProperty('--glow', `rgba(${r},${g},${b},.35)`);
    }catch(e){
      card.style.setProperty('--glow', colorFromId(img.src, .28));
    }
  }
  function colorFromId(obj, alpha=0.28){
    const s = typeof obj==='string'? obj : (obj.title||obj.id||'x');
    let h=0; for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))>>>0; }
    h = h % 360;
    return `hsla(${h}, 70%, 60%, ${alpha})`;
  }

      let thumbUrl = v?.thumbnailUrl || '';

      if(!title || !url){ alert('Título y URL son obligatorios.'); return; }
      if(!vid && !confirm('No parece una URL válida de YouTube. ¿Guardar igualmente?')) return;

      try{
        const file = customThumbFileInput.files[0];
        if (file) {
          const blob = await resizeImageToBlob(file, 480, 270);
          thumbUrl = await uploadBlob('prompt', v?.id || ('p_'+now()), blob);
        }

        if(v){
          v.title=title; v.promptText=url; v.descriptionHTML=note; v.tags = tags; v.timestampUpdated=now(); v.locked = locked;
          if (thumbUrl) v.thumbnailUrl = thumbUrl;
        }else{
          appData.prompts.push({
            id:'p_'+now(),
            title, promptText:url, descriptionHTML:note, tags,
            thumbnailUrl: thumbUrl,
            folderId: currentFolderId,
            manualOrderRank: null,
            timestampAdded: now(), timestampUpdated: now(),
            exampleImageUrls:[],
            locked: locked
          });
        }
        if(await saveAll('Guardando vídeo…')){ formModal.style.display='none'; renderFolderView(); }
      }catch(err){ alertError(err.message||err); }
    };
  }

  /* ===== BARRA MASIVA / DUP / MOVE / DEL (igual) ===== */
  function updateBulkBar(){
    const n = selection.size;
    bulkBar.style.display = (isEditable && n>0) ? 'block':'none';
    bulkCount.textContent = `${n} seleccionados`;
  }
  function duplicateOrMove(ids, targetIds, action){
    if(targetIds.size===0){ showToast('Sin carpetas destino','info'); return; }
    const items = appData.prompts.filter(p=> ids.includes(p.id));
    targetIds.forEach(fid=>{
      items.forEach(v=>{
        if(action==='move'){
          const item = appData.prompts.find(p=>p.id===v.id);
          if(item){ item.folderId = fid; item.timestampUpdated = now(); }
        }else{
          const exists = appData.prompts.find(p=>p.folderId===fid && p.promptText===v.promptText);
          if(!exists){
            appData.prompts.push({
              id:'p_'+now()+'_'+Math.random().toString(36).slice(2,6),
              title:v.title, promptText:v.promptText, descriptionHTML:v.descriptionHTML, tags:[...(v.tags||[])],
              thumbnailUrl: v.thumbnailUrl,
              folderId: fid, manualOrderRank: null,
              timestampAdded: now(), timestampUpdated: now(),
              exampleImageUrls:[],
              locked: v.locked
            });
          }
        }
      });
    });
    saveAll(action==='move'?'Moviendo…':'Duplicando…').then(()=>{ renderFolderView(); showToast(action==='move'?'Movidos':'Duplicados','ok'); });
  }
  bulkMoveBtn.onclick = ()=>{ openFolderMultiSelect(bulkMoveBtn, currentFolderId, new Set(), (targets)=> duplicateOrMove([...selection], targets, 'move')); };
  bulkDupBtn.onclick = ()=>{ openFolderMultiSelect(bulkDupBtn, currentFolderId, new Set(), (targets)=> duplicateOrMove([...selection], targets, 'dup')); };
  bulkDelBtn.onclick = ()=>{ if(!confirm(`Eliminar ${selection.size} vídeo(s)?`)) return;
    appData.prompts = appData.prompts.filter(p=> !selection.has(p.id));
    saveAll('Eliminando…').then(()=> renderFolderView());
  };

  /* ===== ROUTING / SEARCH ===== */
  function openFolderBySlug(slug){
    const f = appData.promptFolders.find(x=>x.slug===slug); if(!f) return;
    currentFolderId = f.id; history.replaceState(null,'','?carpeta='+encodeURIComponent(slug));
    renderFolderView();
  }
  function routeToFolders(){ currentFolderId = null; history.replaceState(null,'','?'); folderView.style.display='none'; foldersSection.style.display='block'; }
  function route(){
    const slug = new URLSearchParams(location.search).get('carpeta');
    if(slug){
      const f = appData.promptFolders.find(x=>x.slug===slug);
      if(f){ currentFolderId=f.id; foldersSection.style.display='none'; folderView.style.display='block'; renderFolderView(); return; }
    }
    routeToFolders(); renderFolders();
  }
  inputSearch.oninput = ()=> { if(currentFolderId) renderFolderView(); else renderFolders(); };

  /* ===== FONDO: subir archivo y guardar URL ===== */
  changeBgBtn.onclick = ()=>{ if(isEditable) hiddenBgInput.click(); };
  hiddenBgInput.onchange = async e=>{
    const f = e.target.files?.[0]; if(!f || !isEditable) return;
    try{
      const blob = await resizeImageToBlob(f, 1920, 1080);
      const url = await uploadBlob('bg', 'sitebg', blob);
      appData.settings.background = `url(${url})`;
      await saveAll('Guardando fondo…'); applyThemeFromSettings();
    }catch(err){ alertError(err.message||err); }
  };

  /* ===== Efecto 3D / Observer / Shortcuts (igual) ===== */
  function attach3DTilt(selector){
    document.querySelectorAll(selector).forEach(card=>{
      const parent = card.closest('.video-tilt-wrap') || card.parentElement;
      const max = 12;
      const reset = ()=>{ card.style.transform = `rotateX(0deg) rotateY(0deg) translateZ(0)`; };
      parent.addEventListener('mousemove', (e)=>{
        const rect = parent.getBoundingClientRect();
        const px = (e.clientX - rect.left) / rect.width;
        const py = (e.clientY - rect.top) / rect.height;
        const rotY = (px - .5) * (max*2);
        const rotX = - (py - .5) * (max*2);
        card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translateZ(10px)`;
      });
      parent.addEventListener('mouseleave', reset);
      parent.addEventListener('mouseenter', reset);
    });
  }
  const revealObserver = {
    io: new IntersectionObserver(entries=>{
      entries.forEach(ent=>{
        if(ent.isIntersecting){
          ent.target.style.transition='opacity .35s ease, transform .35s ease';
          ent.target.style.opacity='1'; ent.target.style.transform='translateY(0)';
          revealObserver.io.unobserve(ent.target);
        }
      });
    }, {rootMargin:'100px'}),
    observeAll(nodes){
      nodes.forEach(n=>{
        n.style.opacity='0'; n.style.transform='translateY(8px)';
        revealObserver.io.observe(n);
      });
    }
  };
  document.addEventListener('keydown', (e)=>{
    const meta = e.ctrlKey || e.metaKey;
    if(e.key==='Escape'){
      if(formModal.style.display==='flex') return formModal.style.display='none';
      if(passModal.style.display==='flex') return passModal.style.display='none';
    }
    if(isEditable && currentFolderId){
      if(meta && (e.key==='ArrowLeft' || e.key==='ArrowRight')){
        if(selection.size===1){
          const id = [...selection][0];
          moveVideo(id, e.key==='ArrowLeft'?-1:1);
        }
      }
    }
  });

  /* ===== INIT ===== */
  loadState();
});
</script>
