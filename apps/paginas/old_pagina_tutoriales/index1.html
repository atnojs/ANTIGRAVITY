  <style>
  /* ===== CORRECCIONES DE VISIBILIDAD ===== */
.prompts-section {
    display: block;
}

.prompts-section #promptsListContainer {
    display: none;  /* Oculto por defecto */
}

body.edit-mode .prompts-section #promptsListContainer {
    display: grid;  /* Visible solo en modo edición */
}

.prompts-section #activePromptDisplayArea {
    display: none;  /* Oculto por defecto */
}

body:not(.edit-mode) .prompts-section #activePromptDisplayArea:not(:empty) {
    display: block; /* Visible solo en modo visión cuando tiene contenido */
}

/* ===== CORRECCIONES FINALES ===== */
.form-modal-overlay {
    display: none; /* Asegura que se muestre correctamente solo cuando se necesita */
    z-index: 10000;
    /* display: flex; Ya no es necesario aquí, se controla por JS */
}

.folder-prompts-menu {
    z-index: 1010;
}
  
    /* ===== RESET O AJUSTES BÁSICOS ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ===== FUENTES (Primarias del DHI) ===== */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');

    /* ===== VARIABLES CSS (Temas - Base DHI) ===== */
    :root {
      --bg-color: #f0f2f5; --card-bg-color: #ffffff; --text-color: #333333;
      --primary-color: #007bff; --accent-color: #00bcd4; --heading-color: #2c3e50;
      --border-color: #e0e0e0; --shadow-color: rgba(0,0,0,0.1);
      --column-bg: rgba(230,230,250,0.05); --column-backdrop: blur(8px);
      --column-header-color: var(--accent-color); --placeholder-text-color: #7f8c8d;
      --button-edit-bg: rgba(0,0,0,0.05); --button-edit-hover-bg: rgba(0,0,0,0.1);
      --font-primary: 'Inter', sans-serif; --font-secondary: 'Roboto', sans-serif;
      
      /* Variables RGB para opacidad */
      --card-bg-color-rgb: 255,255,255;
      --text-color-rgb: 51,51,51;

      --prompt-block-bg: var(--card-bg-color);
      --folder-button-bg: var(--card-bg-color);
    }
    body.dark-theme {
      --bg-color: #1a1a2e; --card-bg-color: #2c3e50; --text-color: #e0e0e0;
      --primary-color: #00aeff; --accent-color: #00e5ff; --heading-color: #ffffff;
      --border-color: #4f5b6a; --shadow-color: rgba(0,0,0,0.3);
      --column-bg: rgba(44,62,80,0.2); --column-header-color: var(--accent-color);
      --placeholder-text-color: #95a5a6; --button-edit-bg: rgba(255,255,255,0.1);
      --button-edit-hover-bg: rgba(255,255,255,0.2);
      
      /* Variables RGB para opacidad en tema oscuro */
      --card-bg-color-rgb: 44,62,80;
      --text-color-rgb: 224,224,224;
    }
    body { font-family:var(--font-secondary); min-height:100vh; background-color:var(--bg-color); background-size:cover; background-position:center; background-attachment:fixed; color:var(--text-color); transition:background-color .3s,color .3s; touch-action:manipulation; padding-top:80px; }
    
    .main-app-container { max-width:100%; margin:0 auto; padding:20px; }
    
    .filters-search-bar { position:fixed; top:0; left:0; width:100%; background-color:var(--card-bg-color); padding:15px 20px; box-shadow:0 2px 10px var(--shadow-color); z-index:1001; display:flex; flex-wrap:wrap; gap:15px; align-items:center; }
    .filters-search-bar input[type="search"], .filters-search-bar select { padding:10px; border:1px solid var(--border-color); border-radius:6px; background-color:var(--bg-color); color:var(--text-color); font-family:var(--font-secondary); }
    .filters-search-bar input[type="search"] { flex-grow:1; min-width:200px; }
    .filters-search-bar label { margin-right:5px; font-weight:600; color:var(--text-color); }
    .filters-search-bar .theme-switcher-btn { padding:10px 15px; background-color:var(--primary-color); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
    .filters-search-bar .theme-switcher-btn:hover { opacity:.9; }

    .section-title-wrapper {
        text-align: center;
        margin: 40px 0 25px 0; 
        width: 100%;
    }
    .section-title { 
        font-family: var(--font-primary); 
        color: var(--heading-color); 
        font-size: 28px; 
        border-bottom: none; 
        padding: 12px 30px; 
        display: inline-block; 
        background-color: rgba(var(--card-bg-color-rgb), 0.75); 
        border-radius: 10px;
        box-shadow: 0 3px 7px var(--shadow-color);
    }
    .add-item-btn {
        display: none; margin: 0 auto 25px auto; padding: 10px 20px;
        background-color: var(--primary-color); color: white; border: none;
        border-radius: 6px; cursor: pointer; font-weight: bold; text-align: center;
    }
    .add-item-btn:hover { opacity: 0.85; }
    body.edit-mode .add-item-btn { display: block; width: fit-content; }

    /* === ESTILOS SECCIÓN APPS IA === */
    .apps-ia-section .category-container {
      flex:1 1 100%; min-width:300px; background:var(--column-bg); backdrop-filter:var(--column-backdrop); 
      border:1px solid var(--border-color); border-radius:15px; padding:20px; 
      box-shadow:0 4px 12px var(--shadow-color); height:fit-content; margin-bottom:20px; position:relative;
    }
    .apps-ia-section .category-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; border-bottom:2px solid var(--accent-color); padding-bottom:10px; }
    .apps-ia-section .category-header h3 { color:var(--column-header-color); font-family:var(--font-primary); font-size:24px; font-weight:700; margin:0; flex-grow:1; text-align: center;}
    .apps-ia-section .apps-grid { display:flex; flex-wrap:wrap; justify-content: center; gap:20px; } /* Cambio a flex para mejor centrado */
    .apps-ia-section .app-card {
      background-color:var(--card-bg-color); border-radius:10px; padding:15px; 
      box-shadow:0 2px 8px var(--shadow-color); display:flex; flex-direction:column; 
      gap:10px; transition:transform .2s ease,box-shadow .2s ease; position:relative;
      width: 300px; /* Ancho fijo para las tarjetas para mejor control de centrado */
    }
    .apps-ia-section .app-card:hover { transform:translateY(-5px); box-shadow:0 6px 15px var(--shadow-color); }
    .apps-ia-section .app-card .app-header { display:flex; align-items:center; gap:10px; }
    .apps-ia-section .app-card .app-logo { width:50px; height:50px; object-fit:contain; border-radius:8px; background-color:var(--bg-color); cursor:pointer; } /* cursor pointer para zoom */
     .apps-ia-section .app-card .app-logo.interactive-image-thumbnail:hover { transform:scale(1.2); z-index: 10; transition: transform .2s ease; }

    .apps-ia-section .app-card .app-name { font-family:var(--font-primary); font-size:18px; font-weight:600; color:var(--heading-color); }
    .apps-ia-section .app-card .app-brief-description { font-size:14px; line-height:1.4; color:var(--text-color); flex-grow:1; min-height:40px; }
    .apps-ia-section .app-card .app-tags-pricing { display:flex; justify-content:space-between; align-items:center; font-size:12px; margin-top:10px; }
    .apps-ia-section .app-card .app-tags span, .apps-ia-section .app-card .app-pricing span { background-color:var(--accent-color); color:white; padding:3px 8px; border-radius:12px; opacity:.85; }
    .apps-ia-section .app-card .app-tags { display:flex; flex-wrap:wrap; gap:5px; }
    .apps-ia-section .app-card .app-tags .tag { background-color:var(--primary-color); opacity:.7; }
    .apps-ia-section .app-card .app-actions { display:flex; gap:10px; margin-top:auto; }
    .apps-ia-section .app-card .app-actions button { flex-grow:1; padding:8px 12px; border:none; border-radius:6px; cursor:pointer; font-weight:600; transition:background-color .2s,opacity .2s; color:white; }
    .apps-ia-section .app-card .app-actions .visit-site-btn { background-color:var(--primary-color); }
    .apps-ia-section .app-card .app-actions .more-info-btn { background-color:var(--accent-color); }
    .apps-ia-section .app-card .app-actions button:hover { opacity:.85; }
    .apps-ia-section .app-card .app-actions button:disabled { background-color:#ccc; cursor:not-allowed; opacity:.7; }
    body.dark-theme .apps-ia-section .app-card .app-actions button:disabled { background-color:#555; color:#aaa; }
    .apps-ia-section .app-card .new-badge { position:absolute; top:-5px; right:-5px; background-color:#ff4757; color:white; padding:3px 8px; font-size:10px; font-weight:bold; border-radius:5px; transform:rotate(10deg); z-index:1; }
    .apps-ia-section .app-card .item-edit-buttons { display:none; position:absolute; top:5px; right:5px; background:rgba(var(--card-bg-color-rgb),.9); padding:5px; border-radius:5px; z-index:10; }
    .apps-ia-section .app-card .item-edit-buttons button { background:transparent; border:none; color:var(--text-color); cursor:pointer; font-size:14px; margin:0 2px; }
    .apps-ia-section .app-card .item-edit-buttons button:hover { color:var(--primary-color); }
    .apps-ia-section .app-card .item-order-buttons { display:none; justify-content:center; gap:10px; margin-top:10px; }
    body.edit-mode .apps-ia-section .app-card .item-edit-buttons,
    body.edit-mode .apps-ia-section .app-card .item-order-buttons { display:flex; }
    .apps-ia-section .app-card .item-order-buttons button { background:var(--button-edit-bg); color:var(--text-color); border:1px solid var(--border-color); padding:5px 10px; border-radius:4px; cursor:pointer; font-size:1em; }
    .apps-ia-section .app-card .item-order-buttons button:hover { background:var(--button-edit-hover-bg); }
    .apps-ia-section .app-card .item-order-buttons button:disabled { opacity:.5; cursor:not-allowed; }
    .apps-ia-section .initial-load-message, .apps-ia-section .no-items-message { width:100%; text-align:center; font-size:1.2em; color:var(--placeholder-text-color); margin-top:30px; padding:20px; }
    .apps-ia-section .category-header .category-controls button { background:transparent; border:none; color:var(--text-color); cursor:pointer; font-size:1em; margin-left: 5px; display:none;}
    body.edit-mode .apps-ia-section .category-header .category-controls button { display: inline-block !important; }
    #priceFilteredAppsContainer { display: none; /* Oculto hasta que se filtre por precio */ }


    /* === ESTILOS SECCIÓN CARPETAS (para Prompts) === */
    /* === ESTILOS SECCIÓN CARPETAS (para Prompts) - Actualizado === */
.prompt-folders-section .folders-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center; /* Para centrar items si no llenan la fila */
}

.prompt-folders-section .folder-item {
    background-color: var(--card-bg-color); /* Como app-card */
    border: 1px solid var(--border-color);
    border-radius: 10px; /* Como app-card */
    padding: 15px; /* Como app-card */
    box-shadow: 0 2px 8px var(--shadow-color); /* Como app-card */
    width: 300px; /* Como app-card, para consistencia */
    display: flex;
    flex-direction: column;
    gap: 10px; /* Espacio entre header, descripción, etc. */
    position: relative;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease; /* Como app-card */
    /* min-height: 180px;  Ajusta según necesites o déjalo flexible */
}

.prompt-folders-section .folder-item:hover {
    transform: translateY(-5px); /* Como app-card */
    box-shadow: 0 6px 15px var(--shadow-color); /* Como app-card */
}

.prompt-folders-section .folder-item .folder-header {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    margin-bottom: 5px; /* Pequeño espacio antes de la descripción */
}

.prompt-folders-section .folder-item .folder-icon {
    width: 50px; /* Como app-logo */
    height: 50px; /* Como app-logo */
    object-fit: contain;
    border-radius: 8px; /* Como app-logo */
    background-color: var(--bg-color); /* Opcional, como app-logo */
    /* margin-bottom: 0; ya no es necesario con el header */
}
/* El .interactive-image-thumbnail:hover ya se encarga del zoom del icono */

.prompt-folders-section .folder-item .folder-name {
    font-family: var(--font-primary); /* Como app-name */
    font-size: 18px; /* Como app-name */
    font-weight: 600; /* Como app-name */
    color: var(--heading-color); /* Como app-name */
    text-align: left; 
    flex-grow: 1;
}

.prompt-folders-section .folder-item .folder-description {
    font-size: 14px; /* Como app-brief-description */
    line-height: 1.4; /* Como app-brief-description */
    color: var(--text-color); /* Como app-brief-description */
    flex-grow: 1; /* Para que ocupe el espacio disponible y empuje botones (si estuvieran en flujo) */
    min-height: 40px; /* Para dar algo de cuerpo, similar a app-brief-description */
    text-align: left;
    width: 100%;
    word-wrap: break-word; /* Para descripciones largas */
    margin-bottom: 10px; /* Espacio antes de los botones de edición si estuvieran al final */
}
.prompt-folders-section .folder-item .folder-description em { /* Para "Sin descripción" */
    color: var(--placeholder-text-color);
}


/* Botones de edición y orden para carpetas (ya los tenías, solo verificar posición) */
.prompt-folders-section .folder-item .item-edit-buttons,
.prompt-folders-section .folder-item .item-order-buttons {
    display: none; /* Se muestran con body.edit-mode */
    position: absolute;
    top: 5px; /* Mantenerlos arriba por ahora para simplicidad */
    gap: 5px;
}
.prompt-folders-section .folder-item .item-edit-buttons { right: 5px; }
.prompt-folders-section .folder-item .item-order-buttons { left: 5px; }

body.edit-mode .prompt-folders-section .folder-item .item-edit-buttons,
body.edit-mode .prompt-folders-section .folder-item .item-order-buttons { display: flex; }

.prompt-folders-section .folder-item .item-edit-buttons button,
.prompt-folders-section .folder-item .item-order-buttons button {
    background: var(--button-edit-bg);
    color: var(--text-color);
    border: 1px solid var(--border-color);
    padding: 3px 7px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9em;
}
.prompt-folders-section .folder-item .item-edit-buttons button:hover,
.prompt-folders-section .folder-item .item-order-buttons button:hover {
    background: var(--button-edit-hover-bg);
}

.prompt-folders-section .no-items-message { /* Ya lo tenías */
    text-align:center;
    font-size:1.2em;
    color:var(--placeholder-text-color);
    margin-top:30px;
    padding:20px;
}

    .folder-prompts-menu { /* Popup que muestra los prompts de una carpeta */
        display: none; position: absolute; background-color: var(--card-bg-color);
        border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 4px 12px var(--shadow-color);
        padding: 10px; z-index: 1010; width: 300px; max-height: 350px; overflow-y: auto;
    }
    .folder-prompts-menu ul { list-style: none; padding: 0; margin: 0; }
    .folder-prompts-menu li a { display: block; padding: 8px 5px; color: var(--text-color); text-decoration: none; border-bottom: 1px solid var(--border-color); position:relative; }
    .folder-prompts-menu li a:hover { background-color: var(--bg-color); }
    .folder-prompts-menu li:last-child a { border-bottom: none; }
    
    .prompt-link-description-popup { /* Popup para descripción de prompt al hacer hover en el menú de carpeta */
        display: none; position: absolute; /* Posicionamiento por JS */
        background-color: var(--card-bg-color); padding: 10px; border-radius: 6px;
        border: 1px solid var(--border-color); box-shadow: 0 2px 5px var(--shadow-color);
        width: 280px; z-index: 1012; pointer-events: none; /* Para no interferir */
        font-size: 0.9em; line-height: 1.4;
    }


    /* === ESTILOS SECCIÓN PROMPTS === */
    /* Modo Edición: Vista de lista de títulos */
    .prompts-section .prompts-title-list.edit-mode-title-view {
        display: grid;
        grid-template-columns: repeat(2, 1fr); /* Dos columnas para optimizar espacio */
        gap: 15px;
        margin-bottom: 30px;
    }
    .prompts-section .prompt-title-item { /* Cada item en la lista de títulos */
        background-color: var(--prompt-block-bg); border: 1px solid var(--border-color);
        border-radius: 8px; padding: 10px 15px; display: flex;
        justify-content: space-between; align-items: center;
    }
    .prompts-section .prompt-title-item .prompt-title-text { font-weight: 600; cursor: pointer; flex-grow:1; }
    .prompts-section .prompt-title-item .item-controls { display: flex; gap: 8px; }
    .prompts-section .prompt-title-item .item-controls button {
         background: var(--button-edit-bg); color: var(--text-color); border: 1px solid var(--border-color);
        padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 0.9em;
    }
     .prompts-section .prompt-title-item .item-controls button:hover { background: var(--button-edit-hover-bg); }

    /* Modo Visión: Área para mostrar el prompt activo */
    .prompts-section #activePromptDisplayArea {
        background-color:  var(--card-bg-color);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 25px;
        box-shadow: 0 3px 10px var(--shadow-color);
        margin: 20px auto; /* Centrado */
        max-width: 1300px; /* Ancho máximo del prompt visible */
    }
    .prompts-section #activePromptDisplayArea .prompt-title { font-family: var(--font-primary); font-size: 24px; font-weight: 600; color: var(--heading-color); margin-bottom:15px; text-align: center; }
    .prompts-section #activePromptDisplayArea .prompt-description { margin-bottom: 20px; line-height: 1.6; font-size: 1.05em; }
    .prompts-section #activePromptDisplayArea .prompt-example-images { display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
    .prompts-section #activePromptDisplayArea .prompt-example-images img {
        max-width: 300px; /* Más grandes en la vista activa */
        max-height: 200px; height: auto; border-radius: 8px; cursor: pointer;
        border: 2px solid black;
        transition: transform 0.2s ease;
    }
    .prompts-section #activePromptDisplayArea .prompt-example-images img.interactive-image-thumbnail:hover { transform: scale(1.35); z-index: 10; }
    .prompts-section #activePromptDisplayArea .prompt-text-display {
        background-color: var(--card-bg-color); padding: 20px; border-radius: 8px;
        font-family: 'Courier New', Courier, monospace; white-space: pre-wrap; word-wrap: break-word;
        margin-bottom: 20px; font-size: 1.1em;
    }
    .prompts-section #activePromptDisplayArea .prompt-actions { display: flex; justify-content: center; align-items: center; }
    .prompts-section #activePromptDisplayArea .prompt-actions .copy-prompt-btn {
        padding: 10px 20px; background-color: black; color: white;
        border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.1em;
    }
    .prompts-section #activePromptDisplayArea .prompt-actions .copy-prompt-btn:hover { opacity: 0.85; }
    .prompts-section .no-items-message { text-align:center; font-size:1.2em; color:var(--card-bg-color); margin-top:30px; padding:20px; }
    /* Para modo edición en el formulario de prompt (dentro del modal) */
    .form-modal-content .prompt-block .item-edit-buttons, 
    .form-modal-content .prompt-block .item-order-buttons { display: flex !important; } /* Asegurar visibilidad en form */
    .form-modal-content .delete-prompt-image-btn { 
        position: absolute; top: -5px; right: -5px; background-color: #ff4757; color: white;
        border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px;
        cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 11;
    }
    .form-modal-content .image-preview-container .img-preview-wrapper { position: relative; display: inline-block; margin: 5px;}
    
    
    
    
    
    /* En la sección de estilos CSS, añade esto: */
.prompts-section #promptsListContainer {
    display: none; /* Oculto por defecto */
}

body.edit-mode .prompts-section #promptsListContainer {
    display: grid; /* Visible en modo edición */
}

.prompts-section #activePromptDisplayArea {
    display: none; /* Oculto por defecto */
}

/* Mostrar activePromptDisplayArea solo cuando tenga contenido y NO estemos en modo edición */
body:not(.edit-mode) .prompts-section #activePromptDisplayArea:not(:empty) {
    display: block;
}
    
    
    
    
    
    
    
    


    /* === ESTILOS PARA MODALES Y FORMULARIOS (Base DHI, adaptado) === */
    .form-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); z-index: 10000; justify-content: center; align-items: center; }
    .form-modal-content {
        background-color: var(--card-bg-color); color: var(--text-color);
        border-radius: 12px; padding: 25px; max-width: 750px; width: 90vw;
        box-shadow: 0 5px 20px rgba(0,0,0,0.3); font-family: var(--font-secondary);
        max-height: 90vh; overflow-y: auto;
    }
    .form-modal-content h3 { margin-bottom:20px; text-align:center; font-size:20px; color:var(--heading-color); font-family:var(--font-primary); }
    .form-modal-content .form-group { margin-bottom:15px; }
    .form-modal-content .form-group label { display:block; margin-bottom:6px; font-weight:600; color:var(--text-color); }
    .form-modal-content .form-group input[type="text"],
    .form-modal-content .form-group input[type="url"],
    .form-modal-content .form-group input[type="file"],
    .form-modal-content .form-group textarea,
    .form-modal-content .form-group select { width:100%; padding:10px; border-radius:6px; border:1px solid var(--border-color); background-color:var(--bg-color); color:var(--text-color); font-family:var(--font-secondary); }
    .form-modal-content .form-group textarea { resize:vertical; min-height:80px; }
    .form-modal-content .form-group input[type="file"] { padding:5px; }
    .form-modal-content .form-buttons { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
    .form-modal-content .form-buttons button { padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold; border:none; transition:opacity .2s; }
    .form-modal-content .form-buttons .save-btn { background-color:var(--primary-color); color:white;}
    .form-modal-content .form-buttons .cancel-btn { background-color:#6c757d; color:white; }
    .form-modal-content .form-buttons button:hover { opacity:.85; }

        margin-top:15px; padding:15px; border:1px dashed var(--border-color); border-radius:8px; 
        min-height:100px; max-height:300px; overflow-y:auto; background-color:var(--bg-color); color:var(--text-color);
    }
    .form-modal-content .description-preview img.interactive-image-thumbnail { max-width: 100%; cursor: pointer; } /* Para imágenes en descripciones detalladas */
    .form-modal-content .description-preview img.interactive-image-thumbnail:hover { transform:scale(1.05); } /* Zoom más sutil en descripción */

    .form-modal-content .image-tools { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }

    .form-modal-content .paste-area { width:100%; height:50px; border:2px dashed var(--border-color); border-radius:8px; background-color:var(--bg-color); display:flex; align-items:center; justify-content:center; margin-top:10px; cursor:pointer; font-size:14px; color:#666; }
    body.dark-theme .form-modal-content .paste-area { color:#bbb; }
    .form-modal-content .paste-area:hover { border-color:var(--accent-color); }
    .form-modal-content .resizable-img-container { position:relative; display:inline-block; margin:5px; border:2px dashed transparent; overflow:visible; vertical-align:middle; line-height:0; }
    body.edit-mode .form-modal-content .description-preview .resizable-img-container { border:2px dashed var(--accent-color); max-width:none!important; }
    .form-modal-content .resizable-img-container img { display:block; max-width:100%; margin:0; padding:0; vertical-align:bottom; line-height:0; }

    .global-controls { position:fixed; bottom:20px; display:flex; flex-direction:column; gap:10px; z-index:1000; }

    .global-controls button:hover { opacity:.85; }
    #edit-mode-toggle-btn { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:999; padding:15px 100px; font-size:16px; background-color:transparent; color:white; border:none; border-radius:25px; cursor:pointer; font-weight:bold; box-shadow:0 2px 10px var(--shadow-color); }

    .password-modal-overlay h3 { margin-top:0; margin-bottom:15px; font-size:18px; color:var(--heading-color); }

    .password-modal-overlay .password-modal-buttons { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
    .password-modal-overlay .password-modal-buttons button { padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold; border:none; transition:opacity .2s; color:white; }
    .password-modal-overlay #submitAdminPasswordBtn { background-color:var(--primary-color); }
    .password-modal-overlay #cancelAdminPasswordBtn { background-color:#6c757d; }
    .password-modal-overlay .password-modal-buttons button:hover { opacity:.85; }
    
    #appCategoryOrderModal { display: none; }

    #appCategoryOrderModal .order-buttons button:hover { background:var(--button-edit-hover-bg); }

        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;

  <script>
    document.addEventListener('DOMContentLoaded', function() {
        console.log("DOM completamente cargado. Iniciando App Centro de Comandos IA...");

        let appData = {
            settings: { background: '', theme: 'dark', lastAppPricingFilter: '_all_', lastGlobalSortOrder: 'default' },
            aiAppsCategories: [], 
            prompts: [],
            promptFolders: []
        };

        let isEditable = false;
        let currentPassword = ""; 
        let activePopups = { folderMenu: null, promptDescription: null }; // Para manejar popups
        
        // editModeToggleBtn.addEventListener('click', toggleEditMode); // Se asigna más abajo
        // submitAdminPasswordBtn.addEventListener('click', handlePasswordSubmit); // Se asigna más abajo

        // --- DOM Elements ---
        const globalSearchInput = document.getElementById('globalSearchInput');
        const appPricingFilter = document.getElementById('appPricingFilter');
        const globalSortOrder = document.getElementById('globalSortOrder');
        const themeSwitcherBtn = document.getElementById('themeSwitcherBtn');

        const aiAppsCategoriesContainer = document.getElementById('aiAppsCategoriesContainer');
        const noAppCategoriesMessage = document.getElementById('noAppCategoriesMessage');
        const addAppCategoryBtn = document.getElementById('addAppCategoryBtn');
        
        const promptFoldersGridContainer = document.getElementById('promptFoldersGridContainer');
        const noPromptFoldersMessage = document.getElementById('noPromptFoldersMessage');
        const addPromptFolderBtn = document.getElementById('addPromptFolderBtn');

        const promptsListContainer = document.getElementById('promptsListContainer'); // Para lista de títulos en edit mode
        const activePromptDisplayArea = document.getElementById('activePromptDisplayArea'); // Para prompt activo en vision mode
        const noPromptsMessage = document.getElementById('noPromptsMessage');
        const addPromptBtn = document.getElementById('addPromptBtn');
        
        const hiddenBgInput = document.getElementById('hiddenBgInput');
        const changeBgBtn = document.getElementById('changeBgBtn');
        const orderAppCategoriesBtn = document.getElementById('orderAppCategoriesBtn');
        const editModeToggleBtn = document.getElementById('edit-mode-toggle-btn');

        const adminPasswordModal = document.getElementById('adminPasswordModal');
        const adminPasswordInput = document.getElementById('adminPasswordInput');
        const submitAdminPasswordBtn = document.getElementById('submitAdminPasswordBtn');
        const cancelAdminPasswordBtn = document.getElementById('cancelAdminPasswordBtn');

        const appCategoryOrderModal = document.getElementById('appCategoryOrderModal');
        const appCategoryOrderList = document.getElementById('appCategoryOrderList');
        const closeAppCategoryOrderModalBtn = document.getElementById('closeAppCategoryOrderModalBtn');
        
        const formModal = document.getElementById('formModal');
        const genericFormContainer = document.getElementById('genericFormContainer');

        const fullscreenImageViewer = document.getElementById('fullscreenImageViewer');
        const fullscreenImage = fullscreenImageViewer.querySelector('img');
        const closeFullscreenBtn = fullscreenImageViewer.querySelector('.close-fullscreen-btn');

        // Variable temporal para almacenar archivos de imagen de prompt antes de guardarlos
        let tempPromptImageFiles = []; // Array de {file: File, previewUrl: string, id: tempId}
        let currentEditingPromptImages = []; // Array de URLs de imágenes existentes al abrir el form de prompt
        
        function closeFormModal() { // Esta función es utilizada por varios formularios
            if (formModal) formModal.style.display = 'none';
            if (genericFormContainer) genericFormContainer.innerHTML = ''; // Limpiar contenido
        }

        // --- INITIALIZATION ---
        async function loadInitialData() {
            showLoadingMessage("Cargando datos...");
            try {
                const response = await fetch('load_state.php?t=' + Date.now());
                if (!response.ok) throw new Error(`Error al cargar: ${response.status}`);
                const loadedData = await response.json();

                if (loadedData && !loadedData.error) {
                    appData.settings = { ...appData.settings, ...(loadedData.settings || {}) };
                    appData.aiAppsCategories = normalizeAppCategoriesData(loadedData.aiAppsCategories || []);
                    appData.prompts = normalizePromptsData(loadedData.prompts || []);
                    appData.promptFolders = normalizePromptFoldersData(loadedData.promptFolders || []);
                } else {
                     console.warn("No se cargaron datos o formato incorrecto. Usando defaults.");
                    initializeDefaultData();
                }
            } catch (error) {
                console.error('Error crítico en loadInitialData:', error);
                showPersistentMessage(`Error crítico: ${error.message}. Usando defaults.`, "error");
                initializeDefaultData();
            }
            applyInitialSettings();
            updateEditModeUI(); // Llama a renderAll internamente
            clearLoadingMessage();
        }
        
        function initializeDefaultData() {
            appData.settings = { background: '', theme: 'dark', lastAppPricingFilter: '_all_', lastGlobalSortOrder: 'default' };
            appData.aiAppsCategories = [];
            appData.prompts = [];
            appData.promptFolders = [];
        }

        function normalizeAppCategoriesData(categories) { /* ... (como antes) ... */ 
             return categories.map(cat => ({
                id: cat.id || `catApp_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                title: cat.title || "Categoría Sin Título",
                apps: (cat.apps || []).map(app => ({
                    id: app.id || `app_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                    name: app.name || "App Sin Nombre",
                    websiteUrl: app.websiteUrl || "",
                    logoUrl: app.logoUrl || "", 
                    briefDescription: app.briefDescription || "",
                    detailedDescription: app.detailedDescription || "", 
                    tags: Array.isArray(app.tags) ? app.tags : (typeof app.tags === 'string' ? app.tags.split(',').map(t => t.trim()).filter(Boolean) : []),
                    pricingModel: app.pricingModel || "Gratis",
                    tutorialUrl: app.tutorialUrl || "",
                    isPrivate: !!app.isPrivate,
                    timestampAdded: app.timestampAdded || Date.now(),
                    timestampUpdated: app.timestampUpdated || Date.now(),
                }))
            }));
        }
        function normalizePromptsData(prompts) { /* ... (como antes) ... */
             return prompts.map(p => ({
                id: p.id || `prompt_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                title: p.title || "Prompt Sin Título",
                descriptionHTML: p.descriptionHTML || "",
                exampleImageUrls: Array.isArray(p.exampleImageUrls) ? p.exampleImageUrls.filter(url => typeof url === 'string') : [],
                promptText: p.promptText || "",
                folderId: p.folderId || null,
                timestampAdded: p.timestampAdded || Date.now(),
                timestampUpdated: p.timestampUpdated || Date.now(),
            }));
        }
        function normalizePromptFoldersData(folders) { /* ... (como antes) ... */
             return folders.map(f => ({
                id: f.id || `folder_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                name: f.name || "Carpeta Sin Nombre",
                iconUrl: f.iconUrl || "", 
                description: f.description || "",
                timestampAdded: f.timestampAdded || Date.now(),
                timestampUpdated: f.timestampUpdated || Date.now(),
            }));
        }

        function showLoadingMessage(message) { /* ... (como antes) ... */
            let loadingDiv = document.getElementById('loadingOverlay');
            if (!loadingDiv) {
                loadingDiv = document.createElement('div');
                loadingDiv.id = 'loadingOverlay';
                Object.assign(loadingDiv.style, { position: 'fixed', top: '0', left: '0', width: '100%', height: '100%', backgroundColor: 'rgba(0,0,0,0.7)', color: 'white', display: 'flex', justifyContent: 'center', alignItems: 'center', zIndex: '20000', fontSize: '2em', textAlign: 'center' });
                document.body.appendChild(loadingDiv);
            }
            loadingDiv.textContent = message;
            loadingDiv.style.display = 'flex';
        }
        function clearLoadingMessage() { /* ... (como antes) ... */
            const loadingDiv = document.getElementById('loadingOverlay');
            if (loadingDiv) loadingDiv.style.display = 'none';
        }
        function showPersistentMessage(message, type = "info") { /* ... (como antes) ... */
             if (type === "error") alert(`Error: ${message}`);
             else if (type === "success") alert(`Éxito: ${message}`);
             console.log(`${type.toUpperCase()}: ${message}`);
        }

        // --- SAVING ---
        async function saveDataToBackend() {
            if (!isEditable) return false;
            showLoadingMessage("Guardando cambios...");
            
            const formData = new FormData();
            formData.append('password', currentPassword); // Importante para la validación en el backend

            const mainData = {
        settings: appData.settings,
        aiAppsCategories: appData.aiAppsCategories.map(category => ({
            ...category,
            apps: category.apps.map(app => ({
                ...app,
                // Si logoUrl es un File object, envía null en jsonData (se enviará por FormData)
                // Si es una string (URL existente), envíala.
                logoUrl: (app.logoUrl instanceof File) ? null : app.logoUrl 
            }))
        })),
        prompts: appData.prompts.map(p => ({
            ...p,
            // Para exampleImageUrls, enviar solo URLs string que ya existen y se quieren conservar.
            // Los File objects (nuevas imágenes) se envían por separado en FormData.
            exampleImageUrls: (p.exampleImageUrls || [])
                                .map((item, index) => ({ item, originalIndex: index })) // Conservar índice para ordenar
                                .filter(entry => typeof entry.item === 'string') // Solo URLs string (imágenes ya guardadas)
                                .sort((a, b) => a.originalIndex - b.originalIndex) // Intentar mantener orden de URLs existentes
                                .map(entry => entry.item) // Extraer solo la URL
                                .slice(0, 3) // Asegurar que no enviamos más de 3 pre-existentes
        })),
        promptFolders: appData.promptFolders.map(f => ({
            ...f,
            // Si iconUrl es un File object, envía null en jsonData
            iconUrl: (f.iconUrl instanceof File) ? null : f.iconUrl 
        }))
    };
    formData.append('jsonData', JSON.stringify(mainData));

    // Adjuntar archivos (File objects) al FormData
    // Imágenes de Prompts
    appData.prompts.forEach(prompt => {
        (prompt.exampleImageUrls || []).forEach((item, index) => { // 'index' aquí es el originalPlaceholderIndex
            if (item instanceof File) {
                formData.append(`prompt_image_${prompt.id}_${index}`, item, item.name);
            }
        });
    });

    // Iconos de Carpetas
    appData.promptFolders.forEach(folder => {
        if (folder.iconUrl instanceof File) {
            formData.append(`folder_icon_${folder.id}`, folder.iconUrl, folder.iconUrl.name);
        }
    });

    // Logos de Apps
    appData.aiAppsCategories.forEach(category => {
        category.apps.forEach(app => {
            if (app.logoUrl instanceof File) {
                formData.append(`app_logo_${app.id}`, app.logoUrl, app.logoUrl.name);
            }
        });
    });
            
            try {
                const response = await fetch('guardar_cambios.php', { method: 'POST', body: formData });
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Error del servidor: ${response.status}. ${errorText}`);
                }
                const result = await response.json();
                if (result.success) {
                    console.log('Datos guardados.', result);
                    if (result.filePaths) {
                        (result.filePaths.prompts || []).forEach(fp => {
                            const prompt = appData.prompts.find(p => p.id === fp.promptId);
                            if (prompt) {
                                // El backend debería devolver el índice original o una forma de mapear
                                // el archivo subido al placeholder correcto en exampleImageUrls.
                                // Aquí se asume que el backend puede devolver el nuevo path y el índice original.
                                const placeholderIndex = fp.originalPlaceholderIndex; // Necesitas que el backend devuelva esto.
                                if (typeof placeholderIndex !== 'undefined' && prompt.exampleImageUrls[placeholderIndex] instanceof File) {
                                     prompt.exampleImageUrls[placeholderIndex] = fp.newPath;
                                } else { // Fallback o lógica más robusta si el índice no es fiable
                                    // Buscar el File object por nombre (menos fiable si hay nombres duplicados)
                                    const fileIdx = prompt.exampleImageUrls.findIndex(item => item instanceof File && item.name === fp.originalName);
                                    if (fileIdx !== -1) {
                                        prompt.exampleImageUrls[fileIdx] = fp.newPath;
                                    } else {
                                        // Si no se puede mapear, al menos intentar añadirlo si hay espacio
                                        if (!Array.isArray(prompt.exampleImageUrls)) prompt.exampleImageUrls = [];
                                        if (prompt.exampleImageUrls.filter(item => typeof item === 'string').length < 3) {
                                             // Solo añadir si no hemos alcanzado el límite de URLs
                                             prompt.exampleImageUrls.push(fp.newPath);
                                             // Limpiar File objects que ya no están (si es necesario)
                                             prompt.exampleImageUrls = prompt.exampleImageUrls.filter(item => typeof item === 'string' || item.name !== fp.originalName);
                                        }
                                    }
                                }
                            }
                        });
                        (result.filePaths.folders || []).forEach(fp => {
                            const folder = appData.promptFolders.find(f => f.id === fp.folderId);
                            if (folder && folder.iconUrl instanceof File && folder.iconUrl.name === fp.originalName) {
                                folder.iconUrl = fp.newPath;
                            }
                        });
                    }
                    showPersistentMessage("Cambios guardados.", "success");
                    return true;
                } else { throw new Error(result.error || 'Error desconocido al guardar.'); }
            } catch (error) {
                console.error('Error en saveDataToBackend:', error);
                showPersistentMessage(`Error guardando: ${error.message}`, "error");
                return false;
            } finally { clearLoadingMessage(); }
        }

        function deleteAppCategory(categoryId) { /* ... (como antes, llama a renderFilteredApps) ... */
            if (!isEditable) return;
            const category = appData.aiAppsCategories.find(c => c.id === categoryId);
            if (!category) return;
            if (confirm(`¿Eliminar la categoría "${category.title}" y todas sus apps?`)) {
                appData.aiAppsCategories = appData.aiAppsCategories.filter(c => c.id !== categoryId);
                saveDataToBackend().then(renderFilteredApps);
            }
        }
        function moveApp(appId, categoryId, direction) { /* ... (como antes, llama a renderFilteredApps) ... */
            const category = appData.aiAppsCategories.find(c => c.id === categoryId);
            if (!category) return;
            const appIndex = category.apps.findIndex(a => a.id === appId);
            if (appIndex === -1) return;
            const newIndex = appIndex + direction;
            if (newIndex < 0 || newIndex >= category.apps.length) return;
            const [movedApp] = category.apps.splice(appIndex, 1);
            category.apps.splice(newIndex, 0, movedApp);
            saveDataToBackend().then(renderFilteredApps);
        }
        function deleteApp(appId, categoryId) { /* ... (como antes, llama a renderFilteredApps) ... */
             if (!isEditable) return;
            const category = appData.aiAppsCategories.find(c => c.id === categoryId);
            if (!category || !category.apps) return;
            const app = category.apps.find(a => a.id === appId);
            if (!app) return;
            if (confirm(`¿Eliminar la app "${app.name}"?`)) {
                category.apps = category.apps.filter(a => a.id !== appId);
                saveDataToBackend().then(renderFilteredApps);
            }

        function handleFolderClick(folderId, folderElement) { // CORREGIDO: Eliminada función anidada
            closeActivePopups();
            const folder = appData.promptFolders.find(f => f.id === folderId);
            if (!folder) return;

            const promptsInFolder = appData.prompts.filter(p => p.folderId === folderId);

            if (promptsInFolder.length === 0 && !isEditable) {
                showPersistentMessage(`La carpeta "${folder.name}" está vacía.`, "info");
                return;
            }

            const menu = document.createElement('div');
            menu.className = 'folder-prompts-menu';
            const ul = document.createElement('ul');

            if (promptsInFolder.length === 0 && isEditable) {
                ul.innerHTML = '<li><em style="color: var(--placeholder-text-color);">Esta carpeta está vacía. Puedes añadir prompts desde la sección de Prompts.</em></li>';
            } else {
                promptsInFolder.forEach(promptItem => { // Usar promptItem para evitar conflicto con variable 'prompt' externa si existiera
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = `#prompt_${promptItem.id}`;
                    a.textContent = promptItem.title;
                    a.dataset.promptId = promptItem.id;

                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        closeActivePopups();
                        renderActivePrompt(promptItem.id); // Usar promptItem.id

                        setTimeout(() => {
                            const targetPromptElement = document.getElementById('activePromptDisplayArea');
                            if (targetPromptElement) {
                                targetPromptElement.scrollIntoView({
                                    behavior: 'smooth',
                                    block: 'center'
                                });
                            }
                        }, 100);
                    });

                    if (promptItem.descriptionHTML) {
                        a.addEventListener('mouseenter', (e) => showPromptLinkDescription(e, promptItem.descriptionHTML, a));
                        a.addEventListener('mouseleave', hidePromptLinkDescription);
                    }
                    li.appendChild(a);
                    ul.appendChild(li);
                });
            }
            menu.appendChild(ul);
            document.body.appendChild(menu);
            activePopups.folderMenu = menu;

            const folderRect = folderElement.getBoundingClientRect();
            const menuHeight = menu.offsetHeight;
            const menuWidth = menu.offsetWidth;
            let top = folderRect.bottom + 5 + window.scrollY;
            let left = folderRect.left + window.scrollX;
            if (top + menuHeight > window.innerHeight + window.scrollY) top = folderRect.top - menuHeight - 5 + window.scrollY;
            if (left + menuWidth > window.innerWidth + window.scrollX) left = window.innerWidth - menuWidth - 5 + window.scrollX;
            if (left < 0) left = 5;

            menu.style.left = `${left}px`;
            menu.style.top = `${top}px`;
            menu.style.display = 'block';

            setTimeout(() => { 
                document.addEventListener('click', function closeMenuHandlerOuter(e) {
                    if (activePopups.folderMenu && !activePopups.folderMenu.contains(e.target) && e.target !== folderElement && !folderElement.contains(e.target)) {
                        closeActivePopups();
                        document.removeEventListener('click', closeMenuHandlerOuter);
                    }
                }, { capture: true, once: true });
            },0);
        }
        
        function showPromptLinkDescription(event, descriptionHTML, anchorElement) {
            hidePromptLinkDescription(); 
            const descPopup = document.createElement('div');
            descPopup.className = 'prompt-link-description-popup';
            const tempDiv = document.createElement('div'); tempDiv.innerHTML = descriptionHTML; 
            descPopup.textContent = tempDiv.textContent.substring(0, 200) + (tempDiv.textContent.length > 200 ? '...' : '');
            
            document.body.appendChild(descPopup);
            activePopups.promptDescription = descPopup;

            const anchorRect = anchorElement.getBoundingClientRect();
            const descPopupHeight = descPopup.offsetHeight;
            const descPopupWidth = descPopup.offsetWidth;

            let top = anchorRect.top + window.scrollY;
            let left = anchorRect.right + 5 + window.scrollX;

            if (left + descPopupWidth > window.innerWidth + window.scrollX) left = anchorRect.left - descPopupWidth - 5 + window.scrollX;
            if (top + descPopupHeight > window.innerHeight + window.scrollY) top = window.innerHeight + window.scrollY - descPopupHeight - 5;
            if (top < window.scrollY) top = window.scrollY + 5;


            descPopup.style.left = `${left}px`;
            descPopup.style.top = `${top}px`;
            descPopup.style.display = 'block';
        }

        function handlePromptFormImageSelection(event) {
            const files = Array.from(event.target.files);
            files.forEach(file => {
                if ((currentEditingPromptImages.length + tempPromptImageFiles.length) < 3) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        tempPromptImageFiles.push({ file: file, previewUrl: e.target.result, id: `temp_${Date.now()}_${Math.random()}` });
                        renderPromptFormImagePreviews();
                    };
                    reader.readAsDataURL(file);
                } else {
                    alert("Solo puedes tener hasta 3 imágenes en total.");
                }
            });
            event.target.value = ""; 
        }

        function renderPromptFormImagePreviews() {
            const container = document.getElementById('promptImagePreviewContainer');
            if (!container) return;
            container.innerHTML = '';

            currentEditingPromptImages.forEach((url, index) => {
                const prevWrapper = document.createElement('div');
                prevWrapper.className = 'img-preview-wrapper';
                prevWrapper.innerHTML = `<img src="${url}" alt="Imagen existente ${index + 1}">
                                         <button class="delete-prompt-image-btn" data-type="existing" data-index="${index}" title="Eliminar esta imagen existente">×</button>`;
                container.appendChild(prevWrapper);
            });

            tempPromptImageFiles.forEach((item, index) => {
                const prevWrapper = document.createElement('div');
                prevWrapper.className = 'img-preview-wrapper';
                prevWrapper.innerHTML = `<img src="${item.previewUrl}" alt="Nueva imagen ${index + 1}">
                                         <button class="delete-prompt-image-btn" data-type="temp" data-id="${item.id}" title="Eliminar esta nueva imagen">×</button>`;
                container.appendChild(prevWrapper);
            });
            
            container.querySelectorAll('.delete-prompt-image-btn').forEach(btn => {
                btn.onclick = (e) => {
                    const type = e.currentTarget.dataset.type;
                    if (type === 'existing') {
                        const index = parseInt(e.currentTarget.dataset.index);
                        currentEditingPromptImages.splice(index, 1);
                    } else if (type === 'temp') {
                        const id = e.currentTarget.dataset.id;
                        tempPromptImageFiles = tempPromptImageFiles.filter(f => f.id !== id);
                    }
                    renderPromptFormImagePreviews(); 
                };
            });
        }
        
        function savePromptHandler() { /* ... (usar currentEditingPromptImages y tempPromptImageFiles para construir exampleImageUrls) ... */
            const editingPromptId = document.getElementById('editingPromptId').value;
            let existingPrompt = editingPromptId ? appData.prompts.find(p => p.id === editingPromptId) : null;
            
            let finalImageItems = [...currentEditingPromptImages]; 
            tempPromptImageFiles.forEach(item => {
                if (finalImageItems.length < 3) finalImageItems.push(item.file); 
            });

            const selectedFolderId = document.getElementById('promptFolderSelect').value;

            const promptDataObj = {
                id: editingPromptId || `prompt_${Date.now()}_${Math.random().toString(36).substr(2,9)}`,
                title: document.getElementById('promptTitleInput').value.trim(),
                descriptionHTML: document.getElementById('promptDescriptionHTMLInput').value.trim(),
                exampleImageUrls: finalImageItems, 
                promptText: document.getElementById('promptTextInput').value.trim(),
                folderId: selectedFolderId || null,
                timestampUpdated: Date.now(),
                timestampAdded: editingPromptId ? (existingPrompt?.timestampAdded || Date.now()) : Date.now()
            };
            if (!promptDataObj.title || !promptDataObj.promptText) { alert("Título y Texto del Prompt son obligatorios."); return; }

            if (editingPromptId) {
                const promptIndex = appData.prompts.findIndex(p => p.id === editingPromptId);
                if (promptIndex > -1) appData.prompts[promptIndex] = promptDataObj;
            } else { appData.prompts.push(promptDataObj); }
            
            saveDataToBackend().then(success => { if(success) { closeFormModal(); renderPrompts(); renderPromptFolders(); /* Re-render carpetas por si el prompt cambia de carpeta */ }});
        }
        
        function deletePrompt(promptId) { /* ... (llama a renderPrompts) ... */
            if (!isEditable) return;
            const prompt = appData.prompts.find(p => p.id === promptId);
            if (!prompt) return;
            if (confirm(`Eliminar prompt "${prompt.title}"?`)) {
                appData.prompts = appData.prompts.filter(p => p.id !== promptId);
                // No es necesario modificar folder.promptIds si folderId está en el prompt
                saveDataToBackend().then(() => { renderPrompts(); renderPromptFolders(); }); // Re-render carpetas por si cambia contenido
            }
        }
        function movePrompt(promptId, direction) { /* ... (llama a renderPrompts) ... */
            const index = appData.prompts.findIndex(p => p.id === promptId);
            if (index === -1) return;
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= appData.prompts.length) return;
            const [movedPrompt] = appData.prompts.splice(index, 1);
            appData.prompts.splice(newIndex, 0, movedPrompt);
            saveDataToBackend().then(renderPrompts);
        }
        function openPromptFolderForm(folderId = null) { /* ... (adaptar para preview de icono si es File) ... */
            if (!isEditable) return;
            const folderToEdit = folderId ? appData.promptFolders.find(f => f.id === folderId) : null;
            const formTitle = folderToEdit ? `Editar Carpeta: ${folderToEdit.name}` : "Añadir Carpeta";
            
            genericFormContainer.innerHTML = `
                <h3>${formTitle}</h3> <input type="hidden" id="editingFolderId" value="${folderId || ''}">
                <div class="form-group"><label for="folderNameInput">Nombre:</label><input type="text" id="folderNameInput" value="${folderToEdit?.name || ''}"></div>
                <div class="form-group"><label for="folderIconFileInput">Icono (URL o subir):</label>
                    <input type="url" id="folderIconUrlInput" value="${(folderToEdit?.iconUrl && typeof folderToEdit.iconUrl === 'string') ? folderToEdit.iconUrl : ''}" placeholder="http://..." style="margin-bottom:5px;">
                    <input type="file" id="folderIconFileInput" accept="image/*" style="margin-bottom:5px;">
                    <div id="folderIconPreviewContainer" class="image-preview-container" style="min-height:30px; justify-content:start; align-items:center;">
                        ${(folderToEdit?.iconUrl && typeof folderToEdit.iconUrl === 'string') ? `<div class="img-preview-wrapper" style="border:1px solid var(--border-color); padding:5px; display:inline-block;"><img src="${folderToEdit.iconUrl}" alt="Icono" style="max-width:50px; max-height:50px; vertical-align:middle;"><button type="button" class="delete-prompt-image-btn" id="deleteExistingFolderIconBtn" title="Eliminar icono" style="position:relative; top:auto; right:auto; margin-left:5px;">×</button></div>` : ''}
                    </div>
                </div>
                <div class="form-group"><label for="folderDescriptionInput">Descripción:</label><textarea id="folderDescriptionInput" rows="3">${folderToEdit?.description || ''}</textarea></div>
                <div class="form-buttons"><button id="saveFolderBtn" class="save-btn">Guardar</button><button id="cancelFormBtn" type="button" class="cancel-btn">Cancelar</button></div>`;

            const iconUrlInput = document.getElementById('folderIconUrlInput');
            const iconFileInput = document.getElementById('folderIconFileInput');
            const iconPreviewContainer = document.getElementById('folderIconPreviewContainer');
            let iconToDelete = false; // Flag para saber si el icono existente debe borrarse

            function updateIconPreview(src = null) {
                iconPreviewContainer.innerHTML = '';
                if (src) {
                     iconPreviewContainer.innerHTML = `<div class="img-preview-wrapper" style="border:1px solid var(--border-color); padding:5px; display:inline-block;"><img src="${src}" alt="Icono" style="max-width:50px; max-height:50px; vertical-align:middle;"><button type="button" class="delete-prompt-image-btn" id="deleteNewFolderIconBtn" title="Quitar nuevo icono" style="position:relative; top:auto; right:auto; margin-left:5px;">×</button></div>`;
                     iconPreviewContainer.querySelector('#deleteNewFolderIconBtn').onclick = () => {
                        iconFileInput.value = ''; iconUrlInput.value = ''; updateIconPreview();
                     };
                }
            }
            
            iconFileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    iconUrlInput.value = ''; // Limpiar URL si se sube archivo
                    iconToDelete = false;
                    const reader = new FileReader();
                    reader.onload = (ev) => updateIconPreview(ev.target.result);
                    reader.readAsDataURL(file);
                } else { updateIconPreview(); }
            };

            iconUrlInput.onchange = () => {
                const url = iconUrlInput.value.trim();
                if (url) {
                    iconFileInput.value = ''; // Limpiar file si se pone URL
                    iconToDelete = false;
                    updateIconPreview(url);
                } else { updateIconPreview(); }
            };

            const deleteExistingBtn = document.getElementById('deleteExistingFolderIconBtn');
            if(deleteExistingBtn) {
                deleteExistingBtn.onclick = () => {
                    if (confirm("¿Eliminar el icono actual?")) {
                        iconUrlInput.value = ''; iconFileInput.value = ''; iconToDelete = true;
                        updateIconPreview();
                        iconPreviewContainer.innerHTML = '<p style="font-size:0.9em; color:grey;">Icono actual marcado para eliminar.</p>';
                    }
                };
            }

            document.getElementById('saveFolderBtn').onclick = () => savePromptFolderHandler(iconToDelete);
            document.getElementById('cancelFormBtn').onclick = closeFormModal;
            formModal.style.display = 'flex';
        }
        
        function savePromptFolderHandler(iconMarkedForDelete = false) { 
            const editingFolderId = document.getElementById('editingFolderId').value;
            const iconFile = document.getElementById('folderIconFileInput').files[0];
            const iconUrl = document.getElementById('folderIconUrlInput').value.trim();
            let existingFolder = editingFolderId ? appData.promptFolders.find(f => f.id === editingFolderId) : null;
            
            let finalIconValue = "";
            if (iconFile) { // Nuevo archivo tiene prioridad
                finalIconValue = iconFile;
            } else if (iconUrl) { // Luego URL si existe
                finalIconValue = iconUrl;
            } else if (existingFolder && !iconMarkedForDelete) { // Conservar existente si no se borró
                finalIconValue = existingFolder.iconUrl;
            } // Si iconMarkedForDelete es true, finalIconValue queda "" (se borra)

            const folderDataObj = {
                id: editingFolderId || `folder_${Date.now()}_${Math.random().toString(36).substr(2,9)}`,
                name: document.getElementById('folderNameInput').value.trim(),
                iconUrl: finalIconValue, 
                description: document.getElementById('folderDescriptionInput').value.trim(),
                timestampUpdated: Date.now(),
                timestampAdded: editingFolderId ? (existingFolder?.timestampAdded || Date.now()) : Date.now()
            };
            if (!folderDataObj.name) { alert("Nombre de carpeta requerido."); return; }

            if (editingFolderId) {
                const idx = appData.promptFolders.findIndex(f => f.id === editingFolderId);
                if (idx > -1) appData.promptFolders[idx] = folderDataObj;
            } else { appData.promptFolders.push(folderDataObj); }
            saveDataToBackend().then(success => { if(success) { closeFormModal(); renderPromptFolders(); }});
        }
        function deletePromptFolder(folderId) { /* ... (llama a renderPromptFolders y renderPrompts) ... */
            if (!isEditable) return;
            const folder = appData.promptFolders.find(f => f.id === folderId);
            if (!folder) return;
            if (confirm(`Eliminar carpeta "${folder.name}"? Los prompts asignados se desvincularán.`)) {
                appData.promptFolders = appData.promptFolders.filter(f => f.id !== folderId);
                appData.prompts.forEach(p => { if (p.folderId === folderId) p.folderId = null; });
                saveDataToBackend().then(() => { renderPromptFolders(); renderPrompts(); });
            }
        }
        function movePromptFolder(folderId, direction) { /* ... (llama a renderPromptFolders) ... */
            const index = appData.promptFolders.findIndex(f => f.id === folderId);
            if (index === -1) return;
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= appData.promptFolders.length) return;
            const [movedFolder] = appData.promptFolders.splice(index, 1);
            appData.promptFolders.splice(newIndex, 0, movedFolder);
            saveDataToBackend().then(renderPromptFolders);
        }
        // assignPromptToFolder no es necesaria si se gestiona desde el form de Prompt.
        // function assignPromptToFolder(promptId) { ... }

        // --- FILTRADO Y ORDENACIÓN ---
        function sortItems(items, itemType, sortValue) {
            items.sort((a, b) => {
                let valA, valB;
                const nameField = (itemType === 'aiAppsCategories' || itemType === 'prompts') ? 'title' : 'name';
                switch (sortValue) {
                    case 'newest': return (b.timestampUpdated || b.timestampAdded || 0) - (a.timestampUpdated || a.timestampAdded || 0);
                    case 'oldest': return (a.timestampUpdated || a.timestampAdded || 0) - (b.timestampUpdated || b.timestampAdded || 0);
                    case 'nameAsc':
                        valA = (a[nameField] || '').toLowerCase(); valB = (b[nameField] || '').toLowerCase();
                        return valA.localeCompare(valB);
                    case 'nameDesc':
                        valA = (a[nameField] || '').toLowerCase(); valB = (b[nameField] || '').toLowerCase();
                        return valB.localeCompare(valA);
                    default: 
                        return 0; 
                }
            });
            return items; 
        }
        
        function applyFiltersAndSort() {
            appData.settings.lastAppPricingFilter = appPricingFilter.value;
            appData.settings.lastGlobalSortOrder = globalSortOrder.value;
            renderAll();
        }
        
        // --- MODO EDICIÓN UI ---
        window.checkPassword = async (password) => { 
            const formData = new FormData(); formData.append('password', password);
            try {
                const r = await fetch('validar_password.php', { method: 'POST', body: formData });
                if (!r.ok) { console.error("Server err pass val:", r.status); const errTxt = await r.text(); console.error("Server err detail:", errTxt); alert(`Error del servidor (${r.status}). Revisa la consola.`); return false; }
                const ct = r.headers.get("content-type");
                if (ct && ct.includes("application/json")) { const res = await r.json(); return res && typeof res.success === 'boolean' ? res.success : (console.error("Respuesta JSON inesperada:", res), alert("Respuesta JSON inesperada. Validación fallida."), false); }
                else { const errTxt = await r.text(); console.error("Respuesta no JSON:", errTxt); alert("Respuesta inesperada del servidor. Revisa la consola y el script PHP."); return false; }
            } catch (e) { console.error("Error de red/parse en validación de contraseña:", e); alert("Error de red/parse. Revisa la conexión y el script PHP."); return false; }
        };
        function toggleEditMode() {
            if (isEditable) {
                saveDataToBackend().then(success => {
                    isEditable = false;
                    currentPassword = "";
                    updateEditModeUI();
                    
                    if (success) {
                        alert("Modo edición desactivado. Cambios guardados.");
                    } else {
                        alert("Modo edición desactivado. Hubo problemas al guardar los cambios.");
                    }
                });
            } else {
                adminPasswordModal.style.display = 'flex';
                adminPasswordInput.value = '';
                adminPasswordInput.focus();
            }
        }
        async function handlePasswordSubmit() { // CORREGIDO: usa checkPassword
            const pass = adminPasswordInput.value;
            if (!pass) {
                alert("Introduce contraseña.");
                return;
            }
            
            showLoadingMessage("Verificando contraseña...");
            try {
                const isValid = await window.checkPassword(pass);
                clearLoadingMessage();

                if (isValid) {
                    isEditable = true;
                    currentPassword = pass; // Guardar para uso en saveDataToBackend
                    adminPasswordModal.style.display = 'none';
                    alert("Modo edición activado.");
                    updateEditModeUI();
                } else {
                    alert('Contraseña incorrecta.');
                    adminPasswordInput.value = '';
                    adminPasswordInput.focus();
                }
            } catch (error) {
                clearLoadingMessage();
                alert("Error al verificar la contraseña. Inténtalo de nuevo.");
                console.error("Error en handlePasswordSubmit:", error);
            }
        }
        function updateEditModeUI() { /* ... (como antes, pero llama a renderAll al final) ... */
            document.body.classList.toggle('edit-mode', isEditable);
            editModeToggleBtn.textContent = isEditable ? 'Guardar y Salir Modo Edición' : ''; // Antes ponía Activar Modo Edición en medio de esas dos comillas del final //
            editModeToggleBtn.classList.toggle('active', isEditable);
            [addAppCategoryBtn, addPromptBtn, addPromptFolderBtn, changeBgBtn, orderAppCategoriesBtn].forEach(btn => { if (btn) btn.style.display = isEditable ? 'block' : 'none'; });
            
            // Si salimos del modo edición, limpiar el prompt activo si no hay nada que mostrar
            if (!isEditable && activePromptDisplayArea.innerHTML.trim() === '') {
                noPromptsMessage.style.display = 'block';
                noPromptsMessage.textContent = "Selecciona un prompt desde una carpeta para verlo aquí.";
            } else if (!isEditable && activePromptDisplayArea.innerHTML.trim() !== '') {
                noPromptsMessage.style.display = 'none';
            }
            
            renderAll(); // Re-renderizar todo
        }

        // --- TEMA Y FONDO ---
        function applyInitialSettings() { /* ... (como antes) ... */
            if (appData.settings.theme === 'light') { document.body.classList.remove('dark-theme'); themeSwitcherBtn.textContent = 'Tema Oscuro'; }
            else { document.body.classList.add('dark-theme'); themeSwitcherBtn.textContent = 'Tema Claro'; appData.settings.theme = 'dark';} // Asegurar que 'dark' es el default si no hay setting
            if (appData.settings.background) document.body.style.backgroundImage = appData.settings.background;
        }
        function toggleTheme() { /* ... (como antes, pero guarda settings con saveDataToBackend) ... */
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            appData.settings.theme = isDark ? 'dark' : 'light';
            themeSwitcherBtn.textContent = isDark ? 'Tema Claro' : 'Tema Oscuro';
            if (isEditable) saveDataToBackend(); // Guardar solo si estamos en modo edición
            else { // Si no estamos en modo edición, solo guardar la preferencia de tema localmente o hacer un guardado especial solo para settings
                localStorage.setItem('centroComandosAI_theme', appData.settings.theme); // Opcional: guardar en localStorage para persistencia sin modo edición
            }
        }
        function handleBackgroundChange(event) { /* ... (como antes, llama a saveDataToBackend) ... */
            if (!isEditable) return; const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => { document.body.style.backgroundImage = `url(${e.target.result})`; appData.settings.background = `url(${e.target.result})`; saveDataToBackend(); };
            reader.readAsDataURL(file); hiddenBgInput.value = '';
        }
        
        // --- ORDEN CATEGORÍAS APPS ---
        function openAppCategoryOrderModal() { /* ... (como antes) ... */
            if (!isEditable) return; appCategoryOrderList.innerHTML = '';
            appData.aiAppsCategories.forEach((category, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span class="category-name">${category.title}</span><span class="order-buttons"><button title="Mover arriba" ${index === 0 ? 'disabled' : ''} data-direction="-1" data-cat-id="${category.id}">↑</button><button title="Mover abajo" ${index === appData.aiAppsCategories.length - 1 ? 'disabled' : ''} data-direction="1" data-cat-id="${category.id}">↓</button></span>`;
                appCategoryOrderList.appendChild(li);
            });
            appCategoryOrderModal.style.display = 'flex';
        }
        function handleAppCategoryOrderChange(event) { /* ... (como antes) ... */
            if (!event.target.matches('#appCategoryOrderList button')) return;
            const categoryId = event.target.dataset.catId; const direction = parseInt(event.target.dataset.direction);
            const index = appData.aiAppsCategories.findIndex(cat => cat.id === categoryId);
            if (index === -1) return; const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= appData.aiAppsCategories.length) return;
            const [movedCategory] = appData.aiAppsCategories.splice(index, 1);
            appData.aiAppsCategories.splice(newIndex, 0, movedCategory);
            openAppCategoryOrderModal(); // Re-render modal
        }
        function closeAndSaveAppCategoryOrder() { /* ... (llama a renderFilteredApps) ... */
            appCategoryOrderModal.style.display = 'none';
            saveDataToBackend().then(renderFilteredApps);
        }

        // --- FULLSCREEN IMAGE & GENERIC LISTENERS ---
        function openFullscreenImage(src) { fullscreenImage.src = src; fullscreenImageViewer.style.display = 'flex'; }
        function closeFullscreenImage() { fullscreenImageViewer.style.display = 'none'; fullscreenImage.src = ''; }
        
        function attachGenericImageEventListeners(containerElement) {
            containerElement.querySelectorAll('.interactive-image-thumbnail').forEach(img => {
                // Remover listener anterior para evitar duplicados si se re-renderiza
                img.removeEventListener('click', handleImageClickForFullscreen); // Evita duplicados
                img.addEventListener('click', handleImageClickForFullscreen);
            });
        }
        function handleImageClickForFullscreen(event) {
            if (event.currentTarget.src && !event.currentTarget.src.endsWith('?text=App') && !event.currentTarget.src.endsWith('?text=F')) { // No ampliar placeholders
                 openFullscreenImage(event.currentTarget.src);
            }
        }


        // --- UTILIDADES ---
        function copyToClipboard(text, message = "Copiado.") { /* ... (como antes) ... */
            navigator.clipboard.writeText(text).then(() => alert(message)).catch(err => { console.error('Error copiando:', err); alert('Error al copiar.');});
        }
        // Funciones de Detailed Description Image Tools (si las tienes, defínelas o impórtalas aquí)


        // --- EVENT LISTENERS GLOBALES ---
        editModeToggleBtn.addEventListener('click', toggleEditMode);
        submitAdminPasswordBtn.addEventListener('click', handlePasswordSubmit);
        adminPasswordInput.addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') {
                e.preventDefault();
                handlePasswordSubmit();
            } 
        });
        cancelAdminPasswordBtn.addEventListener('click', () => adminPasswordModal.style.display = 'none');

        themeSwitcherBtn.addEventListener('click', toggleTheme);
        changeBgBtn.addEventListener('click', () => { if(isEditable) hiddenBgInput.click() });
        hiddenBgInput.addEventListener('change', handleBackgroundChange);

        orderAppCategoriesBtn.addEventListener('click', openAppCategoryOrderModal);
        appCategoryOrderList.addEventListener('click', handleAppCategoryOrderChange);
        closeAppCategoryOrderModalBtn.addEventListener('click', closeAndSaveAppCategoryOrder);

        addAppCategoryBtn.addEventListener('click', handleAddAppCategory);
        addPromptBtn.addEventListener('click', () => openPromptForm());
        addPromptFolderBtn.addEventListener('click', () => openPromptFolderForm());

        globalSearchInput.addEventListener('input', applyFiltersAndSort);
        appPricingFilter.addEventListener('change', applyFiltersAndSort);
        globalSortOrder.addEventListener('change', applyFiltersAndSort);

        closeFullscreenBtn.addEventListener('click', closeFullscreenImage);
        fullscreenImageViewer.addEventListener('click', (e) => { 
            if (e.target === fullscreenImageViewer) closeFullscreenImage(); 
        });
        document.addEventListener('keydown', (e) => { 
            if (e.key === "Escape" && fullscreenImageViewer.style.display === 'flex') closeFullscreenImage(); 
            if (e.key === "Escape" && formModal.style.display === 'flex') closeFormModal();
            if (e.key === "Escape" && adminPasswordModal.style.display === 'flex') adminPasswordModal.style.display = 'none';
            if (e.key === "Escape" && appCategoryOrderModal.style.display === 'flex') appCategoryOrderModal.style.display = 'none';

        });

        document.addEventListener('click', (e) => {
            if (activePopups.folderMenu && !activePopups.folderMenu.contains(e.target) && !e.target.closest('.folder-item')) {
                closeActivePopups();
            }
            // El cierre de formModal y otros modales se maneja con sus botones de cancelar/cerrar o la tecla Esc.
        });


        // --- INICIALIZACIÓN ---
        loadInitialData();
    });
  </script>
</body>
</html>
