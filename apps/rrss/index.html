<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuminaDownloader</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #090b14;
      color: #e2e8f0;
      margin: 0;
      padding: 0;
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script>
    const PROXY_URL = './proxy.php';

    const { useState, useEffect, useRef, createElement: h } = React;

    async function fetchMetadata(url) {
      const response = await fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'analyze', url: url })
      });

      if (!response.ok) {
        const errorData = await response.json();
        throw new Error(errorData.error || 'Error al analizar el video');
      }

      const data = await response.json();

      return {
        id: data.id || data.display_id || 'unknown',
        title: data.title || 'Sin titulo',
        thumbnail: data.thumbnail || (data.thumbnails && data.thumbnails[0] && data.thumbnails[0].url) || 'https://via.placeholder.com/600x340',
        uploader: data.uploader || data.channel || data.uploader_id || 'Desconocido',
        duration: formatDuration(data.duration) || '0:00',
        formats: parseFormats(data.formats || [])
      };
    }

    function formatDuration(seconds) {
      if (!seconds) return '0:00';
      const hrs = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      const secs = Math.floor(seconds % 60);

      if (hrs > 0) {
        return hrs + ':' + String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
      }
      return mins + ':' + String(secs).padStart(2, '0');
    }

    function parseFormats(formats) {
      const parsed = [];
      const seen = new Set();

      formats.forEach(f => {
        const hasVideo = f.vcodec && f.vcodec !== 'none';
        const hasAudio = f.acodec && f.acodec !== 'none';

        if (hasVideo) {
          const height = f.height || 0;
          const resolution = height ? height + 'p' : (f.format_note || 'Video');
          const key = 'video-' + resolution + '-' + f.ext;

          if (!seen.has(key) && height >= 360) {
            seen.add(key);
            parsed.push({
              id: f.format_id,
              ext: f.ext || 'mp4',
              resolution: resolution,
              note: f.format_note || (hasAudio ? 'Video+Audio' : 'Solo Video'),
              type: 'video',
              quality: height
            });
          }
        }

        if (hasAudio && !hasVideo) {
          const abr = f.abr || f.tbr || 0;
          const key = 'audio-' + abr + '-' + f.ext;

          if (!seen.has(key)) {
            seen.add(key);
            parsed.push({
              id: f.format_id,
              ext: f.ext || 'm4a',
              resolution: 'Audio',
              note: abr ? Math.round(abr) + 'kbps' : 'Audio',
              type: 'audio',
              quality: abr
            });
          }
        }
      });

      const videos = parsed.filter(f => f.type === 'video').sort((a, b) => (b.quality || 0) - (a.quality || 0));
      const audios = parsed.filter(f => f.type === 'audio').sort((a, b) => (b.quality || 0) - (a.quality || 0));

      if (audios.length > 0) {
        audios.push({
          id: 'bestaudio',
          ext: 'mp3',
          resolution: 'Audio MP3',
          note: 'Mejor calidad',
          type: 'audio'
        });
      }

      return [...videos, ...audios];
    }

    async function downloadVideo(url, formatId, onProgress) {
      try {
        onProgress({ status: 'downloading', percent: 0, speed: 'Iniciando...', eta: 'Calculando...' });

        const response = await fetch(PROXY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'download', url: url, format_id: formatId })
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Error al descargar');
        }

        const data = await response.json();

        if (data.ok && data.download_url) {
          let percent = 0;
          const interval = setInterval(() => {
            percent += 10;
            if (percent >= 90) {
              clearInterval(interval);
              onProgress({ status: 'merging', percent: 95, speed: '-', eta: '-' });
              setTimeout(() => {
                onProgress({
                  status: 'finished',
                  percent: 100,
                  speed: '-',
                  eta: '-',
                  downloadUrl: data.download_url,
                  filename: data.file
                });
              }, 1000);
            } else {
              onProgress({ status: 'downloading', percent: percent, speed: 'Procesando...', eta: 'Calculando...' });
            }
          }, 300);
        } else {
          throw new Error('Respuesta invalida del servidor');
        }
      } catch (error) {
        onProgress({ status: 'error', percent: 0, speed: '-', eta: '-', errorMsg: error.message });
      }
    }

    function App() {
      const [url, setUrl] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [metadata, setMetadata] = useState(null);
      const [selectedFormatId, setSelectedFormatId] = useState(null);
      const [error, setError] = useState(null);
      const [downloadProgress, setDownloadProgress] = useState({ status: 'idle', percent: 0, speed: '', eta: '' });

      async function handleAnalyze() {
        if (!url) return;
        setIsLoading(true);
        setError(null);
        setMetadata(null);
        setDownloadProgress({ status: 'idle', percent: 0, speed: '', eta: '' });

        try {
          const data = await fetchMetadata(url);
          setMetadata(data);
          if (data.formats.length > 0) {
            setSelectedFormatId(data.formats[0].id);
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setIsLoading(false);
        }
      }

      function handleDownload() {
        if (!metadata || !selectedFormatId) return;
        downloadVideo(url, selectedFormatId, (progress) => {
          setDownloadProgress(progress);
        });
      }

      function handleDownloadFile() {
        if (downloadProgress.downloadUrl) {
          const link = document.createElement('a');
          link.href = downloadProgress.downloadUrl;
          link.download = downloadProgress.filename || 'download';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }
      }

      return h('div', { className: 'min-h-screen bg-gradient-to-br from-gray-900 via-blue-900 to-gray-900 p-4 md:p-8' },
        h('div', { className: 'max-w-4xl mx-auto' },
          h('div', { className: 'text-center mb-8' },
            h('h1', { className: 'text-4xl md:text-5xl font-bold text-white mb-2' }, 'LuminaDownloader'),
            h('p', { className: 'text-gray-300 text-lg' }, 'Descarga videos de YouTube, Facebook, Instagram y TikTok')
          ),

          h('div', { className: 'bg-white/10 backdrop-blur-lg rounded-2xl p-4 mb-6 shadow-2xl' },
            h('div', { className: 'flex gap-2' },
              h('input', {
                type: 'text',
                placeholder: 'Pega aqui la URL del video...',
                className: 'flex-1 bg-white/20 text-white placeholder-gray-300 px-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-cyan-400',
                value: url,
                onChange: (e) => setUrl(e.target.value),
                onKeyDown: (e) => e.key === 'Enter' && handleAnalyze()
              }),
              h('button', {
                onClick: handleAnalyze,
                disabled: isLoading || !url,
                className: 'bg-cyan-500 hover:bg-cyan-400 text-black font-bold px-6 py-3 rounded-xl disabled:opacity-50 disabled:cursor-not-allowed transition-all'
              }, isLoading ? 'Analizando...' : 'Analizar')
            )
          ),

          error && h('div', { className: 'bg-red-500/20 border border-red-500 text-red-200 p-4 rounded-xl mb-6' }, error),

          isLoading && h('div', { className: 'bg-white/10 backdrop-blur-lg rounded-2xl p-6 animate-pulse' },
            h('div', { className: 'h-48 bg-white/20 rounded-xl mb-4' }),
            h('div', { className: 'h-8 bg-white/20 rounded w-3/4 mb-2' }),
            h('div', { className: 'h-6 bg-white/20 rounded w-1/2' })
          ),

          metadata && !isLoading && h('div', { className: 'bg-white/10 backdrop-blur-lg rounded-2xl p-6 shadow-2xl' },
            h('div', { className: 'flex flex-col md:flex-row gap-6 mb-6' },
              h('img', {
                src: metadata.thumbnail,
                alt: metadata.title,
                className: 'w-full md:w-64 h-48 object-cover rounded-xl'
              }),
              h('div', { className: 'flex-1' },
                h('h2', { className: 'text-2xl font-bold text-white mb-2 line-clamp-2' }, metadata.title),
                h('p', { className: 'text-cyan-400 mb-2' }, metadata.uploader),
                h('p', { className: 'text-gray-300' }, 'Duracion: ' + metadata.duration)
              )
            ),

            downloadProgress.status === 'idle' ? h('div', { className: 'flex flex-col md:flex-row gap-4' },
              h('select', {
                value: selectedFormatId || '',
                onChange: (e) => setSelectedFormatId(e.target.value),
                className: 'flex-1 bg-white/20 text-white px-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-cyan-400'
              },
                metadata.formats.map(f =>
                  h('option', { key: f.id, value: f.id, className: 'bg-gray-800' },
                    f.resolution + ' - ' + f.ext.toUpperCase() + (f.note ? ' (' + f.note + ')' : '')
                  )
                )
              ),
              h('button', {
                onClick: handleDownload,
                className: 'bg-green-500 hover:bg-green-400 text-white font-bold px-8 py-3 rounded-xl transition-all'
              }, 'Descargar')
            ) : h('div', { className: 'bg-gray-800/50 rounded-xl p-4' },
              h('div', { className: 'flex justify-between mb-2' },
                h('span', { className: 'text-white font-semibold' },
                  downloadProgress.status === 'finished' ? 'Descarga Lista!' :
                    downloadProgress.status === 'merging' ? 'Finalizando...' :
                      downloadProgress.status === 'error' ? 'Error' : 'Descargando...'
                ),
                downloadProgress.status !== 'error' && h('span', { className: 'text-cyan-400' },
                  downloadProgress.percent.toFixed(1) + '%'
                )
              ),
              downloadProgress.status !== 'error' && h('div', { className: 'h-2 bg-gray-700 rounded-full overflow-hidden mb-2' },
                h('div', {
                  className: 'h-full ' + (downloadProgress.status === 'finished' ? 'bg-green-500' : 'bg-cyan-500'),
                  style: { width: downloadProgress.percent + '%', transition: 'width 0.3s' }
                })
              ),
              downloadProgress.status === 'error' && h('p', { className: 'text-red-400 text-sm' },
                downloadProgress.errorMsg || 'Error desconocido'
              ),
              downloadProgress.status === 'finished' && h('button', {
                onClick: handleDownloadFile,
                className: 'w-full bg-green-500 hover:bg-green-400 text-white font-bold px-4 py-2 rounded-lg mt-2'
              }, 'Descargar Archivo')
            )
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>

</html>
