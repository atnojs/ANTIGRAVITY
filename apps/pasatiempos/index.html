<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Pasatiempos Inteligentes</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Styles -->
    <link href="styles.css" rel="stylesheet">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5', // Indigo 600
                        secondary: '#64748b', // Slate 500
                        background: '#f8fafc', // Slate 50
                        surface: '#ffffff',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-slate-800 font-sans antialiased min-h-screen flex flex-col">
    <header class="bg-surface shadow-sm sticky top-0 z-10 no-print">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="if(window.app && window.app.goHome) window.app.goHome()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">Centro de Pasatiempos</h1>
            </div>
            <nav class="hidden md:flex space-x-4">
                <button onclick="if(window.app && window.app.goHome) window.app.goHome()" class="text-sm font-medium text-slate-600 hover:text-primary transition-colors">Inicio</button>
            </nav>
        </div>
    </header>

    <main id="app-content" class="flex-grow flex flex-col">
        <!-- El contenido se inyectará aquí dinámicamente -->
        <div class="flex items-center justify-center h-64">
            <div class="spinner"></div>
        </div>
    </main>

    <footer class="bg-surface border-t border-slate-200 mt-auto no-print">
        <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
            <p class="text-center text-sm text-slate-400">
                &copy; 2025 Atnojs Pasatiempos Inteligentes.
            </p>
        </div>
    </footer>

    <!-- Aplicación Principal -->
    <script src="app.js"></script>
</body>
</html>
